<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>IPGATE - Kişi Yönetimi</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/shared-styles.css">
    <link rel="stylesheet" href="./css/persons.css">
</head>
<body>
    <div id="layout-placeholder"></div>
    <div class="page-wrapper">
        <main class="main-container">
            <section class="page-header">
                <h1 class="page-title">Kişi Yönetimi</h1>
                <div class="search-group">
                    <input type="text" id="personSearchInput" class="form-control" placeholder="Hızlı Ara...">
                    <button class="btn btn-primary" id="addNewPersonBtn">➕ Yeni Kişi</button>
                </div>
            </section>
            
            <div class="persons-container">
                <table class="table persons-table">
                    <thead>
                        <tr>
                            <th>Sıra</th>
                            <th>Ad Soyad / Firma Adı</th>
                            <th>TCKN / VKN</th>
                            <th>TPE No</th>
                            <th>E-posta</th>
                            <th>Tip</th>
                            <th>İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="personsTableBody"></tbody>
                </table>
                <div id="paginationContainer"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { PersonModalManager } from './js/components/PersonModalManager.js';
        import { PersonUIManager } from './js/persons/PersonUIManager.js';
        import { loadSharedLayout } from './js/layout-loader.js';

        document.addEventListener('DOMContentLoaded', async () => {
            await loadSharedLayout({ activeMenuLink: 'persons.html' });
            
            const ui = new PersonUIManager();
            const modal = new PersonModalManager({ onSuccess: () => ui.loadPersons() });

            ui.loadPersons();

            document.getElementById('addNewPersonBtn').onclick = () => modal.open();
            
            document.getElementById('personsTableBody').onclick = (e) => {
                if (e.target.classList.contains('edit-btn')) modal.open(e.target.dataset.id);
                if (e.target.classList.contains('delete-btn')) { /* Silme onayı ve işlemi */ }
            };
        });
    </script>
</body>
</html>
