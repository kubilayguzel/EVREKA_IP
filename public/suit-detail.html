<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPGATE - Dava Detayı</title>
    <link rel="stylesheet" href="css/shared-styles.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #333; display: flex; }
        .page-wrapper { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        .main-container {width: 100%; padding: 30px; padding-top: 120px; margin: 0; }
        .page-header { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); }
        .page-title { font-size: 2em; color: #1e3c72; margin-bottom: 10px; }
        .section-card { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); margin-bottom: 25px; }
        .section-title { font-size: 1.3em; color: #1e3c72; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #e1e8ed; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .form-group { margin-bottom: 25px; display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 12px 15px; border: 2px solid #e1e8ed; border-radius: 10px; font-size: 1em; transition: all 0.3s ease; background: white; }
        .form-textarea { min-height: 120px; resize: vertical; }
        .form-actions { display: flex; justify-content: flex-end; gap: 10px; padding-top: 20px; border-top: 1px solid #e9ecef; margin-top: 20px; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; font-size: 1em; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .btn-primary { background: linear-gradient(45deg, #1e3c72, #2a5298); color: white; }
        .btn-secondary { background: #6c757d; color: white; }

        /* Timeline Stilleri */
        .timeline-container { position: relative; padding-left: 20px; border-left: 3px solid #e9ecef; margin-top: 10px; }
        .timeline-item { position: relative; margin-bottom: 30px; }
        .timeline-item::before { content: ''; position: absolute; left: -26px; top: 5px; width: 15px; height: 15px; border-radius: 50%; background: #1e3c72; border: 3px solid #fff; box-shadow: 0 0 0 2px #1e3c72; }
        .timeline-date { font-size: 0.9em; color: #666; margin-bottom: 5px; font-weight: 600; }
        .timeline-content { background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #e9ecef; }
        .timeline-title { font-weight: bold; color: #333; margin-bottom: 5px; font-size: 1.1em; }
        .timeline-desc { color: #555; font-size: 0.95em; }
        .timeline-badges { margin-top: 8px; }
        .badge-type { background-color: #e3f2fd; color: #1e3c72; padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: 600; }

        /* Dosya Yükleme */
        .file-list-container { margin-top: 15px; border: 1px solid #e1e8ed; border-radius: 12px; overflow: hidden; }
        .file-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #eee; background: white; }
        .file-item:last-child { border-bottom: none; }
        .file-name a { color: #1e3c72; font-weight: 500; }
        .btn-remove-file { background: #ff6b6b; color: white; width: 25px; height: 25px; border-radius: 50%; border:none; cursor: pointer; }

        /* Loading */
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #1e3c72; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="notification-container" class="notification-container"></div>
    <div id="layout-placeholder"></div>

    <div class="page-wrapper">
        <main class="main-container">
            <section class="page-header">
                <h1 class="page-title" id="suitTitle">Dava Detayı</h1>
                <p class="page-subtitle">Dava sürecini ve geçmiş işlemleri yönetin</p>
            </section>

            <form id="suitForm">
                <div class="row">
                    <div class="col-lg-7">
                        <div class="section-card">
                            <h3 class="section-title">Temel Bilgiler</h3>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label class="form-label">Dava No *</label>
                                    <input type="text" id="caseNo" class="form-input" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Dava Türü *</label>
                                    <input type="text" id="suitType" class="form-input" required>
                                </div>
                                <div class="form-group full-width">
                                    <label class="form-label">Mahkeme *</label>
                                    <select id="court" class="form-select">
                                        <option value="">Seçiniz...</option>
                                        <optgroup label="Ankara">
                                            <option value="Ankara 1. FSHHM">Ankara 1. Fikri ve Sınai Haklar Hukuk Mahkemesi</option>
                                            <option value="Ankara 2. FSHHM">Ankara 2. Fikri ve Sınai Haklar Hukuk Mahkemesi</option>
                                            <option value="Ankara 3. FSHHM">Ankara 3. Fikri ve Sınai Haklar Hukuk Mahkemesi</option>
                                            <option value="Ankara 4. FSHHM">Ankara 4. Fikri ve Sınai Haklar Hukuk Mahkemesi</option>
                                            <option value="Ankara 5. FSHHM">Ankara 5. Fikri ve Sınai Haklar Hukuk Mahkemesi</option>
                                            <option value="Ankara FSHCM">Ankara Fikri ve Sınai Haklar Ceza Mahkemesi</option>
                                        </optgroup>
                                        <optgroup label="İstanbul">
                                            <option value="İstanbul 1. FSHHM">İstanbul 1. Fikri ve Sınai Haklar Hukuk Mahkemesi</option>
                                            <option value="İstanbul 2. FSHHM">İstanbul 2. Fikri ve Sınai Haklar Hukuk Mahkemesi</option>
                                            <option value="İstanbul 3. FSHHM">İstanbul 3. Fikri ve Sınai Haklar Hukuk Mahkemesi</option>
                                            <option value="İstanbul 4. FSHHM">İstanbul 4. Fikri ve Sınai Haklar Hukuk Mahkemesi</option>
                                            <option value="İstanbul Anadolu 1. FSHHM">İstanbul Anadolu 1. Fikri ve Sınai Haklar Hukuk Mahkemesi</option>
                                        </optgroup>
                                        <optgroup label="Diğer İller">
                                            <option value="İzmir FSHHM">İzmir Fikri ve Sınai Haklar Hukuk Mahkemesi</option>
                                            <option value="Bursa FSHHM">Bursa Fikri ve Sınai Haklar Hukuk Mahkemesi</option>
                                            <option value="Antalya FSHHM">Antalya Fikri ve Sınai Haklar Hukuk Mahkemesi</option>
                                        </optgroup>
                                        <optgroup label="Yüksek Yargı / Diğer">
                                            <option value="Yargıtay">Yargıtay</option>
                                            <option value="other">Diğer (Elle Giriniz)</option>
                                        </optgroup>
                                    </select>
                                    <input type="text" id="customCourtInput" class="form-input mt-2" style="display:none;" placeholder="Mahkeme adını yazınız...">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Açılış Tarihi</label>
                                    <input type="date" id="openedDate" class="form-input">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Durum</label>
                                    <select id="suitStatus" class="form-select">
                                        <option value="Devam Ediyor">Devam Ediyor</option>
                                        <option value="Sonuçlandı">Sonuçlandı</option>
                                        <option value="Beklemede">Beklemede</option>
                                        <option value="Kapatıldı">Kapatıldı</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="section-card">
                            <h3 class="section-title">Taraf Bilgileri</h3>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label class="form-label">Müvekkil</label>
                                    <input type="text" id="clientName" class="form-input">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Rol</label>
                                    <select id="clientRole" class="form-select">
                                        <option value="Davacı">Davacı</option>
                                        <option value="Davalı">Davalı</option>
                                        <option value="Müdahil">Müdahil</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Karşı Taraf</label>
                                    <input type="text" id="opposingParty" class="form-input">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Karşı Taraf Vekili</label>
                                    <input type="text" id="opposingCounsel" class="form-input">
                                </div>
                            </div>
                        </div>
                        
                        <div class="section-card">
                            <h3 class="section-title">Konu Varlık & Açıklama</h3>
                            <div class="form-group">
                                <label class="form-label">İlgili Varlık (Marka/Patent)</label>
                                <input type="text" id="subjectAssetTitle" class="form-input" placeholder="Bağlı bir varlık yok">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Açıklama</label>
                                <textarea id="description" class="form-textarea"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-5">
                        <div class="section-card" style="background-color: #fcfcfc;">
                            <h3 class="section-title"><i class="fas fa-history mr-2"></i> İşlem Geçmişi (Timeline)</h3>
                            <div id="timelineContainer" class="timeline-container">
                                <p class="text-muted text-center py-3">Yükleniyor...</p>
                            </div>
                        </div>

                        <div class="section-card">
                            <h3 class="section-title">Belgeler</h3>
                            <button type="button" class="btn btn-secondary btn-sm btn-block mb-3" id="uploadBtn">
                                <i class="fas fa-plus"></i> Belge Ekle
                            </button>
                            <input type="file" id="fileInput" hidden multiple>
                            <div id="fileListContainer" class="file-list-container"></div>
                        </div>
                        
                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary btn-block btn-lg">Değişiklikleri Kaydet</button>
                            <button type="button" class="btn btn-secondary btn-block mt-2" id="cancelBtn">İptal</button>
                        </div>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <script type="module">
        import { loadSharedLayout } from './js/layout-loader.js';
        import { db, auth, storage } from './firebase-config.js';
        import { doc, getDoc, updateDoc, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { ref as storageRef, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { showNotification } from './utils.js';

        const params = new URLSearchParams(window.location.search);
        const suitId = params.get('id');
        let currentDocuments = [];

        // Başlangıç
        (async function() {
            await loadSharedLayout();
            onAuthStateChanged(auth, async (user) => {
                if (!user) return window.location.href = 'index.html';
                if (!suitId) return window.location.href = 'portfolio.html';
                await loadSuitData();
                await loadSuitTransactions(); // Timeline Yükle
                setupEventListeners();
            });
        })();

        // Dava Verilerini Yükle
        async function loadSuitData() {
            try {
                const docRef = doc(db, 'suits', suitId);
                const snap = await getDoc(docRef);
                
                if (!snap.exists()) {
                    alert('Dava bulunamadı.');
                    return window.location.href = 'portfolio.html';
                }

                const data = snap.data();
                const details = data.suitDetails || {};
                
                document.getElementById('suitTitle').textContent = `Dava: ${details.caseNo || data.title}`;
                
                // Form Doldurma
                setValue('caseNo', details.caseNo);
                setValue('suitType', data.transactionType?.alias || data.transactionType?.name);
                
                // Mahkeme Seçimi Mantığı
                const courtSelect = document.getElementById('court');
                const courtVal = details.court || '';
                let found = false;
                for(let opt of courtSelect.options) {
                    if(opt.value === courtVal) {
                        courtSelect.value = courtVal;
                        found = true;
                        break;
                    }
                }
                if (!found && courtVal) {
                    courtSelect.value = 'other';
                    document.getElementById('customCourtInput').style.display = 'block';
                    setValue('customCourtInput', courtVal);
                } else {
                    courtSelect.value = courtVal;
                }

                setValue('openedDate', formatDateForInput(details.openingDate));
                setValue('suitStatus', details.suitStatus);
                setValue('clientName', data.client?.name);
                setValue('clientRole', data.client?.clientRole);
                setValue('opposingParty', details.opposingParty);
                setValue('opposingCounsel', details.opposingCounsel);
                setValue('subjectAssetTitle', data.subjectAsset?.title);
                setValue('description', details.description);

                currentDocuments = data.documents || [];
                renderDocuments();

            } catch (e) {
                console.error(e);
                showNotification('Veri yüklenemedi.', 'error');
            }
        }

        // Timeline (İşlem Geçmişi) Yükle
        async function loadSuitTransactions() {
            const container = document.getElementById('timelineContainer');
            try {
                const q = query(collection(db, 'suits', suitId, 'transactions'), orderBy('createdAt', 'desc'));
                const snap = await getDocs(q);
                
                if (snap.empty) {
                    container.innerHTML = '<p class="text-muted text-center">Henüz işlem geçmişi yok.</p>';
                    return;
                }

                let html = '';
                snap.forEach(doc => {
                    const t = doc.data();
                    const date = t.creationDate ? new Date(t.creationDate).toLocaleDateString('tr-TR') : '-';
                    const desc = t.description || 'İşlem detay girilmemiş.';
                    const typeName = t.transactionTypeName || 'İşlem'; // Task type ismi eklenebilir

                    html += `
                        <div class="timeline-item">
                            <div class="timeline-date">${date}</div>
                            <div class="timeline-content">
                                <div class="timeline-title">${typeName}</div>
                                <div class="timeline-desc">${desc}</div>
                                ${t.triggeringTaskId ? `<div class="timeline-badges"><span class="badge-type">Ref: ${t.triggeringTaskId}</span></div>` : ''}
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;

            } catch (e) {
                console.error("Timeline hatası:", e);
                container.innerHTML = '<p class="text-danger">Geçmiş yüklenemedi.</p>';
            }
        }

        function setupEventListeners() {
            document.getElementById('suitForm').addEventListener('submit', handleSave);
            document.getElementById('cancelBtn').addEventListener('click', () => window.location.href = 'portfolio.html');
            
            // Dosya Yükleme
            document.getElementById('uploadBtn').addEventListener('click', () => document.getElementById('fileInput').click());
            document.getElementById('fileInput').addEventListener('change', handleFileUpload);

            // Mahkeme "Diğer" seçimi
            document.getElementById('court').addEventListener('change', (e) => {
                const custom = document.getElementById('customCourtInput');
                if (e.target.value === 'other') custom.style.display = 'block';
                else { custom.style.display = 'none'; custom.value = ''; }
            });
        }

        async function handleSave(e) {
            e.preventDefault();
            if (!confirm('Kaydetmek istiyor musunuz?')) return;

            const courtSelect = document.getElementById('court');
            const finalCourt = courtSelect.value === 'other' ? document.getElementById('customCourtInput').value : courtSelect.value;

            const updateData = {
                'suitDetails.caseNo': getValue('caseNo'),
                'suitDetails.court': finalCourt,
                'suitDetails.suitStatus': getValue('suitStatus'),
                'suitDetails.openingDate': document.getElementById('openedDate').value ? new Date(document.getElementById('openedDate').value).toISOString() : null,
                'suitDetails.opposingParty': getValue('opposingParty'),
                'suitDetails.opposingCounsel': getValue('opposingCounsel'),
                'suitDetails.description': getValue('description'),
                'client.name': getValue('clientName'),
                'client.clientRole': getValue('clientRole'),
                'documents': currentDocuments
            };

            try {
                await updateDoc(doc(db, 'suits', suitId), updateData);
                showNotification('Güncellendi!', 'success');
                setTimeout(() => window.location.reload(), 1000);
            } catch (e) {
                console.error(e);
                showNotification('Hata oluştu.', 'error');
            }
        }

        async function handleFileUpload(e) {
            const files = e.target.files;
            if (!files.length) return;

            for (const file of files) {
                const path = `suit_docs/${suitId}/${Date.now()}_${file.name}`;
                try {
                    const res = await uploadBytes(storageRef(storage, path), file);
                    const url = await getDownloadURL(res.ref);
                    currentDocuments.push({ name: file.name, url: url, path: path, uploadedAt: new Date().toISOString() });
                } catch (err) { console.error(err); }
            }
            // Firestore'a kaydetmeden önce UI güncelle (veya direkt kaydet)
            await updateDoc(doc(db, 'suits', suitId), { documents: currentDocuments });
            renderDocuments();
            showNotification('Dosyalar yüklendi.', 'success');
        }

        function renderDocuments() {
            const list = document.getElementById('fileListContainer');
            if (!currentDocuments.length) { list.innerHTML = '<p class="text-center p-3 text-muted">Dosya yok.</p>'; return; }
            
            list.innerHTML = currentDocuments.map((d, i) => `
                <div class="file-item">
                    <div class="file-name"><a href="${d.url}" target="_blank">${d.name}</a></div>
                    <button type="button" class="btn-remove-file" onclick="window.removeDoc(${i})">&times;</button>
                </div>
            `).join('');
            
            // Global fonksiyon atama (module scope dışına erişim için - basit çözüm)
            window.removeDoc = async (index) => {
                if(!confirm('Silinsin mi?')) return;
                currentDocuments.splice(index, 1);
                await updateDoc(doc(db, 'suits', suitId), { documents: currentDocuments });
                renderDocuments();
            };
        }

        // Helpers
        function setValue(id, val) { const el = document.getElementById(id); if(el) el.value = val || ''; }
        function getValue(id) { return document.getElementById(id)?.value || ''; }
        function formatDateForInput(dateVal) {
            if(!dateVal) return '';
            try {
                const d = dateVal.toDate ? dateVal.toDate() : new Date(dateVal);
                return d.toISOString().split('T')[0];
            } catch { return ''; }
        }
    </script>
    <script type="module" src="./js/layout-loader.js"></script>
</body>
</html>
