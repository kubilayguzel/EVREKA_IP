<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPGATE - Yeni İş Oluştur</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="./css/shared-styles.css">
    <link rel="stylesheet" href="./css/task-management.css">
    
    <link rel="modulepreload" href="./firebase-config.js">
    <link rel="modulepreload" href="./js/layout-loader.js">

<style>
/* Sayfa Düzeni ve Modern Kart Seçimi İçin Ek Stiller */
.page-wrapper { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; background: #f8f9fa; }
.main-container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 120px 20px 40px 20px; }
.step-card { border: none; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 25px; transition: all 0.3s ease; }
.step-card:hover { transform: translateY(-2px); }
.card-header { background: #fff; border-bottom: 1px solid #eee; padding: 20px; border-radius: 15px 15px 0 0 !important; }
.card-header h5 { font-weight: 700; color: #2c3e50; }

/* Kart Izgara Yapısı */
.card-selection-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    margin-top: 10px;
}
.type-card {
    flex: 1;
    min-width: 160px;
    max-width: 200px;
    padding: 25px 15px;
    border: 2px solid #edeff2;
    border-radius: 12px;
    background: #fff;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease-in-out;
}
.type-card:hover { border-color: #007bff; background-color: #f0f7ff; }
.type-card.active { border-color: #007bff; background-color: #e7f1ff; box-shadow: 0 4px 12px rgba(0,123,255,0.2); }
.type-card i { font-size: 24px; color: #007bff; margin-bottom: 12px; display: block; }
.type-card span { font-weight: 600; font-size: 14px; color: #495057; }

/* Navigasyon Tabları */
.nav-pills .nav-link { border-radius: 10px; color: #6c757d; font-weight: 600; padding: 12px 25px; }
.nav-pills .nav-link.active { background-color: #007bff; box-shadow: 0 4px 10px rgba(0,123,255,0.3); }

/* Form Elemanları */
.form-control { border-radius: 8px; border: 1px solid #ced4da; padding: 12px; height: auto; }
.form-control:focus { box-shadow: 0 0 0 0.2rem rgba(0,123,255,0.1); }
</style>
</head>
<body>
    <div class="page-wrapper">
        <main class="main-container">
            <div class="page-header mb-4 text-center">
                <h1 class="page-title">Yeni İş Kaydı Oluştur</h1>
                <p class="text-muted">Lütfen ilgili kategori ve işlem tipini seçerek ilerleyin.</p>
            </div>

            <ul class="nav nav-pills mb-4 justify-content-center" id="taskTabs" role="tablist">
                <li class="nav-item">
                    <a class="nav-link active" id="details-tab" data-toggle="pill" href="#details">1. İşlem Detayları</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" id="summary-tab" data-toggle="pill" href="#summary">2. Özet ve Onay</a>
                </li>
            </ul>

            <form id="createTaskForm">
                <div class="tab-content">
                    <div class="tab-pane fade show active" id="details">
                        
                        <div class="step-card card">
                            <div class="card-header">
                                <h5 class="mb-0"><i class="fas fa-th-large mr-2 text-primary"></i>Kategori Seçimi</h5>
                            </div>
                            <div class="card-body">
                                <div id="mainTaskTypeCards" class="card-selection-grid">
                                    </div>
                                <select id="mainIpType" class="form-control" style="display:none;" required>
                                    <option value="">Seçiniz...</option>
                                </select>
                            </div>
                        </div>

                        <div class="step-card card" id="specificTaskSection">
                            <div class="card-header">
                                <h5 class="mb-0"><i class="fas fa-list-ul mr-2 text-primary"></i>Yapılacak İşlem</h5>
                            </div>
                            <div class="card-body">
                                <div id="specificTaskTypeCardsContainer" class="card-selection-grid">
                                    </div>
                                <select id="specificTaskType" class="form-control" style="display:none;" required disabled>
                                    <option value="">Seçiniz...</option>
                                </select>
                            </div>
                        </div>

                        <div class="step-card card">
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group">
                                            <label class="font-weight-bold">Kaynak (Origin)</label>
                                            <select id="originSelect" class="form-control" required></select>
                                        </div>
                                    </div>
                                    <div class="col-md-6" id="ipRecordSearchGroup">
                                        <div class="form-group">
                                            <label class="font-weight-bold">Portföy Kaydı Ara (Opsiyonel)</label>
                                            <div class="input-group">
                                                <input type="text" id="ipRecordSearch" class="form-control" placeholder="No veya İsim ile ara...">
                                                <div class="input-group-append">
                                                    <span class="input-group-text bg-white"><i class="fas fa-search"></i></span>
                                                </div>
                                            </div>
                                            <div id="ipRecordResults" class="list-group mt-2 shadow-sm" style="display:none; position:absolute; z-index:1000; width:94%;"></div>
                                        </div>
                                    </div>
                                </div>
                                <div id="selectedIpRecordDisplay" class="mt-2"></div>
                            </div>
                        </div>

                        <div id="conditionalFieldsContainer"></div>

                    </div>

                    <div class="tab-pane fade" id="summary">
                        <div id="summaryContainer"></div>
                        <div class="text-right mt-4">
                            <button type="button" class="btn btn-secondary btn-lg mr-2" onclick="$('#details-tab').tab('show')">Geri Dön</button>
                            <button type="submit" class="btn btn-success btn-lg px-5" id="submitBtn">
                                <i class="fas fa-check-circle mr-2"></i>İşi Oluştur
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <div id="modalContainer"></div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/tr.js"></script>

    <script type="module" src="./js/create-task/main.js"></script>

    <script type="module">
        import { PersonModalManager } from './js/components/PersonModalManager.js';
        const personModal = new PersonModalManager();
        personModal.init();
    </script>
</body>
</html>
