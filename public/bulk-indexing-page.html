<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPGATE - Belge Yükleme ve Yönetimi</title>
    
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/shared-styles.css">
    <link rel="stylesheet" href="./css/task-update.css"> <style>
        /* Sayfaya Özel Stil İyileştirmeleri */
        :root {
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --primary-blue: #1e3c72;
        }

        .page-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding-top: 80px; /* Üst bar için yer açar */
            min-height: 100vh;
        }

        .main-content-container {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Modern Kart Tasarımı */
        .modern-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        .card-header-custom {
            background: #f8fafc;
            padding: 20px 25px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title-custom {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-blue);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-body-custom {
            padding: 25px;
        }

        /* Sekme Sistemi (Task Update Benzeri) */
        .nav-tabs-custom {
            display: flex;
            gap: 10px;
            padding: 0 25px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .tab-btn-custom {
            padding: 15px 25px;
            border: none;
            background: transparent;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            position: relative;
        }

        .tab-btn-custom.active {
            color: var(--primary-blue);
            border-bottom-color: var(--primary-blue);
        }

        .tab-pane-custom {
            display: none;
        }

        .tab-pane-custom.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        /* EPATS Grid */
        .epats-filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            background: #f1f5f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        /* Badge Stilleri */
        .badge-count {
            background: #ef4444;
            color: white;
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 10px;
            margin-left: 6px;
        }

        /* Sürükle Bırak Alanı */
        .file-upload-area {
            border: 2px dashed #cbd5e1;
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-upload-area:hover {
            border-color: var(--primary-blue);
            background: #f0f7ff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="layout-placeholder"></div>

    <div class="page-wrapper">
        <main class="main-content-container">
            
            <div class="modern-card">
                <div class="card-body-custom" style="text-align: center;">
                    <h1 style="color: var(--primary-blue); margin: 0 0 10px 0;">Belge Yükleme ve Yönetimi</h1>
                    <p style="color: #64748b; margin: 0;">Yüklenecek belgeleri yönetin, EPATS ve ETEBS entegrasyonlarını kullanın.</p>
                </div>
            </div>

            <div class="modern-card">
                <nav class="nav-tabs-custom">
                    <button class="tab-btn-custom active" data-tab="manual-indexing-pane">
                        <i class="fas fa-hand-holding-medical"></i> Manuel İşlem
                    </button>
                    <button class="tab-btn-custom" data-tab="bulk-indexing-pane">
                        <i class="fas fa-envelope-open-text"></i> ETEBS Tebligatları
                        <span class="badge-count" id="totalBadge">0</span>
                    </button>
                    <button class="tab-btn-custom" data-tab="epats-indexing-pane">
                        <i class="fas fa-cloud-download-alt"></i> EPATS Evrak Yükleme
                    </button>
                </nav>

                <div class="card-body-custom">
                    
                    <div id="manual-indexing-pane" class="tab-pane-custom active">
                        <div class="form-section mb-4">
                            <h3 class="card-title-custom mb-3"><span>1.1</span> Kayıt Seçin</h3>
                            <div class="search-wrapper position-relative">
                                <input type="text" id="recordSearchInputManual" class="form-control" placeholder="Başvuru Numarası veya Başlık ile Ara..." autocomplete="off">
                                <div id="searchResultsContainerManual" class="search-results-dropdown" style="display:none;"></div>
                            </div>
                            <div class="mt-3">
                                <label class="form-label">Seçili Kayıt</label>
                                <input type="text" id="selectedRecordDisplayManual" class="form-control bg-light" readonly placeholder="Henüz kayıt seçilmedi.">
                            </div>
                        </div>

                        <div class="form-section mb-4">
                            <h3 class="card-title-custom mb-3"><span>1.2</span> Yeni İşlem Detayları</h3>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">İşlem Türü <span class="text-danger">*</span></label>
                                    <select id="specificManualTransactionType" class="form-select"></select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Tebliğ Tarihi</label>
                                    <input type="date" id="manualTransactionDeliveryDate" class="form-control">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Notlar</label>
                                <textarea id="manualTransactionNotes" class="form-control" rows="3" placeholder="Notlarınızı buraya yazın..."></textarea>
                            </div>
                        </div>

                        <div class="form-section">
                            <h3 class="card-title-custom mb-3"><span>1.3</span> Dosya Seçin</h3>
                            <div class="file-upload-area" id="filesManualButton">
                                <i class="fas fa-file-upload fa-3x text-muted mb-3"></i>
                                <p>Dosyaları sürükleyin veya <strong>seçmek için tıklayın</strong></p>
                                <small class="text-muted">PDF, DOC, JPG (Maks. 10MB)</small>
                            </div>
                            <input type="file" id="filesManual" multiple accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" style="display: none;">
                            <div id="fileListManual" class="mt-3"></div>
                            
                            <div class="d-flex justify-content-end mt-4">
                                <button type="button" id="saveManualTransactionBtn" class="btn btn-primary px-5" disabled>
                                    <i class="fas fa-save me-2"></i> Manuel İşlemi Kaydet
                                </button>
                            </div>
                        </div>
                    </div>

                    <div id="bulk-indexing-pane" class="tab-pane-custom">
                        <div class="etebs-mode-selection mb-4">
                            <div class="btn-group w-100">
                                <button class="btn btn-outline-primary active" data-mode="etebs">ETEBS Token</button>
                                <button class="btn btn-outline-primary" data-mode="upload">Manuel PDF Yükle</button>
                            </div>
                        </div>

                        <div id="etebs-mode">
                            <div class="form-section mb-4">
                                <h3 class="card-title-custom mb-3"><i class="fas fa-key"></i> Token Yönetimi</h3>
                                <div class="input-group">
                                    <input type="text" id="etebsTokenInput" class="form-control" placeholder="GUID Token Giriniz...">
                                    <button id="fetchNotificationsBtn" class="btn btn-primary px-4">Tebligatları Çek</button>
                                </div>
                            </div>

                            <div id="notificationsSection" style="display: none;">
                                <div class="etebs-results-tabs mt-4">
                                    <div id="matchedNotificationsList"></div>
                                    <div id="unmatchedNotificationsList"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="epats-indexing-pane" class="tab-pane-custom">
                        <div class="epats-filter-grid">
                            <div class="form-group">
                                <label class="form-label">Müvekkil (Sahip)</label>
                                <select id="epatsClientSelect" class="form-select"></select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">IP Türü</label>
                                <select id="epatsIpTypeSelect" class="form-select">
                                    <option value="trademark">Marka</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Belge Türü</label>
                                <select id="epatsDocTypeSelect" class="form-select">
                                    <option value="tescil_belgesi">Tescil Belgesi</option>
                                    <option value="marka_basvuru_belgesi">Başvuru Belgesi</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mb-4">
                            <button id="btnFetchMissingDocs" class="btn btn-primary px-4">
                                <i class="fas fa-search me-2"></i> Eksik Belgeleri Listele
                            </button>
                            <button id="btnStartEpatsTransfer" class="btn btn-success px-4" disabled>
                                <i class="fas fa-play me-2"></i> Transferi Başlat (<span id="selectedEpatsCount">0</span>)
                            </button>
                        </div>

                        <div id="epatsResultsSection" style="display: none;">
                            <div class="table-responsive">
                                <table class="table table-hover">
                                    <thead class="table-light">
                                        <tr>
                                            <th><input type="checkbox" id="selectAllEpats"></th>
                                            <th>Başvuru No</th>
                                            <th>Marka Adı</th>
                                            <th>Durum</th>
                                        </tr>
                                    </thead>
                                    <tbody id="epatsResultsBody"></tbody>
                                </table>
                            </div>
                            <div id="epatsPagination" class="mt-4 d-flex justify-content-center"></div>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { BulkIndexingModule } from './js/indexing/bulk-upload-manager.js';
        import { loadSharedLayout } from './js/layout-loader.js';
        import { ETEBSManager } from './js/etebs-module.js';
        import { EpatsUiManager } from './js/indexing/epats-ui-manager.js';

        document.addEventListener('DOMContentLoaded', () => {
            // Sol Frame ve Layout Yükle
            loadSharedLayout({ activeMenuLink: 'bulk-indexing-page.html' });

            // Modülleri Başlat
            window.indexingModule = new BulkIndexingModule();
            window.etebsManager = new ETEBSManager();
            window.epatsUiManager = new EpatsUiManager();

            // Gelişmiş Sekme Yönetimi
            const tabButtons = document.querySelectorAll('.tab-btn-custom');
            const tabPanes = document.querySelectorAll('.tab-pane-custom');

            tabButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const target = btn.getAttribute('data-tab');

                    // Butonları güncelle
                    tabButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    // Panelleri güncelle
                    tabPanes.forEach(pane => {
                        pane.classList.remove('active');
                        if (pane.id === target) {
                            pane.classList.add('active');
                        }
                    });
                });
            });
        });
    </script>
</body>
</html>
