<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Müvekkil Portalı - Anasayfa</title>
    
    <!-- External CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet"/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/client-portal-theme.css">
    <link rel="stylesheet" href="./css/client-portal-styles.css">
</head>
<body class="dark-mode">
    <div class="d-flex">
        <!-- Sidebar -->
        <nav id="sidebar">
            <div class="p-4">
                <h3 class="text-center mb-4">Müvekkil Portalı</h3>
                
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a href="#anasayfa" class="nav-link active" data-section="anasayfa">
                            <i class="fas fa-home"></i> Anasayfa
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#portfoy" class="nav-link" data-section="portfoy">
                            <i class="fas fa-briefcase"></i> Portföyüm
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#islerim" class="nav-link" data-section="islerim">
                            <i class="fas fa-tasks"></i> İşlerim
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#faturalar" class="nav-link" data-section="faturalar">
                            <i class="fas fa-file-invoice-dollar"></i> Faturalar
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#dava-itiraz" class="nav-link" data-section="dava-itiraz">
                            <i class="fas fa-gavel"></i> Dava & İtiraz
                        </a>
                    </li>
                </ul>
                
                <hr class="my-4">
                
                <!-- User Info -->
                <div class="user-info text-center">
                    <div class="user-avatar mb-2" id="userAvatar">?</div>
                    <p class="mb-0" id="userName">Kullanıcı</p>
                    <small id="userRole">CLIENT</small>
                </div>
                
                <!-- Theme Toggle -->
                <div class="theme-toggle mt-3">
                    <div class="custom-control custom-switch">
                        <input type="checkbox" class="custom-control-input" id="themeSwitch" checked>
                        <label class="custom-control-label" for="themeSwitch">Koyu Tema</label>
                    </div>
                </div>
                
                <!-- Logout -->
                <button class="btn btn-danger btn-block mt-3" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Çıkış Yap
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <div id="content">
            <!-- Anasayfa Section -->
            <section id="anasayfa" class="content-section">
                <div class="header-section mb-4">
                    <h1 class="header-title">Hoş Geldiniz, <span id="welcomeUserName">Kullanıcı</span></h1>
                    <p class="lead">Portföy ve işlem özetiniz aşağıdadır.</p>
                </div>

                <!-- Dashboard Stats -->
                <div class="row mb-4">
                    <div class="col-md-4">
                        <div class="card stat-card">
                            <div class="card-body">
                                <div class="stat-number" id="dashPortfolio">0</div>
                                <div class="stat-label">Toplam Portföy</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card stat-card">
                            <div class="card-body">
                                <div class="stat-number" id="dashPendingApprovals">0</div>
                                <div class="stat-label">Onay Bekleyen İşlem</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card stat-card">
                            <div class="card-body">
                                <div class="stat-number" id="dashUnpaidInvoices">0</div>
                                <div class="stat-label">Ödenmemiş Fatura</div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Portföy Section -->
            <section id="portfoy" class="content-section" style="display: none;">
                <div class="header-section mb-4">
                    <h1 class="header-title">Portföyüm</h1>
                </div>

                <!-- Portföy tabloları burada dinamik olarak yüklenecek -->
                <div id="portfolio-container"></div>
            </section>

            <!-- İşlerim Section -->
            <section id="islerim" class="content-section" style="display: none;">
                <div class="header-section mb-4">
                    <h1 class="header-title">İşlerim</h1>
                </div>

                <!-- Görev kartları burada dinamik olarak yüklenecek -->
                <div id="tasks-container"></div>
            </section>

            <!-- Faturalar Section -->
            <section id="faturalar" class="content-section" style="display: none;">
                <div class="header-section mb-4">
                    <h1 class="header-title">Faturalar</h1>
                </div>

                <!-- Fatura tablosu burada dinamik olarak yüklenecek -->
                <div id="invoices-container"></div>
            </section>

            <!-- Dava & İtiraz Section -->
            <section id="dava-itiraz" class="content-section" style="display: none;">
                <div class="header-section mb-4">
                    <h1 class="header-title">Dava & İtiraz</h1>
                </div>

                <!-- Dava/İtiraz tablosu burada dinamik olarak yüklenecek -->
                <div id="litigation-container"></div>
            </section>
        </div>
    </div>

    <!-- External Scripts -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Main Script -->
    <script type="module" src="./js/client-portal-main.js"></script>
</body>
</html>
