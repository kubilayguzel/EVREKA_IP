// İşlem sonucu ID'lerini metne çeviren harita ve fonksiyon
const REQUEST_RESULT_STATUS = {
    '24': 'Eksiklik Bildirimi',
    '28': 'Kabul',
    '29': 'Kısmi Kabul',
    '30': 'Ret',
    '31': 'B.S - Kabul',
    '32': 'B.S - Kısmi Kabul',
    '33': 'B.S - Ret',
    '34': 'İ.S - Kabul',
    '35': 'İ.S - Kısmi Kabul',
    '36': 'İ.S - Ret',
    '50': 'Kabul',
    '51': 'Kısmi Kabul',
    '52': 'Ret'
};

function formatObjectionStatus(requestResultId) {
    if (requestResultId === undefined || requestResultId === null || requestResultId === '') {
        return 'Karar Bekleniyor';
    }
    const key = String(requestResultId);
    return REQUEST_RESULT_STATUS[key] ?? `Bilinmiyor (ID: ${key})`;
}

// Transaction'ları parent/child olarak gruplayan yardımcı fonksiyon (Portföyden kopyalandı)
function buildParentChild(transactions){
  // Yayına İtiraz, Yeniden İnceleme İtirazı gibi Parent İşlem ID'leri
  const PARENT_TYPE_IDS = ['7','19','20']; 
  const parentsMap = new Map();
  const childrenMap = {};
  for (const tx of transactions){
    if (PARENT_TYPE_IDS.includes(String(tx.type)) && (tx.transactionHierarchy === 'parent' || !tx.parentId)){
      parentsMap.set(tx.id, tx);
      childrenMap[tx.id] = [];
    }
  }
  for (const tx of transactions){
    if (tx.parentId && childrenMap[tx.parentId]){
      childrenMap[tx.parentId].push(tx);
    }
  }
  Object.values(childrenMap).forEach(arr => arr.sort((a,b)=> new Date(a.timestamp)-new Date(b.timestamp)));
  const parents = [...parentsMap.values()].sort((a,b)=> new Date(a.timestamp)-new Date(b.timestamp));
  return {parents, childrenMap};
}

// Tarih formatlama (dd.mm.yyyy)
function fmtDate(d) {
    try {
        if (!d) return '-';
        let dt;
        if (typeof d === 'string') dt = new Date(d);
        else if (typeof d?.toDate === 'function') dt = d.toDate();
        else if ('seconds' in (d||{})) dt = new Date(d.seconds*1000);
        else if (d instanceof Date) dt = d;
        else return String(d);
        if (isNaN(dt.getTime())) return String(d);
        return dt.toLocaleDateString('tr-TR');
    } catch { return String(d); }
}

// 2. Task Belgesi Çekme Mantığı (Portföydeki ile senkronize edildi)
async function fetchTaskDocuments(taskId) {
    if (!taskId) return [];
    try {
        const taskDoc = await getDoc(doc(db, 'tasks', taskId)); 
        if (!taskDoc.exists()) return [];
        
        const taskData = taskDoc.data();
        let docs = [];

        if (taskData.details?.epatsDocument) {
            docs.push({
                fileName: taskData.details.epatsDocument.name || 'ePats Belgesi',
                fileUrl: taskData.details.epatsDocument.downloadURL, 
                evrakNo: taskData.details.epatsDocument.turkpatentEvrakNo,
                type: 'epats_document'
            });
        }

        if (Array.isArray(taskData.documents)) {
            taskData.documents.forEach(doc => {
                const fileUrl = doc.downloadURL || doc.url || doc.path; 
                if (fileUrl) { 
                    docs.push({
                        fileName: doc.name || 'Task Belgesi',
                        fileUrl: fileUrl, 
                        type: doc.type || 'task_document',
                        isTaskDoc: true
                    });
                }
            });
        }
        
        return docs;
    } catch (error) {
        console.error('Task belgeleri getirilirken hata:', taskId, error);
        return [];
    }
}

// Belge ikonlarını oluşturan yardımcı fonksiyon (Client Portal stiline göre basit buton)
function _createDocLinkHtml(pdf) {
    let iconClass = 'fas fa-file-pdf';
    let titleText = pdf.fileName || 'Belge';
    let btnClass = 'btn-danger';
    let badgeHtml = '';

    if (pdf.type === 'opposition_petition') {
        iconClass = 'fas fa-gavel';
        titleText = 'Karşı Taraf İtiraz Dilekçesi';
        btnClass = 'btn-warning';
    } else if (pdf.type === 'official_document') {
        iconClass = 'fas fa-file-signature';
        titleText = 'Resmi Yazı';
        btnClass = 'btn-success';
    } else if (pdf.type === 'epats_document') {
        iconClass = 'fas fa-file-invoice';
        titleText = `ePats: ${pdf.evrakNo || pdf.fileName}`;
        btnClass = 'btn-info';
        if (pdf.evrakNo) badgeHtml = `<small class="ml-1" style="color:inherit;">${pdf.evrakNo}</small>`;
    } else if (pdf.type === 'task_document' || pdf.isTaskDoc) {
        iconClass = 'fas fa-file-alt';
        titleText = 'Görev Belgesi: ' + pdf.fileName;
        btnClass = 'btn-primary';
    } else if (pdf.type === 'child_manual_document' || pdf.isManualDoc) { 
        iconClass = 'fas fa-file-export'; 
        titleText = 'Manuel Belge: ' + pdf.fileName;
        btnClass = 'btn-secondary';
    }
    
    // Güvenli indirme/açma
    return `<a onclick="window.open('${pdf.fileUrl || pdf.path}', '_blank', 'noopener');" 
            title="${titleText}" class="btn btn-sm ${btnClass} mr-1" style="cursor: pointer; padding: 5px 8px; font-size: 0.85rem; line-height: 1;">
        <i class="${iconClass}"></i>
        ${badgeHtml}
    </a>`;
}

// ✅ PDF'leri transaction ID'sine göre getir
async function fetchPdfsForTransactions(transactionIds) {
  if (!transactionIds || transactionIds.length === 0) return {};
  
  try {
    const pdfMap = {};
    // unindexed_pdfs koleksiyonundan PDF'leri çek
    const pdfsQuery = query(
      collection(db, 'unindexed_pdfs'),
      where('associatedTransactionId', 'in', transactionIds),
      where('status', '==', 'indexed')
    );
    
    const pdfsSnapshot = await runGetDocs(pdfsQuery);
    
    pdfsSnapshot.forEach(doc => {
      const pdfData = doc.data();
      const txId = pdfData.associatedTransactionId;
      
      if (!pdfMap[txId]) {
        pdfMap[txId] = [];
      }
      
      pdfMap[txId].push({
        id: doc.id,
        fileName: pdfData.fileName || 'Belge',
        fileUrl: pdfData.fileUrl || pdfData.url,
        indexedAt: pdfData.indexedAt
      });
    });
    
    return pdfMap;
  } catch (error) {
    console.error('PDF\'ler getirilirken hata:', error);
    return {};
  }
}


// 3. İtiraz Verisi Çekme ve Yetkilendirme Fonksiyonu (Ana Mantık)
window.loadObjectionsData = async function(linkedPersonIds) {
    const allObjectionRows = [];
    const parentTypeIds = ['7', '19', '20']; 
    window.objectionCache = window.objectionCache || {};
    
    // (1) Yetkili tüm portföy kayıtlarını al (fetchAndDisplayPortfolio'dan gelen)
    // Marka/Patent/Tasarım listelerinin yüklenmesini bekle
    const allRecords = window.markaPaginationData?.allDataUnfiltered || [];

    // Client Portal'a özel: Tüm çekilen kayıtların benzersiz listesini kullan (Sadece Client'ın kayıtları)
    const uniqueRecordIds = new Set(allRecords.map(r => r.id));
    const uniqueRecords = allRecords.filter((obj, index) => uniqueRecordIds.has(obj.id) && index === allRecords.findIndex(o => o.id === obj.id));

    if (uniqueRecords.length === 0) {
        console.warn("Client'ın portföyünde kayıt bulunamadı, itiraz taraması yapılamıyor.");
        return [];
    }
    
    // (2) Her kayıt için transaction'ları çek ve filtrele (Eşzamanlılığı artırmak için Promise.all kullan)
    const txPromises = uniqueRecords.map(async (record) => {
        let txs = [];
        try {
            // Cache kontrolü
            if (window.objectionCache[record.id]?.transactions) {
                txs = window.objectionCache[record.id].transactions;
            } else {
                // Transaction'ları çek
                const txSnap = await runGetDocs(collection(db, 'ipRecords', record.id, 'transactions'));
                txs = txSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                const pc = buildParentChild(txs);
                window.objectionCache[record.id] = { transactions: txs, ...pc };
            }
        } catch (e) {
            console.warn(`❌ Record transaction çekme hatası: ${record.id}`, e);
            return [];
        }
        
        // Parent itirazlarını filtrele
        const parentTxs = txs.filter(tx => 
            parentTypeIds.includes(String(tx.type)) && !tx.parentId
        );

        if (parentTxs.length === 0) return [];
        
        const rows = [];
        for (const parentTx of parentTxs) {
            const typeMeta = await window._getTransactionTypeMeta(parentTx.type);
            const transactionTypeName = typeMeta?.alias || typeMeta?.name || `İşlem ${parentTx.type}`;
            
            const opponentName =
                parentTx.oppositionOwner ||
                parentTx.relatedParty?.name ||
                (Array.isArray(parentTx.objectionOwners) && parentTx.objectionOwners.length
                ? parentTx.objectionOwners.map(o => o.name).join(', ')
                : '-');
            
            const bulletinNo = record.details?.brandInfo?.opposedMarkBulletinNo || parentTx.bulletinNo || '-';
            const bulletinDate = record.details?.brandInfo?.opposedMarkBulletinDate || parentTx.bulletinDate || null;
            const epatsDate = parentTx.epatsDocument?.documentDate || parentTx.timestamp || null;

            let statusText = formatObjectionStatus(parentTx.requestResult);
            
            rows.push({
                id: parentTx.id, // Transaction ID
                recordId: record.id, // Portföy Record ID
                recordType: record.type || '-',
                title: record.title || record.brandText || '',
                transactionTypeName,
                applicationNumber: record.applicationNumber || record.applicationNo || '-',
                applicantName: (record.applicants?.map?.(a => a.name).join(', ')) || '-',
                opponent: opponentName,
                bulletinDate: fmtDate(bulletinDate),
                bulletinNo,
                epatsDate: fmtDate(epatsDate),
                statusText,
                timestamp: parentTx.timestamp,
                triggeringTaskId: parentTx.triggeringTaskId,
                isObjectionParent: true // Sadece itiraz parentlarını işaretle
            });
        }
        return rows;
    });

    const allResults = await Promise.all(txPromises);
    allResults.flat().forEach(row => allObjectionRows.push(row));

    // En yeni işleme göre sırala
    allObjectionRows.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
    
    return allObjectionRows;
}

// 4. Tabloyu Render Etme Fonksiyonu
window.renderObjectionTable = async function(page, perPage) {
    const $tbody = $('#objectionsTableBody');
    $tbody.empty();
    const list = window.objectionPaginationData.allData;
    
    const startIndex = (page - 1) * perPage;
    const pageData = list.slice(startIndex, startIndex + perPage);
    
    if (pageData.length === 0) {
        $tbody.html('<tr><td colspan="11" class="text-center py-5">Bu filtreye uygun itiraz kaydı bulunmamaktadır.</td></tr>');
        return;
    }
    
    const renderPromises = pageData.map(async (row, index) => {
        const recordId = row.recordId;
        const parentTxId = row.id;
        const actualIndex = startIndex + index + 1;

        const txData = window.objectionCache[recordId];
        const parent = (txData.parents || []).find(p => p.id === parentTxId);
        const children = (txData.childrenMap || {})[parentTxId] || [];
        
        if (!parent) return null;

        const hasChildren = children.length > 0;
        const accordionId = `objection-accordion-${row.id}`;

        // --- PARENT BELGE ÇEKİMİ ---
        const parentPdfs = await fetchPdfsForTransactions([parentTxId]);
        let allParentDocs = (parentPdfs[parentTxId] || []);
        
        const existingParentFileNames = new Set(allParentDocs.map(d => d.fileName).filter(Boolean));
        const IS_OPPOSITION_PARENT = String(parent.type) === '20' || String(parent.type) === '19';
        
        // Task belgelerini al (ePats dahil)
        if (row.triggeringTaskId) {
            const taskDocs = await fetchTaskDocuments(row.triggeringTaskId);
            taskDocs.forEach(doc => {
                if (doc.fileName && !existingParentFileNames.has(doc.fileName)) {
                    allParentDocs.push(doc);
                    existingParentFileNames.add(doc.fileName);
                }
            });
        }
        
        // Parent'ın kendi documents array'i
        (parent.documents || []).forEach(doc => {
            const fileUrl = doc.downloadURL || doc.url || doc.path || doc.content;
            if (fileUrl && doc.name && !existingParentFileNames.has(doc.name)) {
                 allParentDocs.push({
                    fileName: doc.name,
                    fileUrl: fileUrl,
                    type: doc.type,
                    isTransactionDoc: true
                });
            }
        });

        // Parent Belge Linklerini Oluşturma
        const parentDocLinks = IS_OPPOSITION_PARENT 
            ? '<span class="text-muted">-</span>' 
            : allParentDocs.map(_createDocLinkHtml).join(''); 

        // Parent Satırını Oluştur
        const parentTr = document.createElement('tr');
        if (hasChildren) {
             parentTr.classList.add('accordion-header-row');
             parentTr.setAttribute('data-toggle', 'collapse');
             parentTr.setAttribute('data-target', `#${accordionId}`);
             parentTr.setAttribute('aria-expanded', 'false');
             parentTr.setAttribute('aria-controls', `${accordionId}`);
        }
        parentTr.dataset.groupId = parentTxId;
        parentTr.dataset.recordId = recordId;

        parentTr.innerHTML = `
            <td style="width: 44px;">${hasChildren ? '<i class="fas fa-chevron-right mr-2"></i>' : ''}${actualIndex}</td>
            <td><a href="#" class="portfolio-detail-link" data-item-id="${recordId}" data-toggle="modal" data-target="#portfolioDetailModal">${row.title || '-'}</a></td>
            <td>${row.transactionTypeName || '-'}</td>
            <td>${row.applicationNumber || '-'}</td>
            <td>${row.applicantName || '-'}</td>
            <td>${row.opponent || '-'}</td>
            <td>${row.bulletinDate || '-'}</td>
            <td>${row.bulletinNo || '-'}</td>
            <td>${row.epatsDate || '-'}</td>
            <td><span class="badge badge-secondary">${row.statusText || '-'}</span></td>
            <td class="transaction-pdfs" style="min-width: 150px; text-align: center;">${parentDocLinks}</td>`;
        
        const result = [parentTr];

        // Child Satırlarını Oluştur
        if (hasChildren) {
            const detailRow = document.createElement('tr');
            detailRow.dataset.parentId = parentTxId;
            detailRow.innerHTML = `
                <td colspan="11" class="p-0">
                    <div class="collapse" id="${accordionId}">
                        <table class="table mb-0 accordion-table" style="width: 100%;">
                            <thead>
                                <tr style="background: var(--dark-mode-table-header-bg, #f8f9fa);">
                                    <th style="width: 44px;">#</th>
                                    <th>İşlem Açıklaması</th>
                                    <th colspan="2">Başvuru No</th>
                                    <th>Baş. Sahibi</th>
                                    <th>İtiraz Eden</th>
                                    <th colspan="2">Tarih</th>
                                    <th>Durum</th>
                                    <th colspan="2" style="min-width: 150px;">Evraklar</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${await Promise.all(children.map(async (child, childIndex) => {
                                    const childTypeMeta = await window._getTransactionTypeMeta(child.type);
                                    const childTypeName = childTypeMeta?.alias || childTypeMeta?.name || `İşlem ${child.type}`;
                                    
                                    // --- CHILD BELGE ÇEKİMİ ---
                                    const childPdfs = await fetchPdfsForTransactions([child.id]);
                                    let allChildDocs = (childPdfs[child.id] || []);
                                    const existingChildFileNames = new Set(allChildDocs.map(d => d.fileName).filter(Boolean));
                                    
                                    const IS_OPPOSITION_NOTICE = String(child.type) === '27';
                                    
                                    // Task belgelerini çekme (Karşı Görüş/İtiraz Bildirimi)
                                    if (child.triggeringTaskId) {
                                        const taskDocs = await fetchTaskDocuments(child.triggeringTaskId); 
                                        taskDocs.forEach(doc => {
                                            if (doc.fileName && !existingChildFileNames.has(doc.fileName)) {
                                                allChildDocs.push(doc);
                                                existingChildFileNames.add(doc.fileName);
                                            }
                                        });
                                    }
                                    
                                    // Child'ın kendi documents array'i
                                    (child.documents || []).forEach(doc => {
                                        const fileUrl = doc.downloadURL || doc.url || doc.path || doc.content;
                                        if (fileUrl && doc.name && !existingChildFileNames.has(doc.name)) {
                                             allChildDocs.push({
                                                fileName: doc.name,
                                                fileUrl: fileUrl,
                                                type: doc.type,
                                                isTransactionDoc: true
                                            });
                                        }
                                    });

                                    // İtiraz Bildirimi (27) ise Parent'ın belgelerini de ekle
                                    if (IS_OPPOSITION_NOTICE) {
                                        allParentDocs.forEach(doc => {
                                            if (doc.fileName && !existingChildFileNames.has(doc.fileName)) {
                                                allChildDocs.push({...doc, isParentDoc: true}); // Parent'tan geldiğini işaretle
                                                existingChildFileNames.add(doc.fileName);
                                            }
                                        });
                                    }

                                    // Child Belge Linkleri HTML'i
                                    const childDocLinks = allChildDocs.map(_createDocLinkHtml).join('');
                                    
                                    // Child satırı
                                    return `
                                        <tr class="accordion-body-row">
                                            <td>${actualIndex}.${childIndex + 1}</td>
                                            <td style="text-align: left; padding-left: 32px;">↳ ${childTypeName}</td>
                                            <td colspan="2">${row.applicationNumber || '-'}</td>
                                            <td>${row.applicantName || '-'}</td>
                                            <td>${row.opponent || '-'}</td>
                                            <td colspan="2">${fmtDate(child.timestamp)}</td>
                                            <td><span class="badge badge-secondary">${formatObjectionStatus(child.requestResult)}</span></td>
                                            <td colspan="2" class="transaction-pdfs" style="min-width: 150px; text-align: center;">${childDocLinks || '<span class="text-muted">-</span>'}</td>
                                        </tr>`;
                                })).join('')}
                            </tbody>
                        </table>
                    </div>
                </td>
            `;
            result.push(detailRow);
        }

        return result;
    });

    const allElements = (await Promise.all(renderPromises)).flat().filter(e => e instanceof Element);
    allElements.forEach(e => $tbody.append(e));

    // Bootstrap collapse'u tetiklemesi için
    $tbody.find('.collapse').collapse({ toggle: false });
}

// Tema yönetimi
function initTheme() {
    const themeSwitch = document.getElementById('themeSwitch');
    const body = document.body;
    const toggleLabel = document.querySelector('.theme-toggle .custom-control-label');
    const savedTheme = localStorage.getItem('theme') || 'dark';

    if (savedTheme === 'light') {
        body.classList.add('light-mode');
        themeSwitch.checked = false;
        toggleLabel.textContent = 'Beyaz Tema';
    } else {
        body.classList.add('dark-mode');
        themeSwitch.checked = true;
        toggleLabel.textContent = 'Koyu Tema';
    }

    themeSwitch.addEventListener('change', function () {
        if (this.checked) {
            body.classList.remove('light-mode');
            body.classList.add('dark-mode');
            localStorage.setItem('theme', 'dark');
            toggleLabel.textContent = 'Koyu Tema';
        } else {
            body.classList.remove('dark-mode');
            body.classList.add('light-mode');
            localStorage.setItem('theme', 'light');
            toggleLabel.textContent = 'Beyaz Tema';
        }
    });
}

// --- Portfolio Yükleme ve Tablo Doldurma (Marka, Patent, Tasarım) ---
function getCountryName(code) {
    if (!window.countriesMap) return code || '-';
    return window.countriesMap[code] || code || '-';
}

function populatePortfolioTable(tableId, portfolioData, startIndex = 0) {
    const tableBody = document.querySelector(`${tableId} tbody`);
    if (!tableBody) return;
    tableBody.innerHTML = '';

    portfolioData.forEach((item, index) => {
        const actualIndex = startIndex + index;
        const mainRow = document.createElement('tr');

        const originRaw = (item.origin || 'TÜRKPATENT').toString().trim();
        const originUpper = originRaw.toUpperCase();

        const originBucket = (originUpper === 'TÜRKPATENT' || originUpper === 'TURKPATENT')
        ? 'TÜRKPATENT'
        : 'YURTDISI';

        const isParent = item.transactionHierarchy === 'parent';
        const isChild = item.transactionHierarchy === 'child';
        if (isChild) { return; }
        
        let childRecords = [];
        if (isParent && window.markaPaginationData && window.markaPaginationData.allDataUnfiltered) {
            // Basitleştirilmiş filtreleme: Aynı title veya parentId ile bul
            childRecords = window.markaPaginationData.allDataUnfiltered.filter(p => 
                (p.parentId === item.id || (p.transactionHierarchy === 'child' && p.title === item.title)) && p.id !== item.id
            );

/**
 * Kullanıcı kimliğine göre portföy verilerini çeker ve tabloyu doldurur.
 */
async function fetchAndDisplayPortfolio() {
    const user = authService.getCurrentUser();
    const userId = user ? user.uid : null;
    
    if (!userId || !db) { return; }

    try {
        const userDocRef = doc(db, "users", userId);
        const userSnapshot = await getDoc(userDocRef);
        if (!userSnapshot.exists()) { return; }

        const userData = userSnapshot.data();
        const linkedPersonIds = userData.linkedPersonIds || [];
        window.__linkedPersonIds = Array.isArray(linkedPersonIds) ? linkedPersonIds : [];

        if (!linkedPersonIds || linkedPersonIds.length === 0) { return; }
        
        // Ülke verilerini çek
        const countriesDoc = await getDoc(doc(db, "common", "countries"));
        if (countriesDoc.exists()) {
            const countriesData = countriesDoc.data();
            window.countriesMap = {};
            if (countriesData.list && Array.isArray(countriesData.list)) {
                countriesData.list.forEach(country => {
                    if (country.code && country.name) {
                        window.countriesMap[country.code] = country.name;
                    }
                });
            }
        } else {
            window.countriesMap = {};
        }

        const allIpQuery = query(collection(db, "ipRecords"));
        const allIpSnap = await runGetDocs(allIpQuery);
        let allPortfolios = [];

        allIpSnap.forEach(doc => {
            const data = doc.data();
            if (data.applicants && Array.isArray(data.applicants)) {
                const hasMatch = data.applicants.some(applicant => {
                    return applicant && applicant.id && linkedPersonIds.includes(applicant.id);
                });
                if (hasMatch) { allPortfolios.push({ id: doc.id, ...data }); }
            }
        });

        const seen = new Set();
        allPortfolios = allPortfolios.filter(p => {
            if (seen.has(p.id)) return false;
            seen.add(p.id);
            return true;
        });

        const markaList = allPortfolios.filter(p => 
            p.type === 'trademark' || p.type === 'Marka' || p.type === 'marka'
        );
        const patentList = allPortfolios.filter(p => 
            p.type === 'patent' || p.type === 'Patent'
        );
        const tasarimList = allPortfolios.filter(p => 
            p.type === 'design' || p.type === 'Tasarım' || p.type === 'tasarim'
        );
        // Dava/İtiraz sekmesine ayrı bir filtreleme yapmıyoruz. Tüm kayıtlar işlenir.
        // const davaIItirazList = allPortfolios.filter(p => ...); 

        const __markaData = Array.isArray(markaList) ? markaList : [];

        window.markaPaginationData = {
            allDataUnfiltered: __markaData,
            allData: __markaData,
            pagination: null
        };
        
        const __markaPag = new Pagination({
        itemsPerPage: 10,
        containerId: 'markaPagination',
        onPageChange: (page, perPage) => {
            const start = (page - 1) * perPage;
            const slice = window.markaPaginationData.allData.slice(start, start + perPage);
            populatePortfolioTable('#marka-list', slice, start);
            const currentFilter = $("#menseFilter").val() || 'TÜRKPATENT';
            if (currentFilter === 'TÜRKPATENT') {
                $("#marka-list th.col-origin, #marka-list td.col-origin").hide();
            } else {
                $("#marka-list th.col-origin, #marka-list td.col-origin").show();
            }
        }
        });
        
        window.markaPaginationData.pagination = __markaPag;
        
        const filteredData = __markaData.filter(item => {
            var orig = (item.origin || 'TÜRKPATENT').toString().toUpperCase().trim();
            return orig === 'TÜRKPATENT' || orig === 'TURKPATENT' || orig === '';
        });
        
        window.markaPaginationData.allData = filteredData;
        __markaPag.update(filteredData.length);
        populatePortfolioTable('#marka-list', filteredData.slice(0, 10), 0);
        
        setTimeout(() => {
            $("#marka-list th.col-origin, #marka-list td.col-origin").hide();
        }, 100);

        populatePortfolioTable('#patent-list', patentList);
        populatePortfolioTable('#tasarim-list', tasarimList);
        
        setDashboardLoading(false);

        await populateDashboardNumbers(linkedPersonIds, allPortfolios);
        await window.fetchAndDisplayTasks(linkedPersonIds);
        await window.fetchAndDisplayInvoices(linkedPersonIds);

    } catch (error) {
        console.error("Portföy verileri çekilirken bir hata oluştu:", error);
    }
}

window.populateDashboardNumbers = async function (linkedPersonIds, allPortfolios){
    const portfolioCount = allPortfolios.length;
    const taskQ = query(
      collection(db, "tasks"),
      where("personsRelatedIds", "array-contains-any", linkedPersonIds),
      where("status","==","awaiting_client_approval")
    );
    const taskSnap = await runGetDocs(taskQ);
    const pendingTasks = taskSnap.size;

    const accrualQ = query(
      collection(db, "accruals"),
      where("personsRelatedIds", "array-contains-any", linkedPersonIds),
      where("isPaid","==", false)
    );
    const accrualSnap = await runGetDocs(accrualQ);
    const unpaidInvoices = accrualSnap.size;

    writeDashSafe('#dashPortfolio',        portfolioCount);
    writeDashSafe('#dashPendingApprovals', pendingTasks);
    writeDashSafe('#dashUnpaidInvoices',   unpaidInvoices);
}

window.fetchAndDisplayInvoices = async function (linkedPersonIds) {
  try {
    if (!Array.isArray(linkedPersonIds) || linkedPersonIds.length === 0) {
      return;
    }

    const table = document.querySelector('#invoices table');
    if (!table) {
      return;
    }

    const tableBody = table.querySelector('tbody') || table.createTBody();
    tableBody.innerHTML = '';

    // Firestore sorgusu
    const q = query(
      collection(db, 'accruals'),
      where('personsRelatedIds', 'array-contains-any', linkedPersonIds)
    );
    const snap = await runGetDocs(q);

    snap.forEach((d) => {
      const a = d.data();
      const statusBadge = a.isPaid
        ? `<span class="badge badge-success">Ödendi</span>`
        : `<span class="badge badge-warning">Ödenmemiş</span>`;

      const actions = a.isPaid
        ? `<button class="btn btn-primary btn-sm btn-action"><i class="fas fa-download"></i> İndir</button>`
        : `<button class="btn btn-primary btn-sm btn-action"><i class="fas fa-download"></i> İndir</button>
           <button class="btn btn-success btn-sm btn-action"><i class="fas fa-lira-sign"></i> Öde</button>`;

      tableBody.insertAdjacentHTML(
        'beforeend',
        `
        <tr>
          <td>${a.invoiceNo || '-'}</td>
          <td>${a.date || '-'}</td>
          <td>${a.description || '-'}</td>
          <td>${a.amount || '-'}</td>
          <td>${statusBadge}</td>
          <td>${actions}</td>
        </tr>
        `
      );
    });
  } catch (err) {
    console.error('Faturalar çekilirken hata:', err);
  }
};

(function(){

function getRowOrigin($row){
    var v = ($row.attr('data-origin') || '').toString().toUpperCase().trim();
    if (v === 'TÜRKPATENT' || v === 'TURKPATENT') return 'TÜRKPATENT';
    return 'YURTDISI';
}

  function toggleWipoGroup($headerRow, show){
    var $detailRow = $headerRow.next('tr');
    if(show){
      $headerRow.show();
      $detailRow.show();
    }else{
      var collapseId = $headerRow.attr('data-target');
      if(collapseId){ try { $(collapseId).collapse('hide'); } catch(e){} }
      $headerRow.hide();
      $detailRow.hide();
    }
  }

function filterPaneByMense(paneSelector, menseValue){
    var $tbody = $(paneSelector + " tbody");
    if($tbody.length === 0) return;
    var $rows = $tbody.children("tr");

    var isTR = (menseValue === 'TÜRKPATENT');
    var isYD = (menseValue === 'YURTDISI');
    var isALL = (menseValue === 'HEPSI');

    $rows.each(function(){
        var $tr = $(this);
        var rowOrigin = getRowOrigin($tr);
        
        var isTurkpatent = (rowOrigin === 'TÜRKPATENT');
        var isYurtdisi = (rowOrigin && rowOrigin !== 'TÜRKPATENT');
    

        if($tr.hasClass('accordion-header-row')){
            if (isALL) {
                toggleWipoGroup($tr, true);

// Türkçe karakter normalize
function _normalizeTr(s){
  if(!s) return '';
  return String(s)
    .toLowerCase()
    .replaceAll('ı','i').replaceAll('ğ','g').replaceAll('ü','u')
    .replaceAll('ş','s').replaceAll('ö','o').replaceAll('ç','c');
}

// transactionTypes meta cache'i (zaten varsa tekrar tanımlama)
const __ttMeta = (window._ttMetaCache = window._ttMetaCache || new Map());
window._getTransactionTypeMeta = async function(typeId){
  if(!typeId) return null;
  const key = String(typeId);
  if(__ttMeta.has(key)) return __ttMeta.get(key);
  try{
    const snap = await getDoc(doc(db,'transactionTypes', key));
    const meta = snap.exists() ? (snap.data()||{}) : null;
    __ttMeta.set(key, meta);
    return meta;
  }catch(_){ return null; }
}

// Task başlığını/etiketlerini tek stringte topla
window._taskLabelGuess = function(t, meta){
  const pieces = [
    meta?.alias, meta?.name,
    t.subType, t.taskSubType, t.category,
    t.details?.category, t.details?.type,
    Array.isArray(t.tags) ? t.tags.join(' ') : '',
    t.title, t.description
  ].filter(Boolean);
  return _normalizeTr(pieces.join(' '));
}
window.RX_BULTEN = /(bulten|izleme|watch|yayin|yayim|yayima|yayıma|gazete)/;

window.fetchAndDisplayTasks = async function(){
  try{
    const user = authService.getCurrentUser();
    if (!user) return;
    
    const userDocRef = doc(db, "users", user.uid);
    const userSnapshot = await getDoc(userDocRef);
    
    if (!userSnapshot.exists()) return;
    
    const linkedPersonIds = userSnapshot.data().linkedPersonIds || [];
    
    if (linkedPersonIds.length === 0) return;
    
    // Sadece onay bekleyenleri çek
    const q = query(
      collection(db,'tasks'),
      where('status','==','awaiting_client_approval')
    );
    const snap = await runGetDocs(q);

    const awaitingTasks = [];
    snap.forEach(d => {
      const taskData = d.data();
      const relatedPartyId = taskData.details?.relatedParty?.id;
      const personsRelated = taskData.personsRelatedIds || [];
      const clientIdInTask = taskData.clientId || taskData.clientID;

      let isRelatedToClient = false;
      
      const isObjectionTask = (taskData.taskType === "20" || 
                               taskData.taskType === 20 || 
                               taskData.taskType === "objection_to_trademark_publication");
      
      if (isObjectionTask) {
        isRelatedToClient = (clientIdInTask && linkedPersonIds.includes(clientIdInTask));
      } else {
        isRelatedToClient = 
            (relatedPartyId && linkedPersonIds.includes(relatedPartyId)) ||
            (Array.isArray(personsRelated) && personsRelated.some(id => linkedPersonIds.includes(id)));
      }
      
      if (!isRelatedToClient) return;
      
      awaitingTasks.push({ id:d.id, ...taskData });
    });
    
    window.__allClientTasks = awaitingTasks;

    let countPending   = 0;
    let countRenewal   = 0;
    let countBulletin  = 0;

    for(const t of awaitingTasks){
      const meta  = await _getTransactionTypeMeta(t.taskType);
      const label = _taskLabelGuess(t, meta);

      const isRenewal = /yenileme/.test(label);
      const isBulletin = RX_BULTEN.test(label) || t.taskType === '20' || t.taskType === 20;

      if (isRenewal) {
        countRenewal++;
      } else if (isBulletin) {
        countBulletin++;
      } else {
        countPending++;
      }
    }

    $('#taskCount-pending-approval').text(countPending);
    $('#taskCount-renewal-approval').text(countRenewal);
    $('#taskCount-bulletin-watch').text(countBulletin);
    $('#taskCount-marka-total').text(countPending + countRenewal + countBulletin);
  }catch(err){
    console.error('Tasks sayaclari doldurulurken hata:', err);
  }
};

window.renderTaskPage = function(page, perPage) {

    const allData = window.taskPaginationData.allData || [];

    const tasksToRender = allData.slice(startIndex, startIndex + perPage);

    container.innerHTML = '';

    const taskListDetails = document.getElementById('task-list-details');
    const taskType = taskListDetails ? taskListDetails.dataset.currentType : '';
    const isCompletedView = (taskType === 'completed-tasks');

    Promise.all(tasksToRender.map(async (task, index) => {
        const taskId = task.id;
        const taskNumber = startIndex + index + 1; 
        
        let transactionAlias = 'İşlem';
        if (task.taskType) {
            try {
                const transactionDoc = await getDoc(doc(db, 'transactionTypes', String(task.taskType)));
                if (transactionDoc.exists()) {
                    transactionAlias = (transactionDoc.data().alias || transactionDoc.data().name || 'İşlem').toLocaleUpperCase('tr-TR');

        }

                if (ipDoc.exists()) {
                    const ipData = ipDoc.data();
                    const appNo = ipData.applicationNumber || ipData.applicationNo || '-';
                    const brandText = ipData.brandText || ipData.title || '-';
                    taskTitle = `${transactionAlias} - ${appNo} - ${brandText}`;
                }
            } catch (e) { }
        }

        const card = document.createElement('div');
        card.className = 'col-md-12 mb-4';

        const statusBadgeClass = {
            'open': 'primary', 'in_progress': 'info', 'completed': 'success', 'closed': 'secondary',
            'awaiting_client_approval': 'warning', 'müvekkil onayı - kapatıldı': 'danger'
        }[task.status] || 'secondary';
        
        const statusText = {
            'open': 'Açık', 'in_progress': 'Devam Ediyor', 'completed': 'Tamamlandı', 'closed': 'Kapalı',
            'awaiting_client_approval': 'Onay Bekliyor', 'müvekkil onayı - kapatıldı': 'Reddedildi/Kapandı'
        }[task.status] || task.status;
        
        let assignedTo = '-'; 
        let actionButtons;

        if (isCompletedView) {
            const reopenButton = (task.status === 'müvekkil onayı - kapatıldı') 
                ? `<button class="btn btn-success btn-sm btn-action task-reopen" data-task-id="${taskId}"> <i class="fas fa-folder-open"></i> İşi Aç </button>`
                : '';
            
            actionButtons = `
                <button class="btn btn-info btn-sm btn-action task-detail" data-task-id="${taskId}"> <i class="fas fa-eye"></i> İncele </button>
                ${reopenButton}
            `;
        } else {
            actionButtons = `
                <button class="btn btn-success btn-sm btn-action task-approve" data-task-id="${taskId}"> <i class="fas fa-check"></i> Onayla </button>
                <button class="btn btn-danger btn-sm btn-action task-reject" data-task-id="${taskId}"> <i class="fas fa-times"></i> Reddet </button>
                <button class="btn btn-info btn-sm btn-action task-detail" data-task-id="${taskId}"> <i class="fas fa-eye"></i> İncele </button>
            `;
        }
        
        const formatDate = (timestamp) => {
            if (!timestamp) return '-';
            try {
                let date;
                if (timestamp && typeof timestamp === 'object' && typeof timestamp.toDate === 'function') {
                    date = timestamp.toDate();
                } else if (timestamp && typeof timestamp === 'object' && timestamp.seconds) {
                    date = new Date(timestamp.seconds * 1000);
                } else {
                    date = new Date(timestamp);
                }
                if (isNaN(date.getTime())) { return '-'; }
                const day = String(date.getDate()).padStart(2, '0');
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const year = date.getFullYear();
                return `${day}.${month}.${year}`;
            } catch (e) {
                return '-';
            }
        };
        
        const due = task.dueDate || task.officialDueDate || task.clientDueDate || task.deadline || null;
        
        if (isCompletedView) {

                    </div>
                </div>`;
        } else {
            card.innerHTML = `

                    <div class="task-number-tag">${taskNumber}.</div>

                    </div>

        return card;

// Transactions yükleme fonksiyonu
async function loadTransactions(ipRecordId) {
    const transactionsRef = collection(db, 'ipRecords', ipRecordId, 'transactions');
    const q = query(transactionsRef);
    const snapshot = await runGetDocs(q);
    
    const allTransactions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    
    const txIds = allTransactions.map(tx => tx.id);
    const pdfsByTransaction = await window.fetchPdfsForTransactions(txIds); 
    
    const {parents, childrenMap} = buildParentChild(allTransactions);

    // Tabloyu doldur
    const tableBody = $('#modal-islemler table tbody');
    tableBody.empty();
    
    let rowIndex = 1;
    
    for (const parent of parents) {
        const children = childrenMap[parent.id] || [];
        const hasChildren = children.length > 0;
        const accordionId = `transaction-${parent.id}`;
        
        const typeMeta = await window._getTransactionTypeMeta(parent.type);
        const transactionAlias = typeMeta?.alias || typeMeta?.name || 'İşlem';

        const showOppBadge = ['19','20'].includes(String(parent.type)) && parent.oppositionOwner;
        const oppositionBadgeHtml = showOppBadge
        ? ` <span class="opposition-owner-badge">${parent.oppositionOwner}</span>`
        : '';
        
        // PARENT BELGE ÇEKİMİ (Gelişmiş)
        let allParentDocs = (pdfsByTransaction[parent.id] || []);
        const existingParentFileNames = new Set(allParentDocs.map(d => d.fileName).filter(Boolean));
        const IS_OPPOSITION_PARENT = String(parent.type) === '20' || String(parent.type) === '19';
        
        if (parent.triggeringTaskId) {
            const taskDocs = await fetchTaskDocuments(parent.triggeringTaskId);
            taskDocs.forEach(doc => {
                if (doc.fileName && !existingParentFileNames.has(doc.fileName)) {
                    allParentDocs.push(doc);
                    existingParentFileNames.add(doc.fileName);
                }
            });
        }
        (parent.documents || []).forEach(doc => {
            const fileUrl = doc.downloadURL || doc.url || doc.path || doc.content;
            if (fileUrl && doc.name && !existingParentFileNames.has(doc.name)) {
                 allParentDocs.push({
                    fileName: doc.name,
                    fileUrl: fileUrl,
                    type: doc.type,
                    isTransactionDoc: true
                });
            }
        });
        
        const parentPdfLinks = IS_OPPOSITION_PARENT 
            ? '<span class="text-muted">-</span>'
            : allParentDocs.map(_createDocLinkHtml).join('');
        
        // Parent satırı
        const parentRow = `
            <tr class="${hasChildren ? 'accordion-header-row' : ''}" ${hasChildren ? `data-toggle="collapse" data-target="#${accordionId}" aria-expanded="false" aria-controls="${accordionId}"` : ''}>
                <td>${hasChildren ? '<i class="fas fa-chevron-right mr-2"></i>' : ''}${rowIndex}</td>
                <td style="text-align:left;">${transactionAlias}${oppositionBadgeHtml}</td>
                <td>${fmtDate(parent.timestamp)}</td>
                <td>${parentPdfLinks || '<span class="text-muted">-</span>'}</td>
            </tr>
        `;
        
        tableBody.append(parentRow);
        
        // Child satırları (akordeon içinde)
        if (hasChildren) {
            let childTableHtml = `
                <tr>
                    <td colspan="4" class="p-0">
                        <div class="collapse" id="${accordionId}">
                            <table class="table mb-0 accordion-table">
                                <thead>
                                    <tr>
                                        <th style="width: 56px;">#</th>
                                        <th style="text-align: left;">İşlem Açıklaması</th>
                                        <th style="width: 120px;">Tarih</th>
                                        <th style="width: 150px;">Evrak</th>
                                    </tr>
                                </thead>
                                <tbody>
            `;
            
            for (const [idx, child] of children.entries()) {
                const childTypeMeta = await window._getTransactionTypeMeta(child.type);
                const childAlias = childTypeMeta?.alias || childTypeMeta?.name || `İşlem ${child.type}`;
                
                // CHILD BELGE ÇEKİMİ (Gelişmiş)
                const childPdfs = await fetchPdfsForTransactions([child.id]);
                let allChildDocs = (childPdfs[child.id] || []);
                const existingChildFileNames = new Set(allChildDocs.map(d => d.fileName).filter(Boolean));
                
                if (child.triggeringTaskId) {
                    const taskDocs = await fetchTaskDocuments(child.triggeringTaskId); 
                    taskDocs.forEach(doc => {
                        if (doc.fileName && !existingChildFileNames.has(doc.fileName)) {
                            allChildDocs.push(doc);
                            existingChildFileNames.add(doc.fileName);
                        }
                    });
                }
                (child.documents || []).forEach(doc => {
                    const fileUrl = doc.downloadURL || doc.url || doc.path || doc.content;
                    if (fileUrl && doc.name && !existingChildFileNames.has(doc.name)) {
                         allChildDocs.push({
                            fileName: doc.name,
                            fileUrl: fileUrl,
                            type: doc.type,
                            isTransactionDoc: true
                        });
                    }
                });

                const childPdfLinks = allChildDocs.map(_createDocLinkHtml).join('');

                childTableHtml += `
                    <tr class="accordion-body-row">
                        <td>${rowIndex}.${idx + 1}</td>
                        <td style="text-align: left;">${childAlias}</td>
                        <td>${fmtDate(child.timestamp)}</td>
                        <td>${childPdfLinks || '<span class="text-muted">-</span>'}</td>
                    </tr>
                `;
            }
            
            childTableHtml += `
                                </tbody>
                            </table>
                        </div>
                    </td>
                </tr>
            `;
            
            tableBody.append(childTableHtml);
        }
        
        rowIndex++;
    }
}

    // Modal tab'ları için event handler (aynı kalır)
    $(document).ready(function() {
    $(document).on('click', '#myTab a[data-toggle="tab"]', function (e) {
        e.preventDefault();
        
        $('#myTab .nav-link').removeClass('active').attr('aria-selected', 'false');

        $(e.target).addClass('active').attr('aria-selected', 'true');
    });
});

window.loadSampleTaskDetails = async function(taskType) {
    const container = document.getElementById('task-list-container');
    container.innerHTML = '<div class="text-center mt-5"><i class="fas fa-spinner fa-spin fa-3x"></i><p class="mt-3">Yükleniyor...</p></div>';

    const formatDate = (v) => {
        if (!v) return '-';
        try {
            if (v && typeof v === 'object' && typeof v.toDate === 'function') {
                const d = v.toDate();
                return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
            }
            const d = new Date(v);
            if (isNaN(d.getTime())) return '-';
            return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
        } catch (e) {
            return '-';
        }
    };

    try {
        const user = authService.getCurrentUser();
        if (!user) { return; }

        const userDocRef = doc(db, 'users', user.uid);
        const userSnapshot = await getDoc(userDocRef);
        
        if (!userSnapshot.exists()) { return; }

        const linkedPersonIds = userSnapshot.data().linkedPersonIds || [];
        
        if (linkedPersonIds.length === 0) { return; }

        const tasksRef = collection(db, 'tasks');
        let tasksQuery;
        
        if (taskType === 'completed-tasks') {
            tasksQuery = query(tasksRef, where('status', '!=', 'awaiting_client_approval'));
        } else {
            tasksQuery = query(tasksRef, where('status', '==', 'awaiting_client_approval'));
        }
        
        const allTasksSnapshot = await runGetDocs(tasksQuery);
        const matchingTasks = [];

        for (const d of allTasksSnapshot.docs) {
            const taskData = d.data();
            
            const relatedPartyId = taskData.details?.relatedParty?.id;
            const personsRelated = taskData.personsRelatedIds || [];
            const clientIdInTask = taskData.clientId || taskData.clientID;

            let isRelatedToClient = false;
            
            const isObjectionTask = (taskData.taskType === "20" || taskData.taskType === 20 || taskData.taskType === "objection_to_trademark_publication");
            
            if (isObjectionTask) {
                isRelatedToClient = (clientIdInTask && linkedPersonIds.includes(clientIdInTask));
            } else {
                isRelatedToClient = 
                    (relatedPartyId && linkedPersonIds.includes(relatedPartyId)) ||
                    (Array.isArray(personsRelated) && personsRelated.some(id => linkedPersonIds.includes(id)));
            }
            
            if (!isRelatedToClient) { continue; }

            const meta = await window._getTransactionTypeMeta(taskData.taskType);
            const label = window._taskLabelGuess(taskData, meta);
            const isRenewal = /yenileme/.test(label);
            const isBulletin = window.RX_BULTEN.test(label) || taskData.taskType === '20';

            if (taskType === 'pending-approval') {
                if (!isRenewal && !isBulletin) {
                    matchingTasks.push({ id: d.id, ...taskData });
                }
            } else if (taskType === 'renewal-approval') {
                if (isRenewal) {
                    matchingTasks.push({ id: d.id, ...taskData });
                }
            } else if (taskType === 'bulletin-watch') {
                if (isBulletin) {
                    matchingTasks.push({ id: d.id, ...taskData });
                }
            } else if (taskType === 'completed-tasks') {
                matchingTasks.push({ id: d.id, ...taskData });
            }
        }
        
        if (taskType === 'bulletin-watch') {
            // Bülten izleme için özel render mantığı (kısaltıldı)
            container.innerHTML = '<p class="lead text-muted text-center mt-5">Bülten izleme render mantığı burada çalışacak...</p>';
            return;
        }

        if (matchingTasks.length === 0) {
            container.innerHTML = '<p class="lead text-muted text-center mt-5">Bu kategoride iş bulunmamaktadır.</p>';
            if (window.taskPaginationData.pagination) {
                window.taskPaginationData.pagination.update(0);
            }
            return;
        }
        
        $('#taskPagination').show(); 
        window.taskPaginationData.allData = matchingTasks;
        const itemsPerPage = window.taskPaginationData.itemsPerPage || 10;
        
        if (!window.taskPaginationData.pagination) {
            window.taskPaginationData.pagination = new Pagination({
                itemsPerPage: itemsPerPage,
                containerId: 'taskPagination',
                onPageChange: (page, perPage) => {
                    renderTaskPage(page, perPage);
                }
            });
        }

        window.taskPaginationData.pagination.update(matchingTasks.length);
        renderTaskPage(1, itemsPerPage);
        
    } catch (error) {
        console.error('Task yükleme hatası:', error);
        container.innerHTML = '<p class="lead text-danger text-center mt-5">Veriler yüklenirken bir hata oluştu.</p>';
    }
};

function applyTaskListFilters() {
    const searchText = document.getElementById('taskSearchText').value.toLowerCase().trim();
    const statusFilter = document.getElementById('taskStatusFilter').value.toLowerCase();
    const container = document.getElementById('task-list-container');
    
    const taskCards = container.querySelectorAll('.col-md-12.mb-4');
    
    taskCards.forEach(col => {
        const card = col.querySelector('.task-card');
        if (!card) return;

        const taskTitle = card.querySelector('.task-title').textContent.toLowerCase();
        const taskId = card.getAttribute('data-task-id').toLowerCase();
        const currentStatusText = card.querySelector('.badge').textContent.toLowerCase();
        
        const isTextMatch = !searchText || taskTitle.includes(searchText) || taskId.includes(searchText);

        let isStatusMatch = true;
        
        if (statusFilter !== 'tümü') {
            isStatusMatch = currentStatusText.includes(statusFilter);
        }
        
        if (isTextMatch && isStatusMatch) {
            col.style.display = 'block';
        } else {
            col.style.display = 'none';
        }
    });
}
