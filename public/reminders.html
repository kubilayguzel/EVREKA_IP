<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPGATE - Bildirim Merkezi</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="./css/shared-styles.css">
    <style>
        :root { --primary-blue: #1e3c72; --slate-600: #475569; --slate-200: #e2e8f0; }
        .page-wrapper { background: #f4f7fa; min-height: 100vh; }
        .main-container { padding-top: 100px; max-width: 900px; margin: 0 auto; padding-bottom: 80px; }

        .reminders-timeline { position: relative; padding-left: 45px; margin-top: 30px; }
        .reminders-timeline::before {
            content: ''; position: absolute; left: 18px; top: 0; bottom: 0;
            width: 2px; background: var(--slate-200);
        }

        .reminder-number {
            position: absolute; left: -45px; top: 20px; width: 32px; height: 32px;
            background: white; border: 2.5px solid var(--primary-blue); color: var(--primary-blue);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 800; z-index: 2;
        }

        /* --- KART DURUMLARI --- */
        .reminder-card {
            background: white; border-radius: 14px; padding: 24px; margin-bottom: 25px;
            border: 1px solid var(--slate-200); position: relative; transition: all 0.3s ease;
        }

        /* OKUNMADI (Vurgulu) Durumu */
        .reminder-card.unread { 
            background: #f0f7ff; /* Hafif mavi arka plan */
            border-color: #3b82f6; 
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.1);
        }
        .reminder-card.unread .title-text { color: var(--primary-blue); font-weight: 800; }
        .unread-dot { width: 10px; height: 10px; background: #3b82f6; border-radius: 50%; display: inline-block; margin-right: 10px; }

        /* OKUNDU (Sönük) Durumu */
        .reminder-card.read { 
            opacity: 0.75; /* Hafif saydamlık */
            background: #ffffff;
            border-left: 5px solid #cbd5e0 !important; /* Gri şerit */
        }
        .reminder-card.read .title-text { font-weight: 600; color: #64748b; }

        /* Aciliyet Şeritleri (Sadece Unread kartlarda daha canlı) */
        .reminder-card.unread.overdue { border-left: 6px solid #ef4444; }
        .reminder-card.unread.today { border-left: 6px solid #f59e0b; }
        .reminder-card.unread.upcoming { border-left: 6px solid #3b82f6; }

        .icon-box { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
        .icon-task { background: #eff6ff; color: #3b82f6; }
        .icon-doc { background: #fff1f2; color: #f43f5e; }
        .icon-manual { background: #f0fdf4; color: #22c55e; }

        /* Buton Grupları */
        .action-group { display: flex; gap: 12px; align-items: center; }
        .btn-action { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border: none; background: transparent; padding: 0; transition: 0.2s; }
        .btn-action.read-btn { color: #3b82f6; }
        .btn-action.archive-btn { color: #ef4444; }
        .btn-action:hover { opacity: 0.7; text-decoration: none; }

        .pagination-container { display: flex; justify-content: center; gap: 8px; margin-top: 40px; }
        .page-btn { border: 1px solid var(--slate-200); background: white; padding: 8px 16px; border-radius: 10px; font-weight: 600; color: var(--slate-600); cursor: pointer; }
        .page-btn.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-incele { background: var(--primary-blue); color: white; border-radius: 8px; font-weight: 600; padding: 8px 18px; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div id="layout-placeholder"></div>
    <div class="page-wrapper">
        <main class="main-container">
            <header class="d-flex justify-content-between align-items-center mb-5">
                <div>
                    <h1 class="font-weight-bold" style="color: #1e3c72; font-size: 2.2rem;">Bildirim Merkezi</h1>
                    <p class="text-muted">Güncel durumları buradan takip edebilir ve arşivleyebilirsiniz.</p>
                </div>
                <button class="btn btn-primary rounded-pill px-4 shadow" id="addReminderBtn" style="background: #1e3c72; border:none; height: 48px; font-weight: 700;">
                    <i class="fas fa-plus-circle mr-2"></i>Yeni Hatırlatma
                </button>
            </header>

            <ul class="nav nav-pills mb-4 bg-white p-2 rounded-lg shadow-sm" style="width: fit-content;">
                <li class="nav-item"><a class="nav-link active" id="active-tab" data-toggle="pill" href="#">Gelen Kutusu <span class="badge badge-light ml-2" id="activeCount">0</span></a></li>
                <li class="nav-item"><a class="nav-link" id="closed-tab" data-toggle="pill" href="#">Arşiv</a></li>
            </ul>

            <div class="reminders-timeline" id="timelineContainer"></div>
            <div class="pagination-container" id="paginationControls"></div>
        </main>
    </div>

    <script type="module">
        import { reminderService, auth, db } from './firebase-config.js';
        import { showNotification } from './utils.js';
        import { loadSharedLayout } from './js/layout-loader.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        class RemindersTimelineModule {
            constructor() {
                this.combinedData = [];
                this.currentPage = 1;
                this.itemsPerPage = 10;
                this.activeTab = 'active';
            }

            async init() {
                await loadSharedLayout({ activeMenuLink: 'reminders.html' });
                auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        this.currentUser = user;
                        await this.loadAllSources();
                        this.setupEvents();
                    }
                });
            }

            async loadAllSources() {
                const container = document.getElementById('timelineContainer');
                container.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary" style="color: #1e3c72 !important"></div></div>';

                try {
                    const [remRes, tasksSnap, personsSnap] = await Promise.all([
                        reminderService.getReminders(),
                        getDocs(collection(db, "tasks")),
                        getDocs(collection(db, "persons"))
                    ]);

                    const rawManual = remRes.success ? remRes.data : [];

                    // --- TASKLAR ---
                    const taskReminders = tasksSnap.docs.map(doc => {
                        const d = doc.data();
                        if (d.status === 'completed') return null;
                        const date = d.taskDueDate || d.dueDate || d.officialDue || d.operationalDue;
                        if (!date) return null;
                        const diff = this.getDayDiff(date);
                        if (diff > 365 || diff < -180) return null;
                        return { id: doc.id, type: 'task', category: 'İŞ TAKİBİ', title: d.taskTitle || d.title || "İsimsiz İş", message: `<b>"${d.taskTitle || d.title}"</b> işine <b>${diff === 0 ? 'BUGÜN' : (diff > 0 ? diff + ' gün kaldı' : Math.abs(diff) + ' gün geçti')}</b>.`, dueDate: date, status: 'active', isRead: true, link: `task-update.html?id=${doc.id}` };
                    }).filter(Boolean);

                    // --- EVRAKLAR ---
                    const docReminders = [];
                    personsSnap.forEach(pDoc => {
                        const p = pDoc.data();
                        (p.documents || []).forEach((d, idx) => {
                            const diff = this.getDayDiff(d.validityDate);
                            if (diff <= 365 && diff >= -60) {
                                docReminders.push({ id: `${pDoc.id}_doc_${idx}`, type: 'doc', category: 'EVRAK SÜRESİ', title: `${d.type} Geçerlilik`, message: `<b>${p.name}</b> adına kayıtlı <b>${d.type}</b> belgesinin süresi doluyor (Kalan: ${diff} gün).`, dueDate: d.validityDate, status: 'active', isRead: false, link: 'persons.html' });
                            }
                        });
                    });

                    // --- MANUEL ---
                    const manualReminders = rawManual.map(r => ({ ...r, type: 'manual', category: r.category || 'KİŞİSEL NOT', message: r.description || r.title, dueDate: r.dueDate || r.date, isRead: r.isRead || false, status: r.status || 'active' }));

                    this.combinedData = [...manualReminders, ...taskReminders, ...docReminders]
                        .sort((a, b) => new Date(this.formatIsoDate(a.dueDate)) - new Date(this.formatIsoDate(b.dueDate)));

                    this.render();
                } catch (e) { console.error(e); }
            }

            render() {
                const container = document.getElementById('timelineContainer');
                const filtered = this.combinedData.filter(r => (this.activeTab === 'active' ? r.status !== 'completed' : r.status === 'completed'));
                document.getElementById('activeCount').textContent = this.combinedData.filter(r => r.status !== 'completed').length;

                const start = (this.currentPage - 1) * this.itemsPerPage;
                const pageItems = filtered.slice(start, start + this.itemsPerPage);

                if (pageItems.length === 0) {
                    container.innerHTML = '<div class="empty-state text-center py-5">Listelenecek bildirim yok.</div>';
                    document.getElementById('paginationControls').innerHTML = '';
                    return;
                }

                container.innerHTML = pageItems.map((item, idx) => {
                    const diff = this.getDayDiff(item.dueDate);
                    const urgency = diff < 0 ? 'overdue' : (diff <= 3 ? 'today' : (diff <= 15 ? 'upcoming' : ''));
                    const icon = item.type === 'task' ? 'fa-tasks' : (item.type === 'doc' ? 'fa-file-signature' : 'fa-sticky-note');
                    const iconColor = item.type === 'task' ? 'icon-task' : (item.type === 'doc' ? 'icon-doc' : 'icon-manual');

                    return `
                    <div class="reminder-card ${urgency} ${item.isRead ? 'read' : 'unread'}">
                        <div class="reminder-number">${start + idx + 1}</div>
                        <div class="d-flex align-items-start">
                            <div class="icon-box ${iconColor} mr-3"><i class="fas ${icon}"></i></div>
                            <div class="flex-grow-1">
                                <div class="d-flex justify-content-between mb-1">
                                    <span class="category-text uppercase">
                                        ${!item.isRead ? '<span class="unread-dot"></span>' : ''}${item.category}
                                    </span>
                                    <span class="small text-muted font-weight-bold"><i class="far fa-clock mr-1"></i>${new Date(this.formatIsoDate(item.dueDate)).toLocaleDateString('tr-TR')}</span>
                                </div>
                                <h5 class="title-text mb-2">${item.title}</h5>
                                <p class="mb-3 text-secondary">${item.message}</p>
                                <div class="reminder-footer border-top pt-3 d-flex justify-content-between align-items-center">
                                    <div class="action-group">
                                        ${!item.isRead ? `<button class="btn-action read-btn mark-read-btn" data-id="${item.id}"><i class="far fa-eye mr-1"></i>Okundu</button>` : ''}
                                        <button class="btn-action archive-btn archive-btn-trigger" data-id="${item.id}"><i class="fas fa-archive mr-1"></i>Arşivle</button>
                                    </div>
                                    <a href="${item.link || '#'}" class="btn-incele">Detaya Git <i class="fas fa-chevron-right ml-1"></i></a>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }).join('');

                this.renderPagination(filtered.length);
            }

            // --- YARDIMCI METODLAR ---
            getDayDiff(dStr) { const target = new Date(this.formatIsoDate(dStr)); if (isNaN(target)) return 999; target.setHours(0,0,0,0); const today = new Date(); today.setHours(0,0,0,0); return Math.round((target - today) / (1000 * 60 * 60 * 24)); }
            formatIsoDate(d) { if (!d || typeof d !== 'string') return d; if (d.includes('.')) { const p = d.split('.'); return `${p[2]}-${p[1]}-${p[0]}`; } return d; }

            renderPagination(totalItems) {
                const totalPages = Math.ceil(totalItems / this.itemsPerPage);
                const controls = document.getElementById('paginationControls');
                if (totalPages <= 1) { controls.innerHTML = ''; return; }
                let html = `<button class="page-btn" ${this.currentPage === 1 ? 'disabled' : ''} id="prevPage">Geri</button>`;
                for (let i = 1; i <= totalPages; i++) { html += `<button class="page-btn ${this.currentPage === i ? 'active' : ''}" data-page="${i}">${i}</button>`; }
                html += `<button class="page-btn" ${this.currentPage === totalPages ? 'disabled' : ''} id="nextPage">İleri</button>`;
                controls.innerHTML = html;
                controls.querySelectorAll('[data-page]').forEach(btn => { btn.onclick = () => { this.currentPage = parseInt(btn.dataset.page); this.render(); window.scrollTo(0,0); }; });
                const prev = document.getElementById('prevPage'); if(prev) prev.onclick = () => { this.currentPage--; this.render(); };
                const next = document.getElementById('nextPage'); if(next) next.onclick = () => { this.currentPage++; this.render(); };
            }

            setupEvents() {
                document.getElementById('active-tab').onclick = () => { this.activeTab = 'active'; this.currentPage = 1; this.render(); };
                document.getElementById('closed-tab').onclick = () => { this.activeTab = 'closed'; this.currentPage = 1; this.render(); };
                
                document.addEventListener('click', async (e) => {
                    const id = e.target.closest('[data-id]')?.dataset.id;
                    if (!id) return;
                    const item = this.combinedData.find(x => x.id === id);

                    if (e.target.closest('.mark-read-btn')) {
                        if (item.type === 'manual') await reminderService.updateReminder(id, { isRead: true });
                        item.isRead = true;
                        showNotification("Okundu olarak işaretlendi.", "success");
                        this.render();
                    }

                    if (e.target.closest('.archive-btn-trigger')) {
                        if (item.type === 'manual') await reminderService.updateReminder(id, { status: 'completed' });
                        item.status = 'completed';
                        showNotification("Arşive taşındı.", "info");
                        this.render();
                    }
                });

                document.getElementById('addReminderBtn').onclick = () => alert("Not Ekleme Modalı Açılıyor...");
            }
        }

        window.module = new RemindersTimelineModule();
        window.module.init();
    </script>
</body>
</html>
