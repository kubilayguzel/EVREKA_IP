<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPGATE - İşlerim</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="stylesheet" href="./css/shared-styles.css">
    <link rel="stylesheet" href="./css/deadline-highlighter.css">
    <link rel="stylesheet" href="./css/task-management.css">

</head>
<body>
<div id="notification-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>
    <div id="layout-placeholder"></div>
    <div class="page-wrapper">
          <main class="main-container">
            <section class="page-header">
                <h1 class="page-title">İşlerim</h1>
                <p class="page-subtitle">Size atanmış olan tüm görevleri buradan takip edebilirsiniz.</p>
            </section>
    
            <div class="tasks-container">
                <div class="tasks-header">
                    <div class="search-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="taskSearchInput" class="search-input" placeholder="Başlık, numara, tip ara...">
                    </div>
                    <div class="filter-group">
                        <label class="filter-label" for="statusFilter">Duruma Göre Filtrele:</label>
                        <select id="statusFilter" class="filter-select">
                            <option value="all">Tümü</option>
                            <option value="open">Açık</option>
                            <option value="in-progress">Devam Ediyor</option>
                            <option value="completed">Tamamlandı</option>
                            <option value="pending">Beklemede</option>
                            <option value="cancelled">İptal Edildi</option>
                            <option value="on-hold">Askıda</option>
                            <option value="awaiting-approval">Onay Bekliyor</option>
                        </select>
                    </div>
                </div>
                <div class="table-container">
                    <table class="tasks-table" id="myTasksTable">
                        <thead>
                            <tr>
                                <th>İş No.</th>
                                <th>İlgili Kayıt</th>
                                <th>Tip</th>
                                <th>Öncelik</th>
                                <th>Operasyonel Son Tarih</th> 
                                <th>Resmi Son Tarih</th>
                                <th>Oluşturma</th>
                                <th>Atama</th> 
                                <th>Durum</th>
                                <th>İşlemler</th>
                            </tr>
                        </thead>
                        <tbody id="myTasksTableBody">
                            </tbody>
                    </table>
                </div>
                <div id="paginationControls" class="pagination-container" style="display: flex; justify-content: center; align-items: center; margin-top: 20px; gap: 10px; padding-bottom: 20px;"></div>
                <div id="loadingIndicator" class="loading">Yükleniyor...</div>
                <div id="noTasksMessage" class="no-records">Henüz size atanmış bir göreviniz bulunmamaktadır.</div>
            </div>
        </main>
    </div>

    <div id="taskDetailModal" class="modal">
        <div class="modal-content">
            <span class="close-modal-btn" id="closeTaskDetailModal">&times;</span>
            <h3 class="modal-title" id="modalTaskTitle">İş Detayı</h3>
            <div id="modalBody" class="modal-body-content"></div>
        </div>
    </div>
    
    <div class="modal" id="createMyTaskAccrualModal">
        <div class="modal-content">
            <span class="close-modal-btn" id="closeMyTaskAccrualModal">&times;</span>
            <h3 class="modal-title">Ek Tahakkuk Oluştur</h3>
            
            <div id="createMyTaskAccrualFormContainer"></div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="cancelCreateMyTaskAccrualBtn">İptal</button>
                <button type="button" class="btn btn-primary" id="saveNewMyTaskAccrualBtn">Tahakkuku Oluştur</button>
            </div>
        </div>
    </div>
    
    <script src="./js/deadline-highlighter.js"></script>
    <script type="module" src="./js/task-management/my-tasks.js"></script>
</body>
</html>
