<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPGATE - Tahakkuk Yönetimi</title>
    
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <link rel="stylesheet" href="./css/shared-styles.css">
    
    <link rel="stylesheet" href="./css/task-management.css">
    
    <style>
        /* Bu sayfaya özel (override) stiller */
        .page-wrapper {
            display: flex; flex-direction: column; height: 100vh; overflow-y: hidden;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .main-container {
            flex-grow: 1; padding: 20px 30px; overflow-y: auto; padding-top: 120px;
            display: flex; flex-direction: column;
        }
        .page-header { 
            background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); 
        }
        .page-title { font-size: 2em; color: #1e3c72; margin-bottom: 10px; }
        .page-subtitle { color: #666; font-size: 1.1em; }

        /* Tablo Konteyner Düzeni */
        .tasks-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            padding-bottom: 20px;
        }

        .tasks-header {
            padding: 20px 30px;
            border-bottom: 1px solid #e1e8ed;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* Statü Rozet Renkleri (CSS dosyasında yoksa diye garantiye alıyoruz) */
        .status-badge { padding: 5px 10px; border-radius: 12px; font-size: 0.8em; font-weight: 500; text-align: center; color: white;}
        .status-paid { background-color: #28a745; }
        .status-unpaid { background-color: #ffc107; color: #333 !important; }
        .status-partial { background-color: #17a2b8; }
        .status-cancelled { background-color: #dc3545; }

        /* Yükleniyor ve Mesaj Alanları */
        .loading { text-align: center; padding: 50px; display: none; }
        .no-records { text-align: center; padding: 50px; color: #666; display: none; }
        
        /* Modal İçi Düzenlemeler */
        .modal { display: none; position: fixed; z-index: 1002; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background-color: #fefefe; margin: auto; padding: 30px; border: 1px solid #888; width: 90%; max-width: 1000px; border-radius: 20px; max-height: 90vh; overflow-y: auto; }
        .close-modal-btn { float: right; font-size: 28px; font-weight: bold; cursor: pointer; color: #aaa; }
    </style>
</head>
<body>
    <div id="layout-placeholder"></div>
    <div id="notification-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>

    <div class="page-wrapper">
        <main class="main-container">
            <section class="page-header">
                <h1 class="page-title">Tahakkuk Yönetimi</h1>
                <p class="page-subtitle">Sistemdeki tüm tahakkuk kayıtlarını görüntüleyin ve yönetin.</p>
            </section>

            <div class="tasks-container">
                <div class="tasks-header">
                    <div class="search-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="searchInput" class="search-input" placeholder="Tahakkuk no, iş, fatura tarafı ara...">
                    </div>

                    <div class="filter-group">
                        <label class="filter-label" for="statusFilter">Durum:</label>
                        <select id="statusFilter" class="filter-select">
                            <option value="all">Tümü</option>
                            <option value="unpaid">Ödenmedi</option>
                            <option value="paid">Ödendi</option>
                            <option value="partial">Kısmi Ödeme</option>
                            <option value="cancelled">İptal</option>
                        </select>
                    </div>

                    <button class="btn-add-task" id="btnOpenCreateModal">
                        <span>&#x2795;</span> Yeni Tahakkuk
                    </button>
                </div>

                <div class="table-container">
                    <table class="tasks-table" id="accrualsTable">
                        <thead>
                            <tr id="accrualsTableHeaderRow">
                                <th data-sort="id">ID <i class="fas fa-sort"></i></th>
                                <th data-sort="taskTitle">İlgili İş <i class="fas fa-sort"></i></th>
                                <th data-sort="tpInvoicePartyName">TP Fat. Tarafı <i class="fas fa-sort"></i></th>
                                <th data-sort="serviceInvoicePartyName">Hizmet Fat. Tarafı <i class="fas fa-sort"></i></th>
                                <th data-sort="totalAmount">Tutar <i class="fas fa-sort"></i></th>
                                <th data-sort="remainingAmount">Kalan <i class="fas fa-sort"></i></th>
                                <th data-sort="status">Durum <i class="fas fa-sort"></i></th>
                                <th data-sort="createdAt">Oluşturma <i class="fas fa-sort"></i></th>
                                <th class="no-sort">İşlemler</th>
                            </tr>
                        </thead>
                        <tbody id="accrualsTableBody">
                            </tbody>
                    </table>
                </div>

                <div id="loadingIndicator" class="loading">Yükleniyor...</div>
                <div id="noRecordsMessage" class="no-records">Kayıt bulunamadı.</div>
            </div>
        </main>
    </div>

    <div id="createAccrualModal" class="modal">
        <div class="modal-content">
            <span class="close-modal-btn" id="closeCreateModal">&times;</span>
            <h3 class="modal-title">Yeni Tahakkuk Oluştur</h3>
            <div id="createAccrualFormContainer"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="btnCancelCreate">İptal</button>
                <button class="btn btn-primary" id="btnSaveAccrual">Kaydet</button>
            </div>
        </div>
    </div>

    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <span class="close-modal-btn" id="closePaymentModal">&times;</span>
            <h3 class="modal-title">Ödeme Girişi</h3>
            <div id="paymentFormContainer"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="btnCancelPayment">İptal</button>
                <button class="btn btn-success" id="btnSavePayment">Ödemeyi Kaydet</button>
            </div>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-modal-btn" id="closeDetailModal">&times;</span>
            <h3 class="modal-title">Tahakkuk Detayı</h3>
            <div id="detailContent"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script type="module" src="./js/accounting/main.js"></script>
</body>
</html>
