<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPGATE - Portföy Yönetimi</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    
    <link rel="stylesheet" href="./css/shared-styles.css">
    <link rel="stylesheet" href="./css/simple-loading.css">
    <link rel="icon" href="data:,">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #333; display: flex; }
        .page-wrapper { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        .main-container { width: 100%; padding: 30px; padding-top: 120px; margin: 0;}
        .page-header { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); }
        .page-title { font-size: 2em; color: #1e3c72; margin-bottom: 10px; }
        .page-subtitle { color: #666; font-size: 1.1em; }

        /* Kontrol Paneli */
        .portfolio-controls { background: rgba(255, 255, 255, 0.95); padding: 20px 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 30px; display: flex; flex-direction: column; gap: 15px; }
        .filter-row { display: flex; justify-content: flex-end; align-items: center; flex-wrap: wrap; gap: 15px; }
        .search-input { margin-right: auto; flex-grow: 1; min-width: 180px; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; }

        /* Tab Menu (Bootstrap Uyumlu Yapı) */
        .nav-tabs { border-bottom: 2px solid #dee2e6; margin-bottom: 15px; }
        .nav-link { border: none; background: none; font-size: 1em; font-weight: 600; color: #6c757d; padding: 10px 18px; transition: all 0.3s ease; }
        .nav-link:hover { color: #1e3c72; border-color: transparent; }
        .nav-link.active { color: #1e3c72; border-bottom: 3px solid #1e3c72 !important; background-color: transparent !important; }

        /* Butonlar */
        .btn-add-record, .btn-primary-custom, .btn-secondary-custom, .btn-status-toggle { 
            background: linear-gradient(45deg, #1e3c72, #2a5298); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 0.9em; font-weight: 600; transition: all 0.3s ease; display: flex; align-items: center; gap: 5px;
        }
        .btn-add-record:hover, .btn-primary-custom:hover, .btn-secondary-custom:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(30, 60, 114, 0.2); text-decoration: none; color: white; }
        .btn-status-toggle:disabled { background-color: #cccccc; cursor: not-allowed; box-shadow: none; transform: none; background: #ccc; }
        .btn-secondary-custom { background: #6c757d; } /* Gri buton */

        /* Tablo */
        .portfolio-table-container { background: rgba(255, 255, 255, 0.95); border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); overflow: visible; position: relative; z-index: 1; min-height: 200px; }
        
        .portfolio-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        
        /* THEAD - Başlıklar */
        .portfolio-table th { 
            background: #f8f9fa; font-weight: 600; padding: 12px 15px; text-align: left; 
            position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #dee2e6; 
        }
        
        /* TBODY - Satırlar */
        .portfolio-table td { 
            padding: 12px 15px; text-align: left; border-bottom: 1px solid #f0f0f0; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; vertical-align: middle; 
        }
        .portfolio-table tr:hover { background-color: #f6f8fa; }

        /* Accordion, Görsel ve Diğer Özellikler */
        .trademark-image-wrapper { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .trademark-image-thumbnail { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; border: 1px solid #eee; background: white; }
        
        .row-caret { transition: transform 0.3s ease; }
        .fa-rotate-90 { transform: rotate(90deg); }
        .toggle-cell { cursor: pointer; text-align: center; }
        
        .group-header { background-color: #f8f9fa; font-weight: 500; }
        .child-row { background-color: #fafafa; }
        
        .sortable-header { cursor: pointer; user-select: none; }
        .sortable-header:hover { color: #007bff; }

        /* Loading & Empty */
        .loading-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.8); display: none; align-items: center; justify-content: center; z-index: 50; }
        .no-records { text-align: center; padding: 50px; color: #666; display: none; }
    </style>
</head>
<body>
    <div id="notification-container" class="notification-container"></div>
    <div id="layout-placeholder"></div>
    
    <div class="page-wrapper">
        <main class="main-container">
            <section class="page-header">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h1 class="page-title">Portföy Yönetimi</h1>
                        <p class="page-subtitle">Tüm fikri mülkiyet kayıtlarınızı ve davalarınızı yönetin.</p>
                    </div>
                    
                    <div class="d-flex align-items-center">
                        <img id="userAvatar" src="assets/media/avatars/blank.png" class="rounded-circle mr-2" width="40" height="40" alt="user">
                        <div>
                            <div id="userNameDisplay" class="font-weight-bold">Kullanıcı</div>
                            <small id="userEmailDisplay" class="text-muted"></small>
                        </div>
                    </div>
                </div>
            </section>
            
            <div class="portfolio-controls">
                <ul class="nav nav-tabs" id="portfolioTabs" role="tablist">
                    <li class="nav-item">
                        <a class="nav-link active" data-toggle="tab" href="#trademark">Marka</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-toggle="tab" href="#patent">Patent</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-toggle="tab" href="#design">Tasarım</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-toggle="tab" href="#objections">İtirazlar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-toggle="tab" href="#litigation">Davalar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-toggle="tab" href="#all">Tümü</a>
                    </li>
                </ul>
                
                <div class="filter-row">
                    <input type="text" id="searchInput" class="search-input" placeholder="Başlık, numara, durum, taraf ara...">
                    
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="selectAll">
                        <label for="selectAll" style="margin:0; cursor:pointer;">Tümünü Seç</label>
                    </div>

                    <button type="button" class="btn-status-toggle" id="toggleRecordStatusBtn" disabled>Aktif/Pasif</button>
                    
                    <a href="data-entry.html" class="btn-add-record text-white">
                        <i class="fas fa-plus"></i> Yeni Kayıt
                    </a>
                    
                    <button id="exportExcelBtn" class="btn-secondary-custom">Excel</button>
                </div>
            </div>
            
            <div class="portfolio-table-container">
                <div id="loadingIndicator" class="loading-overlay">
                    <div class="spinner-border text-primary" role="status">
                        <span class="sr-only">Yükleniyor...</span>
                    </div>
                </div>
                
                <table class="portfolio-table" id="portfolioTable">
                    <thead>
                        <tr></tr> 
                    </thead>
                    <tbody id="portfolioTableBody">
                        </tbody>
                </table>
                <div id="noRecordsMessage" class="no-records">Kayıt bulunamadı.</div>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-3">
                <div id="paginationInfo" class="text-muted font-weight-bold"></div>
                <ul id="paginationContainer" class="pagination mb-0"></ul>
            </div>

        </main>
    </div>

    <div id="recordDetailModal" class="modal">
        <div class="modal-content">
            <span class="close-modal-btn" id="closeRecordDetailModal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module" src="./js/layout-loader.js"></script>
    <script type="module" src="./js/portfolio/main.js"></script>
</body>
</html>
