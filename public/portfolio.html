<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Manager - Portföy (Güncellenmiş)</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #333; display: flex; }
        .page-wrapper { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        .main-container { width: 100%; padding: 30px; padding-top: 120px; margin: 0;}
        .page-header { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); }
        .page-title { font-size: 2em; color: #1e3c72; margin-bottom: 10px; }
        .page-subtitle { color: #666; font-size: 1.1em; }

        .portfolio-controls {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 30px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .filter-row { 
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .search-input { 
            margin-right: auto;
            flex-grow: 1; 
            min-width: 180px;
            padding: 10px 12px;
            box-sizing: border-box;
        }

        .tab-menu {
            display: flex;
            border-bottom: 2px solid #dee2e6;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .tab-button {
            padding: 10px 18px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1em;
            font-weight: 600;
            color: #6c757d;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s ease;
        }
        .tab-button:hover { color: #1e3c72; }
        .tab-button.active { color: #1e3c72; border-bottom-color: #1e3c72; }

        .filter-group { display: flex; gap: 8px; align-items: center; }
        .filter-label { font-weight: 500; }
        .filter-select { padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; }

        .btn-add-record, .btn-primary, .btn-secondary, .btn-status-toggle { 
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            color: white; border: none; padding: 10px 20px; border-radius: 8px;
            cursor: pointer; font-size: 0.9em; font-weight: 600; transition: all 0.3s ease;
            display: flex; align-items: center; gap: 5px;
        }
        .btn-add-record:hover, .btn-primary:hover, .btn-secondary:hover, .btn-status-toggle:hover {
            transform: translateY(-2px); box-shadow: 0 5px 15px rgba(30, 60, 114, 0.2);
        }
        .btn-status-toggle:disabled { background-color: #cccccc; cursor: not-allowed; box-shadow: none; transform: none; }

        .portfolio-table-container { background: rgba(255, 255, 255, 0.95); border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); overflow: visible; position: relative; z-index: 1; }
        .portfolio-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .portfolio-table th, .portfolio-table td { padding: 15px; text-align: left; border-bottom: 1px solid #f0f0f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .portfolio-table th { background: #f8f9fa; font-weight: 600; }
        .portfolio-table tr:hover { background-color: #f6f8fa; }
        .portfolio-table tr.record-status-pasif { opacity: 0.6; font-style: italic; background-color: #f0f0f0; }
        .portfolio-table tr.record-status-pasif:hover { opacity: 0.8; background-color: #e0e0e0; }

        .column-filter { width: calc(100% - 10px); padding: 6px 8px; border: 1px solid #ddd; border-radius: 5px; font-size: 0.85em; box-sizing: border-box; margin-top: 5px; }
        .portfolio-table th:has(> .column-filter) { padding-top: 8px; padding-bottom: 8px; }
        .sortable-header { cursor: pointer; position: relative; padding-right: 20px; }
        .sortable-header::after { content: ''; position: absolute; right: 5px; top: 50%; transform: translateY(-50%); border: 4px solid transparent; }
        .sortable-header.asc::after { border-top-color: #333; }
        .sortable-header.desc::after { border-bottom-color: #333; }
        .sortable-header.inactive::after {content: '\25B2\25BC'; font-size: 0.7em; color: #ccc; line-height: 0.8; top: 50%; transform: translateY(-50%) scaleY(0.7);}
        .trademark-image-wrapper { position: relative; display: inline-block; overflow: visible; height: 50px; width: 50px; z-index: 1; }
        .trademark-image-thumbnail { width: 100%; height: 100%; object-fit: contain; border-radius: 5px; vertical-align: middle; transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.5s ease-out, border 0.5s ease-out; cursor: pointer; }
        .trademark-image-wrapper:hover .trademark-image-thumbnail { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); z-index: 9999; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4); border: 2px solid #1e3c72; background-color: white; padding: 2px; max-width: 300px; max-height: 300px; width: auto; height: auto; }
        .trademark-image-hover-full {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            z-index: 9999;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            border: 2px solid #1e3c72;
            background-color: white;
            padding: 2px;
            max-width: 80vw;
            max-height: 80vh;
            width: auto;
            height: auto;
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
        } 
        .action-btn { background: #007bff; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.9em; transition: all 0.3s ease; margin-right: 5px; }
        .action-btn:last-child { margin-right: 0; }
        .action-btn:hover { opacity: 0.9; }
        .action-btn.edit-btn { background-color: #ffc107; color: #212529; }
        .action-btn.edit-btn:hover { background-color: #e0a800; }
        .action-btn.delete-btn { background-color: #dc3545; }
        .action-btn.delete-btn:hover { background-color: #c82333; }
        .action-btn.view-btn { background-color: #17a2b8; }
        .action-btn.view-btn:hover { background-color: #138496; }

        .no-records, .loading { text-align: center; padding: 50px; color: #666; width: 100%; display: block; }
        .loading { display: none; }

        .modal { display: none; align-items: center; justify-content: center; position: fixed; z-index: 1002; left: 0; top: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.6); overflow: auto; padding: 30px; box-sizing: border-box; }
        .modal.show { display: flex; }
        .modal-content { background-color: #fefefe; padding: 30px; border: 1px solid #888; width: 1250px; border-radius: 20px; animation: animatetop 0.4s; max-height: 90vh; overflow-y: auto; }
        @keyframes animatetop { from {top: -300px; opacity: 0} to {top: 0; opacity: 1} }
        .close-modal-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .modal-title { font-size: 1.5em; color: #1e3c72; margin-bottom: 20px;}
        .modal-detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px 25px; }
        .modal-detail-item { margin-bottom: 10px; }
        .modal-detail-label { font-weight: 600; color: #333; margin-bottom: 5px; font-size: 0.9em; }
        .modal-detail-value { color: #555; word-break: break-word; font-size: 0.95em; }
        .modal-detail-value.long-text { white-space: pre-wrap; background-color: #f8f9fa; padding: 8px; border-radius: 6px; }
        .modal-detail-section-title { grid-column: 1 / -1; font-size: 1.1em; color: #1e3c72; margin-top: 20px; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 1px dashed #e1e8ed; }
        .document-list { list-style: none; padding: 0; }
        .document-list li { margin-bottom: 8px; font-size: 0.95em;}
        .document-list li a { text-decoration: none; color: #1e3c72; display: flex; align-items: center; gap: 8px;}
        .document-list li a:hover { text-decoration: underline; }
        .document-list li .doc-icon { font-size: 1.2em; }
        .record-image-display { max-width: 100%; height: auto; border-radius: 8px; margin-top: 10px; border: 1px solid #eee; }

        /* Accordion & groups */
        .accordion-transaction-history { max-height: 500px; overflow-y: auto; border: 1px solid #e0e0e0; border-radius: 12px; background: #fafafa; }
        .accordion-transaction-item { border-bottom: 1px solid #e0e0e0; background: white; }
        .accordion-transaction-item:last-child { border-bottom: none; }
        .accordion-transaction-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; cursor: pointer; transition: all 0.2s ease; border-left: 4px solid #3498db; }
        .accordion-transaction-header:hover { background: #f8f9fa; }
        .accordion-transaction-header.has-children:hover { background: #e3f2fd; }
        .transaction-main-info { display: flex; align-items: center; gap: 12px; flex: 1; }
        .accordion-icon { font-size: 12px; color: #666; transition: transform 0.2s ease; min-width: 16px; }
        .accordion-icon.expanded { transform: rotate(90deg); }
        .accordion-icon-empty { min-width: 16px; }
        .transaction-details { flex: 1; }
        .transaction-name-date { font-weight: 600; color: #2c3e50; font-size: 1em; }
        .child-transaction-name-date { font-weight: 500; color: #34495e; font-size: 0.9em; }
        .transaction-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; text-align: right; }
        .child-count { font-size: 0.75em; background: #e3f2fd; color: #1976d2; padding: 2px 6px; border-radius: 8px; font-weight: 500; }
        .accordion-transaction-children { border-top: 1px solid #f0f0f0; background: #f8f9fa; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 500px; } }
        .child-transaction-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 20px 8px 48px; border-bottom: 1px solid #e8e8e8; border-left: 44px solid #f39c12; background: white; margin: 0 8px; margin-bottom: 2px; border-radius: 4px; }
        .child-transaction-item:last-child { border-bottom: none; margin-bottom: 8px; }

        /* Grouped rows */
        .group-parent td { font-size: 0.95rem; }
        .group-children .table thead th { background: #fafafa; }
        .toggle-group { font-weight: bold; text-decoration: none; }
        .table-modern thead th { border-bottom: 0; }
        .group-header { background: #f7f9fc; border-top: 1px solid #edf1f7; border-bottom: 1px solid #edf1f7; }
        .group-header:hover { background:#f2f6fb; }
        .group-title { font-size: 0.95rem; color:#24324a; padding: 14px 8px; }
        .count-dot { display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; margin-left:8px; border-radius:50%; background:#e9f5ee; color:#2f8a58; font-weight:600; font-size:.8rem; }
        .badge-soft { background:#eef2ff; color:#4e5cf2; font-weight:600; padding:.35rem .55rem; }

        .toggle-cell { width:44px; }
        .accordion-toggle { width:32px; height:32px; display:flex; align-items:center; justify-content:center; border:0; background:transparent; outline:0; cursor:pointer; border-radius:8px; transition:background .2s ease; }
        .accordion-toggle:hover { background:#e9edf7; }
        .accordion-toggle i { transition: transform .2s ease; }
        .accordion-toggle[aria-expanded="true"] i { transform: rotate(90deg); }

        .group-row { transition: all .18s ease; }
        .group-row[aria-hidden="true"] { opacity:0; transform: translateY(-6px); display:none !important; }
        .group-row[aria-hidden="false"] { opacity:1; transform: translateY(0); }

        td.caret-host { position: relative; padding-left: 28px; }
        .row-caret{ position:absolute; left:6px; top:50%; transform:translateY(-50%); width:20px; height:20px; display:inline-flex; align-items:center; justify-content:center; border:1px solid #d8dee9; border-radius:6px; background:#fff; cursor:pointer; }
        .row-caret i{ transition: transform .18s ease; }
        .row-caret[aria-expanded="true"] i{ transform: rotate(90deg); }

        .portfolio-table th::after,
        .portfolio-table .accordion-header::after,
        .modal .accordion-header::after { display: none !important; content: none !important; }

        .sidebar-nav .accordion-header::after { content: '▶'; margin-left: auto; font-size: 0.8em; transition: transform 0.3s ease; display: inline-block !important; }
        .sidebar-nav .accordion-header.active::after { transform: rotate(90deg); }

        /* Parent satırlar özel renk */
        .portfolio-table tr.group-header { background-color: transparent; }
        .portfolio-table tr.child-row { background-color: transparent; }

        .transaction-pdfs, .child-transaction-pdfs { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
        .pdf-link { color: #dc3545; font-size: 1.1em; transition: all 0.2s ease; text-decoration: none; }
        .pdf-link:hover { color: #c82333; transform: scale(1.2); }

        .child-transaction-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 20px 8px 48px; border-bottom: 1px solid #e8e8e8; border-left: 44px solid #f39c12; background: white; margin: 0 8px; margin-bottom: 2px; border-radius: 4px; }

        /* Accordion fix: hide child rows when collapsed */
        #accordion-fix-style tr.group-row[aria-hidden="true"]{ display:none !important; }

        .simple-loading-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(17, 24, 39, 0.45);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            z-index: 2147483647; /* her şeyin üstünde */
        }
        .simple-loading-content {
            background: #fff;
            border-radius: 16px;
            padding: 20px 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,.18);
            min-width: 280px;
            max-width: 90vw;
            text-align: center;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        }
        .loading-spinner {
            width: 40px; height: 40px;
            border-radius: 999px;
            border: 4px solid #e5e7eb;
            border-top-color: #3b82f6;
            animation: simpleloading-spin 1s linear infinite;
            margin: 0 auto 12px auto;
        }
        @keyframes simpleloading-spin { to { transform: rotate(360deg); } }
        .loading-text { font-weight: 600; font-size: 16px; margin-bottom: 6px; }
        .loading-subtext { font-size: 13px; color: #4b5563; margin-bottom: 8px; }
        .loading-cancel {
            margin-top: 6px; border: 0; padding: 8px 12px; border-radius: 10px;
            background: #ef4444; color: white; cursor: pointer;
        }

</style>

<style id="accordion-fix-style">
    /* Accordion fix: hide child rows when collapsed */

<script type="module">
        import './js/simple-loading.js';
        import Pagination from './js/pagination.js';
        import { ipRecordsService, db, personService, transactionTypeService, auth, monitoringService, taskService } from './firebase-config.js';
        import { showNotification, formatFileSize, STATUSES } from './utils.js';
        import { loadSharedLayout } from './js/layout-loader.js';
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // === Yardımcı Fonksiyonlar ===
        const safe = (v) => (v ?? '').toString();
        const SimpleLoading = window.SimpleLoading;

        function safeId(str) {
            return String(str || '').replace(/[^a-zA-Z0-9]/g, '_');
        }

        function fmtDate(d) {
            try {
                if (!d) return '-';
                let dt;
                if (typeof d === 'string') dt = new Date(d);
                else if (typeof d?.toDate === 'function') dt = d.toDate();
                else if ('seconds' in (d||{})) dt = new Date(d.seconds*1000);
                else if (d instanceof Date) dt = d;
                else return String(d);
                if (isNaN(dt.getTime())) return String(d);
                return dt.toLocaleDateString('tr-TR');
            } catch { return String(d); }
        }

        function normalizeAppNo(appNo) {
            return (appNo || '')
                .toString()
                .trim()
                .toUpperCase()
                .replace(/[\s.\-_/]/g, '');
        }

        // === Concurrency helper & parent-child builder (EKLENDİ) ===
        function pLimitAll(items, limit, worker){
          const q = [...items];
          const runners = Array.from({length: Math.min(limit, q.length)}, async function run(){
            while(q.length){
              const it = q.shift();
              await worker(it);
            }
          });
          return Promise.all(runners);
        }
        // Belge ikonlarını oluşturan yardımcı fonksiyon (portfolio-detail.js mantığına uygun)
        function _createDocLinkHtml(pdf) {
            let iconClass = 'fas fa-file-pdf';
            let titleText = pdf.fileName || 'Belge';
            let btnClass = 'btn-danger';
            let badgeHtml = '';

            if (pdf.type === 'opposition_petition') {
                iconClass = 'fas fa-gavel';
                titleText = 'Karşı Taraf İtiraz Dilekçesi';
                btnClass = 'btn-warning';
            } else if (pdf.type === 'official_document') {
                iconClass = 'fas fa-file-signature';
                titleText = 'Resmi Yazı';
                btnClass = 'btn-success';
            } else if (pdf.type === 'epats_document') { // Task'tan gelen ePats
                iconClass = 'fas fa-file-invoice';
                titleText = `ePats: ${pdf.evrakNo || pdf.fileName}`;
                btnClass = 'btn-info';
                if (pdf.evrakNo) badgeHtml = `<small class="ml-1">${pdf.evrakNo}</small>`;
            } else if (pdf.type === 'task_document' || pdf.isTaskDoc) { // Task'ın documents array'inden gelen
                iconClass = 'fas fa-file-alt';
                titleText = 'Görev Belgesi: ' + pdf.fileName;
                btnClass = 'btn-primary';
            } else if (pdf.type === 'child_manual_document' || pdf.isManualDoc) { // Manuel/Child Belgesi
                iconClass = 'fas fa-file-export'; 
                titleText = 'Manuel Belge: ' + pdf.fileName;
                btnClass = 'btn-secondary';
            }
            
            // 🔥 Linkin indirmeyi tetiklemesi için 'download' niteliği ve 'onclick' ile açma yöntemi (güvenlik için)
            return `<a onclick="window.open('${pdf.fileUrl || pdf.path}', '_blank', 'noopener');" 
                    title="${titleText}" class="action-btn ${btnClass} mr-1" download="${pdf.fileName || 'belge'}" style="cursor: pointer;">
                <i class="${iconClass}"></i>
                ${badgeHtml}
            </a>`;
        }
        // 🔥 YENİ EKLENEN FONKSİYON: Task'a bağlı belgeleri getiren yardımcı fonksiyon
        async function fetchTaskDocuments(taskId) {
        if (!taskId) return [];
        try {
            const taskDoc = await getDoc(doc(db, 'tasks', taskId)); 
            if (!taskDoc.exists()) return [];
            
            const taskData = taskDoc.data();
            let docs = [];

            // 1. epatsDocument'i ekle
            if (taskData.details?.epatsDocument) {
            docs.push({
                fileName: taskData.details.epatsDocument.name || 'ePats Belgesi',
                fileUrl: taskData.details.epatsDocument.downloadURL, 
                evrakNo: taskData.details.epatsDocument.turkpatentEvrakNo,
                type: 'epats_document'
            });
            }

            // 2. documents (Task'ın kendi documents array'ini ekle)
            if (Array.isArray(taskData.documents)) {
                taskData.documents.forEach(doc => {
                    // downloadURL, url ve path'i kontrol et
                    const fileUrl = doc.downloadURL || doc.url || doc.path; 
                    
                    if (fileUrl) { 
                        docs.push({
                            fileName: doc.name || 'Task Belgesi',
                            fileUrl: fileUrl, 
                            type: doc.type || 'task_document',
                            isTaskDoc: true
                        });
                    }
                });
            }
            
            return docs;
        } catch (error) {
            console.error('Task belgeleri getirilirken hata:', taskId, error);
            return [];
        }
        }
        function buildParentChild(transactions){
          const PARENT_TYPE_IDS = ['7','19','20'];
          const parentsMap = new Map();
          const childrenMap = {};
          for (const tx of transactions){
            if (PARENT_TYPE_IDS.includes(String(tx.type)) && (tx.transactionHierarchy === 'parent' || !tx.parentId)){
              parentsMap.set(tx.id, tx);
              childrenMap[tx.id] = [];
            }
          }
          for (const tx of transactions){
            if (tx.parentId && childrenMap[tx.parentId]){
              childrenMap[tx.parentId].push(tx);
            }
          }
          Object.values(childrenMap).forEach(arr => arr.sort((a,b)=> new Date(a.timestamp)-new Date(b.timestamp)));
          const parents = [...parentsMap.values()].sort((a,b)=> new Date(a.timestamp)-new Date(b.timestamp));
          return {parents, childrenMap};
        }

        class PortfolioModule {
            getDisplayStatus(r) {
                const rawStatus = (r.status || r.applicationStatus || r.statusText || '').toString().toLowerCase();
                const ipType = (r.type || r.recordType || r.ipType || '').toString().toLowerCase();
                const statusList = STATUSES[ipType];
                const ORG_SET = new Set(['wipo','aripo','euipo','oapi']);
                if (ORG_SET.has(rawStatus)) {
                  const alt = (r.applicationStatus || r.statusText || '').toString();
                  return alt || '-';
                }
                if (statusList) {
                    const match = statusList.find(s => s.value.toLowerCase() === rawStatus);
                    if (match) return match.text;
                }
                return rawStatus || '-';
            }

            constructor() {
                this.allRecords = [];
                this.filteredAndSortedRecords = [];
                this.activeTypeFilter = 'all';
                this.columnFilters = {};
                this.sortBy = { column: 'applicationDate', direction: 'desc' };
                this.selectedRecords = new Set();
                this.objectionRows = [];
                // === EKLENDİ: transaction cache
                this.txCache = new Map(); // key: recordId, value: {transactions, parents, childrenMap}
            }
            onLookupsReady() { this.loadAllData(); }

            init() {
              this.currentUser = auth.currentUser;
              if (!this.currentUser) { return; }
              this.initializePagination();
              this.setupEventListeners();

            initializePagination() {
                pagination = new Pagination({
                    containerId: 'paginationContainer',
                    itemsPerPage: 20,
                    onPageChange: () => { this.renderCurrentPage(); }
                });
            }

            pickArray(x) {
                if (Array.isArray(x?.data)) return x.data;
                if (Array.isArray(x?.items)) return x.items;
                if (Array.isArray(x)) return x;
                if (x?.success && Array.isArray(x.data)) return x.data;
                return [];
            }

            async loadAllData() {
                document.getElementById('loadingIndicator').style.display = 'block';
                try {
                    const recordsResult = await ipRecordsService.getRecords();
                    this.allRecords = this.pickArray(recordsResult);

                    this.initialRenderTableStructure();

                    console.error('❌ Veri yükleme hatası:', error);
                    showNotification('Veriler yüklenirken bir hata oluştu: ' + error.message, 'error');

            async renderObjectionRows(list) {
                const tableBody = document.getElementById('portfolioTableBody');
                const noRecMsg = document.getElementById('noRecordsMessage');
                if (!tableBody || list.length === 0) {
                    if (tableBody) tableBody.style.display = 'none';
                    if (noRecMsg) noRecMsg.style.display = 'block';
                    return;
                }

                // SADECE GÖRÜNÜR SAYFA VERİLERİYLE ÇALIŞ
                const pageData = pagination.getCurrentPageData(list);
                const frag = document.createDocumentFragment();

                // Promise.all kullanarak tüm satırları asenkron olarak oluştur
                const renderPromises = pageData.map(async (row) => {
                    const recordId = row.recordId;
                    const parentTxId = row.id;

                    const txData = this.txCache.get(recordId);
                    if (!txData) return null;

                    const parent = (txData.parents || []).find(p => p.id === parentTxId);
                    const children = (txData.childrenMap || {})[parentTxId] || [];
                    if (!parent) return null;

                    const hasChildren = children.length > 0;
                    const groupId = safeId(`${recordId}_parent_${parentTxId}`);

                    // --- PARENT BELGE ÇEKİMİ ---
                    // Parent'ın manuel/doküman listesi
                    let allParentDocs = (parent.documents || []).map(doc => ({
                        fileName: doc.name || 'Belge',
                        fileUrl: doc.url || doc.path,
                        type: doc.type,
                        isTransactionDoc: true
                    }));
                    
                    const existingParentFileNames = new Set(allParentDocs.map(d => d.fileName).filter(Boolean));
                    const IS_OPPOSITION_PARENT = String(parent.type) === '20' || String(parent.type) === '19'; // Yayına İtiraz Parent'ları

                    // Eğer Parent Task ile tetiklenmişse ePats ve diğer Task belgelerini al
                    if (parent.triggeringTaskId) {
                        try {
                            const taskDocs = await fetchTaskDocuments(parent.triggeringTaskId);
                            taskDocs.forEach(doc => {
                                if (doc.fileName && !existingParentFileNames.has(doc.fileName)) {
                                    allParentDocs.push(doc);
                                    existingParentFileNames.add(doc.fileName);
                                }
                            });
                        } catch (e) {
                            console.error(`Task belgeleri çekilirken hata (ID: ${parent.triggeringTaskId}):`, e);
                        }
                    }
                    
                    // Parent Belge Linklerini Oluşturma
                    const parentDocLinks = IS_OPPOSITION_PARENT 
                        ? '-' // 🔥 İtiraz Parent'larında ikon gösterme
                        : allParentDocs.map(_createDocLinkHtml).join(''); // 🔥 Diğerlerinde ikon göster

                    // Parent Satırını Oluştur
                    const parentTr = document.createElement('tr');
                    parentTr.className = hasChildren ? 'group-header' : '';
                    parentTr.dataset.groupId = groupId;

                    if (row.recordType === 'trademark' || row.recordType === 'marka') {
                        parentTr.style.backgroundColor = '#e3f2fd';
                    }

                    parentTr.innerHTML = `
                        <td class="toggle-cell caret-host">
                            ${hasChildren ? `<button class="row-caret" data-group-id="${groupId}" aria-expanded="false">
                                <i class="fas fa-chevron-right"></i>
                            </button>` : ''}
                        </td>
                        <td>${row.title || '-'}</td>
                        <td>${row.transactionTypeName || '-'}</td>
                        <td>${row.applicationNumber || '-'}</td>
                        <td>${row.applicantName || '-'}</td>
                        <td>${row.opponent || '-'}</td>
                        <td>${row.bulletinDate || '-'}</td>
                        <td>${row.bulletinNo || '-'}</td>
                        <td>${row.epatsDate || '-'}</td>
                        <td>${row.statusText || '-'}</td>
                        <td class="transaction-pdfs">${parentDocLinks}</td> `;

                    // Child Satırlarını Oluştur
                    const childRows = [];
                    if (hasChildren) {
                        for (const child of children) {
                            const childTypeMeta = transactionTypesMap.get(String(child.type));
                            const childTypeName = childTypeMeta?.alias || childTypeMeta?.name || `İşlem ${child.type}`;

                            // --- CHILD BELGE ÇEKİMİ ---
                            let allChildDocs = (child.documents || []).map(doc => ({
                                fileName: doc.name || 'Belge',
                                fileUrl: doc.url || doc.path,
                                type: doc.type,
                                isManualDoc: true
                            }));
                            const existingChildFileNames = new Set(allChildDocs.map(d => d.fileName).filter(Boolean));
                            
                            const IS_CHILD_OPPOSITION_RESPONSE = String(child.type) === '38'; 
                            const IS_CHILD_OPPOSITION_NOTICE = String(child.type) === '27';
                            
                            // Task ile tetiklenmiş Karşı Görüş (38) veya İtiraz Bildirimi (27) ise Task belgelerini çek
                            if ((IS_CHILD_OPPOSITION_RESPONSE || IS_CHILD_OPPOSITION_NOTICE) && child.triggeringTaskId) {
                                const taskDocs = await fetchTaskDocuments(child.triggeringTaskId); 
                                taskDocs.forEach(doc => {
                                    if (doc.fileName && !existingChildFileNames.has(doc.fileName)) {
                                        allChildDocs.push(doc);
                                        existingChildFileNames.add(doc.fileName);
                                    }
                                });
                            }
                            
                            // 🔥 İtiraz Bildirimi (27) ise Parent'ın Task/Manuel belgelerini Child'a ekle
                            if (IS_CHILD_OPPOSITION_NOTICE) {
                                allParentDocs.forEach(doc => {
                                    if (doc.fileName && !existingChildFileNames.has(doc.fileName)) {
                                        allChildDocs.push({...doc, isParentDoc: true}); // Parent'tan geldiğini işaretle
                                        existingChildFileNames.add(doc.fileName);
                                    }
                                });
                            }
                            
                            // Child Belge Linkleri HTML'i
                            const childDocLinks = allChildDocs.map(_createDocLinkHtml).join('');


                            const childTr = document.createElement('tr');
                            childTr.className = 'group-row child-row';
                            childTr.dataset.parentId = groupId;
                            childTr.setAttribute('aria-hidden', 'true');

                            // Child satırı için 11 sütun olmalı:
                            childTr.innerHTML = `
                                <td class="toggle-cell"></td>
                                <td></td>
                                <td style="padding-left: 32px;">↳ ${childTypeName}</td>
                                <td>${row.applicationNumber || '-'}</td>
                                <td>${row.applicantName || '-'}</td>
                                <td>${row.opponent || '-'}</td>
                                <td></td>
                                <td></td>
                                <td>${fmtDate(child.timestamp)}</td>
                                <td></td>
                                <td class="transaction-pdfs">${childDocLinks || '-'}</td> `;
                            childRows.push(childTr);
                        }
                    }

                    const result = [parentTr, ...childRows];
                    return result;
                });

                // Tüm Promise'lerin tamamlanmasını bekle
                const allElements = await Promise.all(renderPromises);
                
                tableBody.innerHTML = '';
                // Filtreleyip DOM'a ekle
                allElements.flat().filter(e => e instanceof Element).forEach(e => frag.appendChild(e));
                
                tableBody.appendChild(frag);
                wireAccordion();

                if (tableBody) tableBody.style.display = list.length > 0 ? 'table-row-group' : 'none';
                if (noRecMsg) noRecMsg.style.display = list.length === 0 ? 'block' : 'none';
            }
            
            renderCurrentPage() {
                const tableBody = document.getElementById('portfolioTableBody');
                if (!tableBody || !pagination) return;
                tableBody.innerHTML = '';

                const isObjections = (this.activeTypeFilter === 'objections');
                const isAccordionTab = (this.activeTypeFilter === 'all' || this.activeTypeFilter === 'trademark');

                if (isObjections) {
                    // applyFiltersAndSort zaten objectionRows'u filtreleyip sıralıyor ve pagination'ı güncelliyor
                    this.renderObjectionRows(this.objectionRows || []);
                    return;
                }

                const frag = document.createDocumentFragment();

                const parents = new Map();
                const children = new Map();

                this.filteredAndSortedRecords.forEach(r => {
                    if ((r.origin === 'WIPO' || r.origin === 'ARIPO') && isAccordionTab) {
                        const internationalRegNo = r.wipoIR || r.aripoIR;
                        if (r.transactionHierarchy === 'parent' && internationalRegNo) {
                            parents.set(internationalRegNo, r);
                        } else if (r.transactionHierarchy === 'child' && internationalRegNo) {
                            if (!children.has(internationalRegNo)) {
                                children.set(internationalRegNo, []);
                            }
                            children.get(internationalRegNo).push(r);
                        }

                tableBody.appendChild(frag);

            applyFiltersAndSort() {
              const globalSearchTerm = (document.getElementById('searchBar').value || '').toLowerCase();

              if (this.activeTypeFilter === 'objections') {
                  let filtered = (this.objectionRows || []).filter(row => {
                      if (globalSearchTerm) {
                          const searchableText = `
                              ${row.transactionTypeName || ''}
                              ${row.applicationNumber || ''}
                              ${row.applicantName || ''}
                              ${row.opponent || ''}
                              ${row.statusText || ''}
                          `.toLowerCase();
                          if (!searchableText.includes(globalSearchTerm)) return false;
                      }
                      return Object.keys(this.columnFilters).every(key => {
                          const filterValue = this.columnFilters[key];
                          if (!filterValue) return true;
                          let recordValue = String(row[key] || '');
                          return recordValue.toLowerCase().includes(filterValue);
                      });
                  });

                  if (this.sortBy.column) {
                      const { column, direction } = this.sortBy;
                      filtered.sort((a, b) => {
                          let valA = a[column] || '';
                          let valB = b[column] || '';
                          if (column.includes('Date')) {
                              valA = new Date(valA || 0);
                              valB = new Date(valB || 0);
                          }
                          if (valA < valB) return direction === 'asc' ? -1 : 1;
                          if (valA > valB) return direction === 'asc' ? 1 : -1;
                          return 0;
                      });
                  }
                if (pagination) {
                    // Sayfalama toplam kayıt sayısını günceller
                    try { pagination.update(filtered.length); } catch (e) { console.warn('Pagination update error in filter:', e); }
                }
                this.renderObjectionRows(filtered);
                return;
              }

            let filtered = this.allRecords.filter(record => {
                let tabMatch = false;
                
                // 1. Sekme Eşleşmesi ve Kayıt Sahipliği Kontrolü
                if (this.activeTypeFilter === 'all') {
                    // 'Tümü' sekmesinde sadece SELF kayıtlarını göster
                    tabMatch = (record.recordOwnerType !== 'third_party');
                } else if (this.activeTypeFilter === 'trademark') {
                    // 'Marka' sekmesinde sadece SELF marka kayıtlarını göster
                    tabMatch = record.type === 'trademark' && record.recordOwnerType !== 'third_party';
                } else if (this.activeTypeFilter === 'litigation') {
                    // 'Davalar' sekmesinde sadece SELF kayıtlarını göster
                    tabMatch = (record.recordOwnerType !== 'third_party') && Array.isArray(record.transactions) && record.transactions.some(t => (t.type || '').includes('Dava'));
                } else if (this.activeTypeFilter === 'objections') {
                    // 🔥 İTİRAZLAR SEKME DÜZELTMESİ: Tüm kayıtları kullan (self VE third_party)
                    tabMatch = true; 
                } else {
                    // Patent/Tasarım gibi diğer sekmelerde sadece tür eşleşmesini kontrol et (varsayılan olarak SELF kabul ediliyor)
                    tabMatch = record.type === this.activeTypeFilter;
                }

                if (!tabMatch) return false;

                // 2. Global Arama ve Sütun Filtreleri (Bu kısım aynı kalacak)
                if (globalSearchTerm) {
                    const searchableText = `
                        ${record.title || ''}
                        ${record.brandText || ''}
                        ${record.applicationNumber || ''}
                        ${record.status || ''}
                        ${record.type || ''}
                        ${record.applicants?.map(a => a.name).join(' ') || ''}
                    `.toLowerCase();
                    if (!searchableText.includes(globalSearchTerm)) return false;
                }

                return Object.keys(this.columnFilters).every(key => {
                    const filterValue = this.columnFilters[key];
                    if (!filterValue) return true;

                    let recordValue = '';
                    if (key === 'owners' || key === 'applicants') {
                        recordValue = record.applicants?.map(a => a.name).join(' ') || '';
                    } else if (key === 'title') {
                        recordValue = record.title || record.brandText || '';
                    } else if (key === 'type' || key === 'recordType' || key === 'ipType') {
                        recordValue = record.type || '';
                    } else {
                        recordValue = String(record[key] || '');
                    }
                    return recordValue.toLowerCase().includes(filterValue);
                });
            });

              if (this.sortBy.column) {
                  const { column, direction } = this.sortBy;
                  filtered.sort((a, b) => {
                      let valA, valB;
                      if (column === 'title') {
                          valA = a.title || a.brandText || '';
                          valB = b.title || b.brandText || '';
                      } else if (column === 'type' || column === 'recordType' || column === 'ipType') {
                          valA = a.type || '';
                          valB = b.type || '';
                      } else if (column === 'owners') {
                          valA = a.applicants?.map(app => app.name).join(', ') || '';
                          valB = b.applicants?.map(app => app.name).join(', ') || '';
                      } else {
                          valA = a[column] || '';
                          valB = b[column] || '';
                      }
                      if (column.includes('Date')) {
                          valA = new Date(valA || 0);
                          valB = new Date(valB || 0);
                      }
                      if (valA < valB) return direction === 'asc' ? -1 : 1;
                      if (valA > valB) return direction === 'asc' ? 1 : -1;
                      return 0;
                  });
              }

              this.filteredAndSortedRecords = filtered;
              if (pagination) pagination.update(this.filteredAndSortedRecords.length);

              document.getElementById('portfolioTableBody').style.display = this.filteredAndSortedRecords.length > 0 ? 'table-row-group' : 'none';
              document.getElementById('noRecordsMessage').style.display = this.filteredAndSortedRecords.length === 0 ? 'block' : 'none';

              this.renderCurrentPage();
            }

            setupEventListeners() {
                document.querySelectorAll('.tab-menu .tab-button').forEach(button => {
                button.addEventListener('click', async (e) => { // 🔥 async eklendi
                    document.querySelectorAll('.tab-menu .tab-button').forEach(btn => btn.classList.remove('active'));
                    e.target.classList.add('active');
                    this.activeTypeFilter = e.target.dataset.type;
                    this.selectedRecords.clear();
                    this.updateAddToMonitoringButtonState();
                    this.setupImageHoverEffect();
                    this.updateRecordStatusToggleButtonState();
                    const globalSelect = document.getElementById('selectAllCheckbox');
                    if (globalSelect) globalSelect.checked = false;
                    this.initialRenderTableStructure();
                    
                    if (this.activeTypeFilter === 'objections') {
                    if (pagination) {
                    try { (pagination.goToPage?.(1)) || (pagination.currentPage = 1); } catch {}
                    }
                    await this.loadObjectionRows();   // ilk render içeride yapılacak
                    return;
                    } else {
                    this.applyFiltersAndSort();
                    }

                });
            });

                let searchTimeout;
                document.getElementById('searchBar').addEventListener('input', () => {
                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(() => this.applyFiltersAndSort(), 300);
                });

                document.getElementById('portfolioTableFilterRow').addEventListener('input', (e) => {
                    if (e.target.classList.contains('column-filter')) {
                        this.columnFilters[e.target.dataset.column] = e.target.value.toLowerCase();
                        this.applyFiltersAndSort();
                    }
                });

                document.getElementById('portfolioTableHeaderRow').addEventListener('click', (e) => {
                    const header = e.target.closest('.sortable-header');
                    if (header) this.toggleSort(header.dataset.column);
                });

                const globalSelect = document.getElementById('selectAllCheckbox');
                if (globalSelect) {
                    globalSelect.addEventListener('change', (e) => {
                        const isChecked = e.target.checked;
                        const currentPageIds = pagination.getCurrentPageData(this.filteredAndSortedRecords).map(r => r.id);
                        currentPageIds.forEach(id => this.toggleRecordSelection(id, isChecked));
                        document.querySelectorAll('#portfolioTableBody .record-checkbox').forEach(cb => cb.checked = isChecked);
                    });
                }

                document.getElementById('portfolioTableBody').addEventListener('change', e => {
                    if (e.target.classList.contains('record-checkbox')) {
                        this.toggleRecordSelection(e.target.dataset.id, e.target.checked);
                    }
                });

                document.getElementById('toggleRecordStatusBtn').addEventListener('click', () => this.toggleSelectedRecordsStatus());
                document.getElementById('addToMonitoringBtn').addEventListener('click', () => this.addSelectedToMonitoring());
                document.getElementById('closeRecordDetailModal').addEventListener('click', () => this.closeModal('recordDetailModal'));

                document.getElementById('portfolioTableBody').addEventListener('click', (e) => {
                    const button = e.target.closest('.action-btn');
                    if (!button) return;
                    e.preventDefault();
                    const recordId = button.dataset.id;
                    if (button.classList.contains('edit-btn')) window.location.href = `data-entry.html?id=${recordId}`;
                    else if (button.classList.contains('delete-btn')) this.deleteRecord(recordId);
                    else if (button.classList.contains('view-btn')) {
                      const url = new URL('portfolio-detail.html', window.location.href);
                      url.searchParams.set('id', recordId);
                      window.open(url.toString(), '_blank', 'noopener');
                    }
                });
            }

            toggleSort(columnKey) {
                if (this.sortBy.column === columnKey) {
                    this.sortBy.direction = this.sortBy.direction === 'asc' ? 'desc' : 'asc';
                } else {
                    this.sortBy.column = columnKey;
                    this.sortBy.direction = 'asc';
                }
                document.querySelectorAll('.sortable-header').forEach(header => {
                    header.classList.remove('asc', 'desc');
                    if (header.dataset.column === this.sortBy.column) {
                        header.classList.add(this.sortBy.direction);
                    }
                });
                this.applyFiltersAndSort();
            }

            toggleRecordSelection(recordId, isChecked) {
                if (isChecked) this.selectedRecords.add(recordId);
                else this.selectedRecords.delete(recordId);
                this.updateRecordStatusToggleButtonState();
                this.updateAddToMonitoringButtonState();
            }

            updateRecordStatusToggleButtonState() {
              const btn = document.getElementById('toggleRecordStatusBtn');
              if (this.selectedRecords.size === 0) {
                  btn.disabled = true;
                  btn.textContent = 'Aktif/Pasif';
                  btn.className = 'btn-status-toggle';
                  return;
              }

              const selected = [...this.selectedRecords]
                  .map(id => this.allRecords.find(r => r.id === id))
                  .filter(Boolean);

              const statuses = selected.map(r => r.portfoyStatus === 'inactive' ? 'inactive' : 'active');
              const first = statuses[0];
              const allSame = statuses.every(s => s === first);

              btn.disabled = false;
              if (allSame && first === 'active') {
                  btn.textContent = `Arşivle (${selected.length})`;
                  btn.className = 'btn-status-toggle archive';
              } else if (allSame && first === 'inactive') {
                  btn.textContent = `Aktif Et (${selected.length})`;
                  btn.className = 'btn-status-toggle activate';
              } else {
                  btn.textContent = `Aktif/Pasif (${selected.length})`;
                  btn.className = 'btn-status-toggle';
              }
            }

            updateAddToMonitoringButtonState() {
                const btn = document.getElementById('addToMonitoringBtn');
                btn.disabled = this.selectedRecords.size === 0;
                btn.textContent = this.selectedRecords.size > 0 ? `İzlemeye Ekle (${this.selectedRecords.size})` : 'İzlemeye Ekle';
            }

            async toggleSelectedRecordsStatus() {
              if (this.selectedRecords.size === 0) return;

              const selected = [...this.selectedRecords]
                  .map(id => this.allRecords.find(r => r.id === id))
                  .filter(Boolean);

              const statuses = selected.map(r => r.portfoyStatus === 'inactive' ? 'inactive' : 'active');
              const first = statuses[0];
              const allSame = statuses.every(s => s === first);

              let targetStatus;
              if (allSame) {
                  targetStatus = (first === 'active') ? 'inactive' : 'active';
              } else {
                  const makeActive = confirm('Seçili kayıtlar farklı durumda. Tümü "Aktif" yapılsın mı? (İptal: Pasif yapılır)');
                  targetStatus = makeActive ? 'active' : 'inactive';
              }

              try {
                  await Promise.all(
                    selected.map(r => ipRecordsService.updateRecord(r.id, { portfoyStatus: targetStatus }))
                  );
                  showNotification(`Seçilen ${selected.length} kayıt "${targetStatus === 'active' ? 'Aktif' : 'Pasif'}" yapıldı.`, 'success');

                  this.selectedRecords.clear();
                  await this.loadAllData();
                  this.updateRecordStatusToggleButtonState();
                  this.updateAddToMonitoringButtonState();
              } catch (err) {
                  console.error(err);
                  showNotification('Kayıtlar güncellenirken bir hata oluştu.', 'error');
              }
            }

            async addSelectedToMonitoring() {
                const selectedIds = Array.from(this.selectedRecords);
                if (selectedIds.length === 0) return;
                let successful = 0, failed = 0, skipped = 0;

                const extractNiceFromRecord = (rec) => {
                    const set = new Set();
                    if (Array.isArray(rec?.goodsAndServicesByClass)) {
                        rec.goodsAndServicesByClass.forEach(c => {
                            const n = Number(c?.classNo);
                            if (!Number.isNaN(n)) set.add(n);
                        });
                    }
                    if (Array.isArray(rec?.niceClasses)) {
                        rec.niceClasses.forEach(n => {
                            n = Number(n);
                            if (!Number.isNaN(n)) set.add(n);
                        });
                    }
                    if (rec?.niceClass && typeof rec.niceClass === 'string') {
                        rec.niceClass.split(/[,\s]+/).forEach(s => {
                            const n = Number(s);
                            if (!Number.isNaN(n)) set.add(n);
                        });
                    }
                    return Array.from(set).sort((a,b)=>a-b);
                };

                for (const id of selectedIds) {
                    const record = this.allRecords.find(r => r.id === id);
                    if (!record) { failed++; continue; }
                    if (record.type !== 'trademark') { skipped++; continue; }

                    const classes = extractNiceFromRecord(record);
                    const has1to34 = classes.some(n => n >= 1 && n <= 34);
                    const niceClassSearch = [...classes];
                    if (has1to34 && !niceClassSearch.includes(35)) niceClassSearch.push(35);

                    const monitoringData = {
                        id: record.id,
                        ipRecordId: record.id,
                        applicationNumber: record.applicationNumber || record.applicationNo || '',
                        applicationNumberNorm: (record.applicationNumber || record.applicationNo || '').toString().trim().toUpperCase().replace(/[\s.\-_/]/g, ''),
                        markName: record.title || record.brandText || record.name || '',
                        brandTextSearch: [record.title || record.brandText || ''].filter(Boolean),
                        niceClassSearch,
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString()
                    };

                    try {
                        const res = await monitoringService.addMonitoringItem(monitoringData);
                        if (res.success) successful++; else failed++;
                    } catch (e) {
                        console.error('İzlemeye ekleme hatası:', e);
                        failed++;
                    }
                }

                if (successful > 0) showNotification(`${successful} kayıt başarıyla izlemeye eklendi.`, 'success');
                if (failed > 0) showNotification(`${failed} kayıt izlemeye eklenirken hata oluştu.`, 'error');
                if (skipped > 0) showNotification(`${skipped} marka olmayan kayıt atlandı.`, 'info');

                this.selectedRecords.clear();
                this.updateAddToMonitoringButtonState();
                this.renderCurrentPage();
            }

            async deleteRecord(recordId) {
                if (confirm('Bu kaydı silmek istediğinizden emin misiniz? Bu işlem geri alınamaz.')) {
                    await ipRecordsService.deleteRecord(recordId);
                    showNotification('Kayıt başarıyla silindi.', 'success');
                    this.loadAllData();
                }
            }

                const modal = document.getElementById('recordDetailModal');

                modal.classList.add('show');

                    const record = recordResult.data;

                    document.getElementById('modalRecordTitle').textContent = `Kayıt Detayı: ${record.title || record.brandText || 'N/A'}`;

                    const getOwnerNames = (applicants) => {
                        if (!applicants || applicants.length === 0) return 'Belirtilmemiş';
                        return applicants.map(a => a.name || 'Bilinmeyen').join(', ');
                    };

                    let imageHtml = '';
                    const imageSrc = (record.type === 'trademark') ? (record.brandImageUrl || record.details?.brandInfo?.brandImage) : null;
                    if (imageSrc) {
                        imageHtml = `<h4 class="modal-detail-section-title">Marka Görseli</h4>
                                        <img src="${imageSrc}" alt="Marka Görseli" class="record-image-display">`;
