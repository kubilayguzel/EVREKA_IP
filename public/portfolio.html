            async loadObjectionRows(options = {}) {
            // === Ayarlar (dilersen dışarıdan geçebilirsin) ===
            const {
                eagerPages = 1, // ilk boyada kaç sayfa hazır olsun?
                pageSize = (this.pagination?.itemsPerPage || 20), // sayfa başına öğe
                batchSize = 25, // her şu kadar satırda bir UI'ı güncelle
                CONCURRENCY = 20, // paralel işçi sayısı (15→20 önerdim)
                parentTypeIds = ['7', '19', '20'] // parent itiraz türleri
            } = options;

            const EAGER_TARGET = (eagerPages * pageSize) + 5; // ilk boyama eşiği (küçük tampon)
            const allRows = [];
            const buffer = []; // UI'ya toplu basacağımız ara biriktirme
            let didFirstPaint = false;
            let isFlushing = false;

            // Basit, sağlam bir flush: buffer'ı allRows'a taşır, UI'ı günceller
            const flushBufferToUI = async (force = false) => {
                if (isFlushing) return;
                if (!force && buffer.length < batchSize) return;
                isFlushing = true;

                // buffer'daki tüm satırları tek hamlede al
                const chunk = buffer.splice(0, buffer.length);
                if (chunk.length) allRows.push(...chunk);

                // Listeyi güncelle
                this.objectionRows = allRows.slice(); // referans kopya
                if (this.pagination?.update) {
                try { this.pagination.update(this.objectionRows.length); } catch {}
                }

                // Tabloyu yeniden çiz
                if (typeof this.renderObjectionRows === 'function') {
                try { this.renderObjectionRows(this.objectionRows); } catch (e) { console.warn('renderObjectionRows hata:', e); }
                }

                isFlushing = false;
            };

            const loading = new window.SimpleLoading();
            loading.show({
                text: 'İtiraz İşlemleri Yükleniyor',
                subtext: 'Bu işlem, geçmiş verilerin taranmasını gerektirir...'
            });

            try {
               
                // 1) Kayıtları hazırla / cache'le
                let allRecords = this.allRecords;
                if (!Array.isArray(allRecords) || allRecords.length === 0) {
                const recordsResult = await ipRecordsService.getRecords();
                allRecords = this.pickArray(recordsResult);
                this.allRecords = allRecords;
                }

                // 2) Kuyruk + işçiler
                const queue = [...allRecords];

                const worker = async () => {
                while (queue.length) {
                    const record = queue.shift();

                    // 2.1) Transactions: cache varsa kullan
                    let txs;
                    const cached = this.txCache.get(record.id);
                    if (!cached?.transactions) {
                    try {
                        const txResult = await ipRecordsService.getTransactionsForRecord(record.id);
                        if (!txResult?.success || !Array.isArray(txResult.transactions)) continue;
                        txs = txResult.transactions;
                        const pc = buildParentChild(txs); // parent/child ilişkileri gerekiyorsa
                        this.txCache.set(record.id, { transactions: txs, ...pc });
                    } catch (e) {
                        console.warn('❌ Record transaction çekme hatası:', record.id, e);
                        continue;
                    }
                    } else {
                    txs = cached.transactions;
                    }

                    // 2.2) Parent itirazları filtrele
                    const parentTransactions = txs.filter(tx =>
                    parentTypeIds.includes(String(tx.type)) &&
                    (tx.transactionHierarchy === 'parent' || !tx.parentId)
                    );
                    if (parentTransactions.length === 0) continue;

                    // 2.3) Her parent için satır oluştur
                    for (const parentTx of parentTransactions) {
                    // ——— Row hesaplama (senkron, ek veri çekmiyoruz) ———
                    const typeMeta = transactionTypesMap?.get?.(String(parentTx.type));
                    const transactionTypeName = typeMeta?.alias || typeMeta?.name || `İşlem ${parentTx.type}`;

                    const opponentName =
                        parentTx.oppositionOwner ||
                        parentTx.relatedParty?.name ||
                        (Array.isArray(parentTx.objectionOwners) && parentTx.objectionOwners.length
                        ? parentTx.objectionOwners.map(o => o.name).join(', ')
                        : '-');

                    const bulletinNo = record.details?.brandInfo?.opposedMarkBulletinNo || parentTx.bulletinNo || '-';
                    const bulletinDate = record.details?.brandInfo?.opposedMarkBulletinDate || parentTx.bulletinDate || null;
                    const epatsDate = parentTx.epatsDocument?.documentDate || null;

                    let statusText = 'Karar Bekleniyor';
                    if (parentTx.requestResult !== undefined && parentTx.requestResult !== null && parentTx.requestResult !== '') {
                        statusText = formatObjectionStatus(parentTx.requestResult);
                    }

                    const row = {
                        id: parentTx.id,
                        recordId: record.id,
                        recordType: record.type || '-',
                        title: record.title || record.brandText || '',
                        transactionTypeName,
                        applicationNumber: record.applicationNumber || '-',
                        applicantName: (record.applicants?.map?.(a => a.name).join(', ')) || '-',
                        opponent: opponentName,
                        bulletinDate: fmtDate(bulletinDate),
                        bulletinNo,
                        epatsDate: fmtDate(epatsDate),
                        statusText,
                        timestamp: parentTx.timestamp
                    };

                    // 2.4) Buffer’a ekle, eşiklere göre UI’ı güncelle
                    buffer.push(row);

                    // İlk boyama eşiği aşıldıysa: hemen göster, overlay’i kapat
                    if (!didFirstPaint && (allRows.length + buffer.length) >= EAGER_TARGET) {
                        await flushBufferToUI(true); // force flush
                        didFirstPaint = true;
                        try { loading.hide(); } catch {}
                    } else {
                        // Ara ara UI’ya küçük partiler halinde bas (algısal akıcılık)
                        await flushBufferToUI(false);
                    }
                    }
                }
                };

                // 3) İşçileri çalıştır
                await Promise.all([...Array(CONCURRENCY)].map(() => worker()));

                // 4) Kalan tamponu bas ve temizle
                if (!didFirstPaint) {
                await flushBufferToUI(true);
                } else {
                const chunk = buffer.splice(0, buffer.length);
                if (chunk.length) allRows.push(...chunk);
                this.objectionRows = allRows.slice();
                if (this.pagination?.update) {
                    try {
                    this.pagination.currentPage = 1;
                    this.pagination.update(this.objectionRows.length); // ✅ toplam yalnızca itiraz sayısı
                    } catch {}
                }
                }
                // 🔥 YENİ EKLENECEK KOD: İlk boyama eşiği (EAGER_TARGET) altında kalsa bile, yükleme bitince toplam sayıyı güncelle.
                if (this.pagination?.update) {
                    try {
                        if (this.pagination.currentPage !== 1) this.pagination.currentPage = 1; // Başlangıçta 1. sayfaya git
                        this.pagination.update(this.objectionRows.length); // Toplam öğe sayısını ayarla
                    } catch (e) { console.warn('Pagination update error:', e); }
                }
            } catch (e) {
                console.error('❌ İtirazlar yüklenirken hata:', e);
                this.objectionRows = [];
            } finally {
                // İlk boyama hiç gerçekleşmediyse yine de overlay’i kapat
                try { loading.hide(); } catch {}
            }
            }


            async loadLitigationRows() {
                const loading = new window.SimpleLoading();
                loading.show({
                    text: 'Davalar Yükleniyor',
                    subtext: 'Suits koleksiyonundan veriler çekiliyor...'
                });

                try {
                    // Firestore'dan suits koleksiyonunu çek
                    const suitsCollection = collection(db, 'suits');
                    const suitsSnapshot = await getDocs(suitsCollection);
                    
                    const allRows = [];

                    suitsSnapshot.forEach((docSnap) => {
                        const data = docSnap.data();
                        
                        // Konu varlık bilgisini al
                        const subjectAsset = data.subjectAsset || {};
                        const suitDetails = data.suitDetails || {};
                        
                        // Dava türünü belirle - transactionType objesi içindeki alias'ı al
                        let suitType = '-';
                        if (data.transactionType && typeof data.transactionType === 'object') {
                            suitType = data.transactionType.alias || data.transactionType.name || '-';
                        } else if (typeof data.transactionType === 'string') {
                            suitType = data.transactionType;
                        } else if (data.alias && typeof data.alias === 'string') {
                            suitType = data.alias;
                        }
                        
                        const row = {
                            id: docSnap.id,
                            title: subjectAsset.title || data.title || '-',
                            suitType: suitType,
                            caseNo: suitDetails.caseNo || '-',
                            court: suitDetails.court || '-',
                            client: (data.client && data.client.name) || data.clientName || '-',
                            clientRole: data.clientRole || '-',
                            opposingParty: suitDetails.opposingParty || '-',
                            opposingCounsel: suitDetails.opposingCounsel || '-',
                            openedDate: suitDetails.openingDate ? fmtDate(suitDetails.openingDate) : '-',
                            suitStatus: this.formatSuitStatus(data.suitStatus) || '-',
                            description: suitDetails.description || '-',
                            subjectAssetNumber: subjectAsset.number || '-',
                            subjectAssetType: subjectAsset.type || '-'
                        };
                        
                        allRows.push(row);
                    });

                    // Sıralama: Açılış tarihine göre (en yeni önce)
                    allRows.sort((a, b) => {
                        const dateA = a.openedDate && a.openedDate !== '-' ? new Date(a.openedDate.split('.').reverse().join('-')) : new Date(0);
                        const dateB = b.openedDate && b.openedDate !== '-' ? new Date(b.openedDate.split('.').reverse().join('-')) : new Date(0);
                        return dateB - dateA;
                    });

                    this.litigationRows = allRows;
                    
                    // Pagination'ı güncelle
                    if (this.pagination?.update) {
                        try {
                            if (this.pagination.currentPage !== 1) this.pagination.currentPage = 1;
                            this.pagination.update(this.litigationRows.length);
                        } catch (e) {
                            console.warn('Pagination update error:', e);
                        }
                    }

                    // Render et
                    this.renderLitigationRows(this.litigationRows);

                } catch (e) {
                    console.error('❌ Davalar yüklenirken hata:', e);
                    this.litigationRows = [];
                    showNotification('Davalar yüklenirken bir hata oluştu', 'error');
                } finally {
                    try { loading.hide(); } catch {}
                }
            }

            formatSuitStatus(status) {
                const statusMap = {
                    'continue': 'Devam Ediyor',
                    'pending': 'Bekliyor',
                    'closed': 'Kapandı',
                    'won': 'Kazanıldı',
                    'lost': 'Kaybedildi',
                    'settled': 'Anlaşma ile Sonuçlandı'
                };
                return statusMap[status] || status || '-';
            }

        initialRenderTableStructure() {
                const headerRow = document.getElementById('portfolioTableHeaderRow');
                const filterRow = document.getElementById('portfolioTableFilterRow');
                headerRow.innerHTML = '';
                filterRow.innerHTML = '';
                const isLitigation = (this.activeTypeFilter === 'litigation');
                const isObjections = (this.activeTypeFilter === 'objections');
                const isTrademark = (this.activeTypeFilter === 'trademark');
                const isAllTab = (this.activeTypeFilter === 'all');
                let columns = isLitigation
                    ? [
                        { key: 'title', label: 'Konu Varlık', sortable: true, width: '180px' },
                        { key: 'suitType', label: 'Dava Türü', sortable: true, width: '150px' },
                        { key: 'caseNo', label: 'Dava No', sortable: true, width: '120px' },
                        { key: 'court', label: 'Mahkeme', sortable: true, width: '150px' },
                        { key: 'client', label: 'Müvekkil', sortable: true, width: '150px' },
                        { key: 'clientRole', label: 'Rol', sortable: true, width: '100px' },
                        { key: 'opposingParty', label: 'Karşı Taraf', sortable: true, width: '150px' },
                        { key: 'opposingCounsel', label: 'Karşı Vekil', sortable: true, width: '150px' },
                        { key: 'openedDate', label: 'Açılış Tarihi', sortable: true, width: '120px' },
                        { key: 'suitStatus', label: 'Durum', sortable: true, width: '120px' },
                        { key: 'description', label: 'Açıklama', sortable: false, width: '200px' },
                        { key: 'actions', label: 'İşlemler', sortable: false, width: '200px' }
                    ]
                    : isObjections
                    ? [
                        { key: 'toggle', label: '', sortable: false, width: '44px' },
                        { key: 'title',           label: 'M/T/B Adı',   sortable: true,  width: '180px' },
                        { key: 'transactionTypeName',   label: 'İşlem Tipi',  sortable: true,  width: '180px' },
                        { key: 'applicationNumber', label: 'Başvuru No',  sortable: true,  width: '140px' },
                        { key: 'applicantName',      label: 'Başvuru Sahibi', sortable: true, width: '250px' },
                        { key: 'opponent', label: 'İtiraz Sahibi', sortable: true, width: '250px' },
                        { key: 'bulletinDate',      label: 'Bülten Tarihi', sortable: true, width: '100px' },
                        { key: 'bulletinNo',        label: 'Bülten No',   sortable: true,  width: '90px' },
                        { key: 'epatsDate',         label: 'İşlem Tarihi', sortable: true, width: '100px' },
                        { key: 'statusText',        label: 'Durum',        sortable: true, width: '120px' },
                        { key: 'documents',         label: 'Evraklar',     sortable: false, width: '150px' } // 🔥 EN SONA EKLENDİ
                    ]
                    : [
                        { key: 'selection', label: '', sortable: false, isCheckbox: true, width: '40px' },
                        { key: 'toggle', label: '', sortable: false, width: '40px' },
                        { key: 'status', label: 'Kayıt Durumu', sortable: true, width: '110px' },
                        { key: 'title', label: 'M/T/B Adı', sortable: true, width: '200px' },
                        { key: 'brandImage', label: 'Görsel', sortable: false, width: '80px' },
                        { key: 'origin', label: 'Menşe', sortable: true, width: '100px' },
                        { key: 'country', label: 'Ülke', sortable: true, width: '80px' },
                        { key: 'applicationNumber', label: 'Başvuru No', sortable: true, width: '120px' },
                        { key: 'applicationDate', label: 'Başvuru Tarihi', sortable: true, width: '120px' },
                        { key: 'applicationStatus', label: 'Başvuru Durumu', sortable: false, width: '120px' },
                        { key: 'applicants', label: 'Baş.Sahibi', sortable: true, width: '200px' },
                        { key: 'actions', label: 'İşlemler', sortable: false, width: '250px' }
                    ];
                if (!isObjections && !isTrademark && !isLitigation) {
                    columns = columns.filter(col => col.key !== 'brandImage' && col.key !== 'origin' && col.key !== 'country');
                }
                if (!isObjections && !isTrademark && !isLitigation) {
                    columns.splice(2, 0, { key: 'ipType', label: 'Kayıt Tipi', sortable: true, width: '100px' });
                }
                if (isAllTab && !columns.find(col => col.key === 'toggle')) {
                    columns.splice(1, 0, { key: 'toggle', label: '', sortable: false, width: '40px' });
                }

                columns.forEach(col => {
                    const th = document.createElement('th');
                    th.style.width = col.width;
                    if (col.sortable) {
                        th.className = 'sortable-header inactive';
                        th.dataset.column = col.key;
                    }
                    th.innerHTML = col.isCheckbox ? '' : col.label;
                    const thFilter = document.createElement('th');
                    if (col.sortable && !col.isCheckbox && col.key !== 'toggle') {
                        thFilter.innerHTML = `<input type="text" class="column-filter" data-column="${col.key}" placeholder="${col.label} ara...">`;
                    }
                    headerRow.appendChild(th);
                    filterRow.appendChild(thFilter);

                });
            }
        }

        (function () {
            const STORAGE_KEY = 'objections_accordion_state';
            function loadState() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; } }
            function saveState(state) { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

            window.wireAccordion = function(){
                const tbody = document.getElementById('portfolioTableBody');
                if(!tbody) return;
                const toggleGroup = (gid, next) => {
                    const btn = tbody.querySelector(`.row-caret[data-group-id="${gid}"]`);
                    if(btn) btn.setAttribute('aria-expanded', String(next));
                    tbody.querySelectorAll(`tr.group-row[data-parent-id="${gid}"]`).forEach(r => {
                        r.setAttribute('aria-hidden', next ? 'false' : 'true');
                    });
                };
                if(!tbody.__accordionBound){
                    tbody.addEventListener('click', (e)=>{
                        const caret = e.target.closest('.row-caret');
                        if(caret){
                            const gid = caret.dataset.groupId;
                            const expanded = caret.getAttribute('aria-expanded') === 'true';
                            toggleGroup(gid, !expanded);
                            return;
                        }
                        const header = e.target.closest('tr.group-header');
                        if(header && !e.target.closest('button,.action-btn,a,input[type="checkbox"]')){
                            const gid = header.dataset.groupId;
                            const hb = header.querySelector('.row-caret');
                            const expanded = hb && hb.getAttribute('aria-expanded') === 'true';
                            toggleGroup(gid, !expanded);
                        }
                    });
                    tbody.__accordionBound = true;
                }
            };

            window.wireObjectionsAccordion = function(){
                const tbody = document.getElementById('portfolioTableBody');
                if(!tbody) return;
                const toggleGroup = (groupId, isExpanded) => {
                    const header = tbody.querySelector(`.accordion-toggle[aria-controls="grp-${groupId}"]`);
                    if (header) {
                        header.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
                        header.querySelector('i').classList.toggle('fa-chevron-right', !isExpanded);
                        header.querySelector('i').classList.toggle('fa-chevron-down', isExpanded);
                    }
                    const rows = tbody.querySelectorAll(`tr.group-row[data-parent-id="${groupId}"]`);
                    rows.forEach(row => {
                        row.setAttribute('aria-hidden', !isExpanded ? 'true' : 'false');
                    });
                    const state = loadState();
                    state[groupId] = isExpanded;
                    saveState(state);
                };
                tbody.addEventListener('click', (e) => {
                    const toggleBtn = e.target.closest('.accordion-toggle');
                    if (toggleBtn) {
                        const groupId = toggleBtn.getAttribute('aria-controls').replace('grp-', '');
                        const isExpanded = toggleBtn.getAttribute('aria-expanded') === 'true';
                        toggleGroup(groupId, !isExpanded);
                    }
                });
                const state = loadState();
                tbody.querySelectorAll('.group-header').forEach(header => {
                    const groupId = header.dataset.groupId;
                    const toggleBtn = header.querySelector('.accordion-toggle');
                    if (state[groupId] && toggleBtn) {
                        toggleGroup(groupId, true);
                    } else if (toggleBtn) {
                        toggleGroup(groupId, false);
                    }
                });
            };
        // DAVA DÜZENLE FONKSİYONLARI
        let currentEditingSuitId = null;

        window.openSuitEditModal = async function(suitId) {
            currentEditingSuitId = suitId;
            const modal = document.getElementById('suitEditModal');
            const loading = document.getElementById('suitEditLoading');
            const form = document.getElementById('suitEditForm');
            
            modal.classList.add('show');
            loading.style.display = 'block';
            form.style.display = 'none';

            try {
                // Suits koleksiyonundan davayı bul
                const suitsRef = collection(db, 'suits');
                const suitsSnapshot = await getDocs(suitsRef);
                
                let suitData = null;
                suitsSnapshot.forEach(doc => {
                    if (doc.id === suitId) {
                        suitData = { id: doc.id, ...doc.data() };
                    }
                });

                if (!suitData) {
                    alert('Dava kaydı bulunamadı!');
                    modal.classList.remove('show');
                    return;
                }

                // Form alanlarını doldur
                document.getElementById('editCaseNo').value = suitData.suitDetails?.caseNo || '';
                document.getElementById('editSuitType').value = suitData.transactionType?.alias || '';
                document.getElementById('editCourt').value = suitData.suitDetails?.court || '';
                
                // Tarih formatını düzenle
                if (suitData.suitDetails?.openingDate) {
                    try {
                        let date;
                        // Eğer Firestore Timestamp ise
                        if (suitData.suitDetails.openingDate.seconds) {
                            date = new Date(suitData.suitDetails.openingDate.seconds * 1000);
                        } 
                        // Eğer string veya Date ise
                        else {
                            date = new Date(suitData.suitDetails.openingDate);
                        }
                        
                        // Geçerli tarih kontrolü
                        if (!isNaN(date.getTime())) {
                            document.getElementById('editOpenedDate').value = date.toISOString().split('T')[0];
                        }
                    } catch (e) {
                        console.warn('Tarih formatı hatası:', e);
                    }
                }
                
                document.getElementById('editSuitStatus').value = suitData.suitDetails?.suitStatus || 'Devam Ediyor';
                document.getElementById('editClientName').value = suitData.client?.name || '';
                document.getElementById('editClientRole').value = suitData.client?.clientRole || 'Davacı';
                document.getElementById('editOpposingParty').value = suitData.suitDetails?.opposingParty || '';
                document.getElementById('editOpposingCounsel').value = suitData.suitDetails?.opposingCounsel || '';
                document.getElementById('editSubjectAssetTitle').value = suitData.subjectAsset?.title || '';
                document.getElementById('editDescription').value = suitData.suitDetails?.description || '';

                loading.style.display = 'none';
                form.style.display = 'block';

            } catch (error) {
                console.error('Dava verileri yüklenirken hata:', error);
                alert('Dava verileri yüklenirken bir hata oluştu.');
                modal.classList.remove('show');
            }
        };

        // Form submit handler
        document.getElementById('suitEditForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!confirm('Değişiklikleri kaydetmek istediğinizden emin misiniz?')) {
                return;
            }

            try {
                const btn = e.target.querySelector('button[type="submit"]');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Kaydediliyor...';

                // Güncellenecek veriyi hazırla
                const updatedData = {
                    'suitDetails.caseNo': document.getElementById('editCaseNo').value,
                    'transactionType.alias': document.getElementById('editSuitType').value,
                    'suitDetails.court': document.getElementById('editCourt').value,
                    'suitDetails.openingDate': document.getElementById('editOpenedDate').value ? new Date(document.getElementById('editOpenedDate').value) : null,
                    'suitDetails.suitStatus': document.getElementById('editSuitStatus').value,
                    'client.name': document.getElementById('editClientName').value,
                    'client.clientRole': document.getElementById('editClientRole').value,
                    'suitDetails.opposingParty': document.getElementById('editOpposingParty').value,
                    'suitDetails.opposingCounsel': document.getElementById('editOpposingCounsel').value,
                    'subjectAsset.title': document.getElementById('editSubjectAssetTitle').value,
                    'suitDetails.description': document.getElementById('editDescription').value
                };

                // Firestore'da güncelle
                const suitRef = doc(db, 'suits', currentEditingSuitId);
                await updateDoc(suitRef, updatedData);

                alert('Dava başarıyla güncellendi!');
                document.getElementById('suitEditModal').classList.remove('show');
                
                // Tabloyu yenile
                await loadPortfolioData();

            } catch (error) {
                console.error('Kaydetme hatası:', error);
                alert('Dava kaydedilirken bir hata oluştu: ' + error.message);
            } finally {
                const btn = e.target.querySelector('button[type="submit"]');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Kaydet';
            }
        });
      })();
    </script>
</body>
