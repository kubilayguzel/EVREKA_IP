<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPGATE - Portföy Yönetimi</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    
    <link rel="stylesheet" href="css/shared-styles.css">
    <link rel="stylesheet" href="css/simple-loading.css">
    
    <style>
        /* Portföy Tablosu İçin Özel Stiller */
        .table-row-dashed tr { border-bottom: 1px dashed #e4e6ef; }
        .table-row-dashed tr:last-child { border-bottom: 0; }
        .table td, .table th { vertical-align: middle; padding: 0.75rem; }
        
        /* Accordion Oku */
        .row-caret { transition: transform 0.3s ease; }
        .fa-rotate-90 { transform: rotate(90deg); }
        .toggle-cell { cursor: pointer; }
        
        /* Gruplama Başlığı (WIPO/Dava Parent) */
        .group-header { background-color: #f8f9fa; font-weight: 500; }
        .child-row { background-color: #fafafa; }
        
        /* Sıralanabilir Başlık */
        .sortable-header:hover { color: #009ef7 !important; }
        
        /* Avatar */
        .symbol-45px { width: 45px; height: 45px; overflow: hidden; border-radius: 6px; background: #f5f8fa; }
        .symbol-45px img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body id="kt_body" class="header-fixed header-tablet-and-mobile-fixed toolbar-enabled toolbar-fixed">
    
    <div id="layout-placeholder"></div>

    <div class="d-flex flex-column flex-root">
        <div class="page d-flex flex-row flex-column-fluid">
            <div class="wrapper d-flex flex-column flex-row-fluid" id="kt_wrapper">
                
                <div class="header align-items-stretch">
                    <div class="container-fluid d-flex align-items-stretch justify-content-between">
                        <div class="d-flex align-items-center flex-wrap me-3">
                            <h1 class="d-flex align-items-center text-dark fw-bolder fs-3 my-1">Portföy Yönetimi</h1>
                        </div>
                        
                        <div class="d-flex align-items-center">
                            <div class="d-flex align-items-center ms-1 ms-lg-3">
                                <div class="cursor-pointer symbol symbol-30px symbol-md-40px">
                                    <img id="userAvatar" src="assets/media/avatars/blank.png" alt="user" />
                                </div>
                                <div class="ms-2">
                                    <span class="text-dark fw-bolder fs-6 user-name" id="userNameDisplay">Kullanıcı</span>
                                    <span class="text-muted fw-bold d-block fs-7" id="userEmailDisplay"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="content fs-6 d-flex flex-column flex-column-fluid" id="kt_content">
                    <div class="container-fluid">
                        
                        <ul class="nav nav-tabs nav-line-tabs mb-5 fs-6" id="portfolioTabs" role="tablist">
                            <li class="nav-item">
                                <a class="nav-link active" data-toggle="tab" href="#trademark">Markalar</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" data-toggle="tab" href="#patent">Patentler</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" data-toggle="tab" href="#design">Tasarımlar</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" data-toggle="tab" href="#litigation">Davalar</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" data-toggle="tab" href="#objections">İtirazlar</a>
                            </li>
                        </ul>

                        <div class="card">
                            <div class="card-header border-0 pt-6">
                                <div class="card-title">
                                    <div class="d-flex align-items-center position-relative my-1">
                                        <i class="fas fa-search position-absolute ms-5 text-gray-500"></i>
                                        <input type="text" id="searchInput" class="form-control form-control-solid w-250px ps-14" placeholder="Kayıt Ara..." />
                                    </div>
                                </div>
                                <div class="card-toolbar">
                                    <div class="d-flex justify-content-end" data-kt-user-table-toolbar="base">
                                        <button type="button" class="btn btn-light-primary me-3" onclick="location.reload()">
                                            <i class="fas fa-sync"></i> Yenile
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="card-body py-4">
                                <div class="table-responsive">
                                    <table class="table align-middle table-row-dashed fs-6 gy-5" id="portfolioTable">
                                        <thead>
                                            <tr class="text-start text-muted fw-bolder fs-7 text-uppercase gs-0">
                                                </tr>
                                        </thead>
                                        <tbody class="text-gray-600 fw-bold" id="portfolioTableBody">
                                            </tbody>
                                    </table>
                                </div>
                                
                                <div class="d-flex justify-content-between align-items-center flex-wrap mt-5">
                                    <div id="paginationInfo" class="fs-6 fw-bold text-gray-700"></div>
                                    <ul id="paginationContainer" class="pagination">
                                        </ul>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
                
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    
    <script type="module" src="js/layout-loader.js"></script>
    
    <script type="module" src="js/portfolio/main.js"></script>

</body>
</html>
