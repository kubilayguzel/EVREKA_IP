<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPGATE - Tetiklenen Görevlerim</title>
    
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="stylesheet" href="./css/shared-styles.css">
    <link rel="stylesheet" href="./css/deadline-highlighter.css">
    
    <style>
        /* --- SAYFAYA ÖZEL STİLLER --- */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #333; display: flex; }
        .page-wrapper {
            flex-grow: 1; display: flex; flex-direction: column;
            height: 100vh; overflow-y: auto;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .main-container { width: 100%; padding: 30px; padding-top: 120px; }
        
        .page-header { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); }
        .page-title { font-size: 2em; color: #1e3c72; margin-bottom: 10px; }
        .page-subtitle { color: #666; font-size: 1.1em; }
        
        .tasks-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            padding-bottom: 20px;
        }

        .tasks-header {
            padding: 20px 30px;
            border-bottom: 1px solid #e1e8ed;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* --- MODERN ARAMA ALANI --- */
        .search-wrapper {
            position: relative;
            flex-grow: 1;
            max-width: 400px;
            min-width: 250px;
        }
        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            pointer-events: none;
            transition: color 0.3s ease;
        }
        .search-input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border: 2px solid #e1e8ed;
            border-radius: 50px;
            font-size: 0.95rem;
            color: #4a5568;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }
        .search-wrapper:focus-within .search-icon { color: #007bff; }

        /* Filtre ve Butonlar */
        .filter-group { display: flex; gap: 10px; align-items: center; }
        .filter-label { font-weight: 500; }
        .filter-select { padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; }
        
        .action-btn { background: #007bff; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; margin-right: 5px; font-size: 0.85em; transition: all 0.2s; }
        .action-btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Tablo Stilleri */
        .tasks-table { width: 100%; border-collapse: collapse; }
        .tasks-table th, .tasks-table td { padding: 15px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .tasks-table th { background: #f8f9fa; font-weight: 600; cursor: pointer; user-select: none; }
        .tasks-table th:hover { background-color: #e9ecef; }
        .tasks-table th i { margin-left: 5px; opacity: 0.3; }
        .tasks-table th.no-sort { cursor: default; }

        /* Statü Rozetleri */
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 0.8em; font-weight: 500; color: white; text-align: center; }
        .status-awaiting_client_approval { background-color: #6f42c1; }
        .status-client_approval_opened { background-color: #28a745; }
        .status-client_approval_closed { background-color: #6c757d; }
        .status-client_no_response_closed { background-color: #fd7e14; }
        .status-open { background-color: #007bff; }
        .status-completed { background-color: #28a745; }

        /* Pagination & Loading */
        .pagination-container { display: flex; justify-content: center; padding: 20px; }
        .loading { text-align: center; padding: 50px; display: none; }
        .no-records { text-align: center; padding: 50px; color: #666; display: none; }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1002; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background-color: #fefefe; margin: auto; padding: 30px; border: 1px solid #888; width: 90%; max-width: 1000px; border-radius: 20px; max-height: 90vh; overflow-y: auto; }
        .close-modal-btn { float: right; font-size: 28px; font-weight: bold; cursor: pointer; color: #aaa; }
        .modal-title { font-size: 1.5em; color: #1e3c72; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        .form-input, .form-select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="notification-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>
    <div id="layout-placeholder"></div>

    <div class="page-wrapper">
        <main class="main-container">
            <section class="page-header">
                <h1 class="page-title">Tetiklenen Görevler</h1>
                <p class="page-subtitle">Otomasyon ile oluşturulan ve takip gerektiren görevler.</p>
            </section>
    
            <div class="tasks-container">
                <div class="tasks-header">
                    <div class="search-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="searchInput" class="search-input" placeholder="Başlık, numara veya tip ile ara...">
                    </div>

                    <button id="manualRenewalTriggerBtn" class="action-btn" style="background-color: #28a745;">
                        <i class="fas fa-sync-alt mr-2"></i> Yenilemeleri Kontrol Et
                    </button>

                    <div class="filter-group">
                        <label class="filter-label" for="statusFilter">Durum:</label>
                        <select id="statusFilter" class="filter-select">
                            <option value="all">Tümü</option>
                            <option value="awaiting_client_approval">Müvekkil Onayı Bekliyor</option>
                            <option value="client_approval_opened">Müvekkil Onayladı</option>
                            <option value="client_approval_closed">Müvekkil Reddetti</option>
                            <option value="client_no_response_closed">Cevap Alınamadı</option>
                        </select>
                    </div>
                </div>
                
                <div class="table-container">
                    <table class="tasks-table" id="triggeredTasksTable">
                        <thead>
                            <tr id="tasksTableHeaderRow">
                                <th data-sort="id">İş No <i class="fas fa-sort"></i></th>
                                <th data-sort="applicationNumber">Başvuru No <i class="fas fa-sort"></i></th>
                                <th data-sort="relatedRecordTitle">İlgili Kayıt <i class="fas fa-sort"></i></th>
                                <th data-sort="applicantName">Sahip <i class="fas fa-sort"></i></th>
                                <th data-sort="taskTypeDisplayName">Tip <i class="fas fa-sort"></i></th>
                                <th data-sort="operationalDueObj">Son Tarih <i class="fas fa-sort"></i></th>
                                <th data-sort="status">Durum <i class="fas fa-sort"></i></th>
                                <th class="no-sort">İşlemler</th>
                            </tr>
                        </thead>
                        <tbody id="myTasksTableBody">
                            </tbody>
                    </table>
                </div>
                
                <div id="loadingIndicator" class="loading">Veriler Yükleniyor...</div>
                <div id="noTasksMessage" class="no-records">Görüntülenecek görev bulunamadı.</div>
                
                <div id="paginationContainer" class="pagination-container"></div>
            </div>
        </main>
    </div>

    <div id="taskDetailModal" class="modal">
        <div class="modal-content">
            <span class="close-modal-btn" id="closeTaskDetailModal">&times;</span>
            <h3 class="modal-title" id="modalTaskTitle">İş Detayı</h3>
            
            <div id="modalBody" class="modal-body-content"></div> 
        </div>
    </div>
    
    <div class="modal" id="createMyTaskAccrualModal">
        <div class="modal-content">
            <span class="close-modal-btn" id="closeMyTaskAccrualModal">&times;</span>
            <h3 class="modal-title">Ek Tahakkuk Oluştur</h3>
            
            <div class="form-group">
                <label>İlgili İş</label>
                <input type="text" id="accrualTaskTitleDisplay" class="form-input" readonly disabled style="background-color: #f8f9fa;">
            </div>

            <div id="accrualFormContainer"></div>

            <div class="modal-footer" style="border-top: 1px solid #eee; padding-top: 20px; margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                <button type="button" class="btn btn-secondary" id="cancelCreateMyTaskAccrualBtn">İptal</button>
                <button type="button" class="btn btn-primary" id="saveNewMyTaskAccrualBtn">Tahakkuku Oluştur</button>
            </div>
        </div>
    </div>

    <div id="changeTriggeredTaskStatusModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <span class="close-modal-btn" id="closeChangeTriggeredTaskStatusModal">&times;</span>
            <h3 class="modal-title">Durum Değiştir</h3>
            
            <p id="changeStatusModalTaskTitleDisplay" style="font-weight:bold; margin-bottom:20px; color:#1e3c72;"></p>
            
            <div class="form-group">
                <label for="newTriggeredTaskStatus">Yeni Durum Seçiniz:</label>
                <select id="newTriggeredTaskStatus" class="form-select">
                    <option value="client_approval_opened">Müvekkil Onayı - Açıldı (İşi Başlat)</option>
                    <option value="client_approval_closed">Müvekkil Onayı - Kapatıldı (Red)</option>
                    <option value="client_no_response_closed">Müvekkil Cevaplamadı - Kapatıldı</option>
                </select>
            </div>
            
            <div class="modal-footer" style="border-top: 1px solid #eee; padding-top: 15px; margin-top: 15px; text-align: right;">
                <button type="button" class="btn btn-secondary" id="cancelChangeTriggeredTaskStatusBtn">İptal</button>
                <button type="button" class="btn btn-primary" id="saveChangeTriggeredTaskStatusBtn">Kaydet</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="./js/deadline-highlighter.js"></script>
    
    <script type="module" src="./js/task-management/triggered-tasks.js"></script>
</body>
</html>
