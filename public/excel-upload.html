<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO Excel Portföy Yükleyici | Evreka IP</title>
    <link rel="stylesheet" href="css/shared-styles.css">
    <link rel="stylesheet" href="css/data-entry.css">
    <script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <style>
        .upload-wrapper { padding: 40px; max-width: 1100px; margin: 40px auto; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header-section { text-align: center; margin-bottom: 40px; }
        .header-section h2 { color: #1e3c72; font-weight: 700; margin-bottom: 10px; }
        .header-section p { color: #6c757d; }

        .config-card { background: #f8f9fa; border: 1px solid #e9ecef; padding: 25px; border-radius: 12px; margin-bottom: 30px; display: flex; align-items: center; gap: 20px; }
        .config-icon { font-size: 24px; color: #1e3c72; }
        .client-select { flex-grow: 1; padding: 12px 15px; border: 2px solid #e9ecef; border-radius: 8px; font-size: 15px; transition: border-color 0.3s; }
        .client-select:focus { border-color: #1e3c72; outline: none; }

        .drop-zone { border: 2px dashed #cbd5e1; padding: 60px; text-align: center; border-radius: 16px; cursor: pointer; transition: all 0.3s ease; background: #fff; }
        .drop-zone:hover { border-color: #1e3c72; background: #f0f7ff; transform: translateY(-2px); }
        .drop-zone i { font-size: 48px; color: #1e3c72; margin-bottom: 15px; }
        .drop-zone p { margin: 0; color: #64748b; font-size: 16px; }

        /* Progress Bar Stilleri */
        .progress-container { margin-top: 30px; display: none; }
        .progress-info { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 600; color: #334155; }
        .progress-track { background: #e2e8f0; border-radius: 10px; height: 12px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #1e3c72, #2a5298); width: 0%; height: 100%; transition: width 0.3s ease; border-radius: 10px; }

        /* Log Alanı */
        .status-log { margin-top: 30px; max-height: 250px; overflow-y: auto; padding: 20px; background: #1e293b; color: #f1f5f9; border-radius: 12px; font-family: 'Consolas', monospace; font-size: 13px; line-height: 1.6; display: none; }
        .log-item { margin-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 2px; }
        .log-success { color: #4ade80; }
        .log-error { color: #f87171; }
        .log-info { color: #94a3b8; }
        
        .btn-restart { display: none; margin-top: 20px; width: 100%; padding: 15px; background: #1e3c72; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .btn-restart:hover { background: #162c55; }
    </style>
</head>
<body>
    <div id="layout-placeholder"></div>

    <div class="upload-wrapper">
        <div class="header-section">
            <h2>Excel Portföy Aktarımı (Pro)</h2>
            <p>Yüksek performanslı veri işleme, WIPO hiyerarşisi, Otomatik Transaction ve Dinamik Ülke Eşleşmesi.</p>
        </div>

        <div class="config-card">
            <div class="config-icon"><i class="fas fa-user-tie"></i></div>
            <div style="flex-grow: 1;">
                <label style="display:block; margin-bottom: 8px; font-weight: 600; color:#334155;">Hedef Müşteri</label>
                <select id="clientSelect" class="client-select">
                    <option value="">Yükleniyor...</option>
                </select>
            </div>
        </div>

        <div id="dropZone" class="drop-zone">
            <input type="file" id="fileInput" accept=".xlsx" style="display: none;">
            <i class="fas fa-cloud-upload-alt"></i>
            <p><strong>Excel Dosyasını Sürükleyin</strong></p>
            <p style="font-size: 14px; margin-top: 5px; opacity: 0.7;">veya dosya seçmek için tıklayın</p>
        </div>

        <div id="progressContainer" class="progress-container">
            <div class="progress-info">
                <span id="progressText">İşleniyor...</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-track">
                <div id="progressFill" class="progress-fill"></div>
            </div>
        </div>

        <div id="statusLog" class="status-log"></div>

        <button id="restartBtn" class="btn-restart" onclick="location.reload()"><i class="fas fa-redo mr-2"></i>Yeni Dosya Yükle</button>
    </div>

    <script type="module">
        import { db, storage, ipRecordsService } from './firebase-config.js'; 
        import { collection, getDocs, query, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { loadSharedLayout } from './js/layout-loader.js';
        
        // --- GLOBAL DEĞİŞKENLER ---
        const MAX_CONCURRENT_UPLOADS = 5; 
        let ALL_COUNTRIES = []; 
        let elements = {}; 

        // --- DOM HAZIR OLDUĞUNDA ÇALIŞACAK KODLAR ---
        document.addEventListener('DOMContentLoaded', () => {
             // 1. Layout Yükle
             loadSharedLayout({ activeMenuLink: 'excel-upload.html' });

             // 2. Elementleri Seç
             elements = {
                dropZone: document.getElementById('dropZone'),
                fileInput: document.getElementById('fileInput'),
                clientSelect: document.getElementById('clientSelect'),
                progressContainer: document.getElementById('progressContainer'),
                progressFill: document.getElementById('progressFill'),
                progressText: document.getElementById('progressText'),
                progressPercent: document.getElementById('progressPercent'),
                statusLog: document.getElementById('statusLog'),
                restartBtn: document.getElementById('restartBtn')
            };

            // 3. Event Listener'ları Ekle
            if (elements.dropZone && elements.fileInput) {
                elements.dropZone.onclick = () => elements.fileInput.click();
                elements.fileInput.onchange = (e) => { if(e.target.files.length) handleFile(e.target.files[0]); };
                
                elements.dropZone.ondragover = (e) => { e.preventDefault(); elements.dropZone.style.background = "#f0f7ff"; };
                elements.dropZone.ondragleave = (e) => { e.preventDefault(); elements.dropZone.style.background = "#fff"; };
                elements.dropZone.ondrop = (e) => { e.preventDefault(); if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); };
            } else {
                console.error("Kritik elementler (dropZone veya fileInput) bulunamadı!");
            }

            // 4. Verileri Başlat
            init();
        });

        // --- 1. BAŞLATMA VE VERİ YÜKLEME ---
        async function init() {
            try {
                await Promise.all([loadClients(), loadCountries()]);
            } catch (e) {
                log(`Başlatma hatası: ${e.message}`, 'error');
            }
        }

        async function loadClients() {
            if (!elements.clientSelect) return;
            const q = query(collection(db, "persons"), orderBy("name"));
            const snap = await getDocs(q);
            elements.clientSelect.innerHTML = '<option value="">-- Lütfen Müşteri Seçiniz --</option>';
            snap.forEach(doc => {
                const opt = document.createElement('option');
                opt.value = doc.id;
                opt.textContent = doc.data().name;
                opt.dataset.name = doc.data().name;
                opt.dataset.email = doc.data().email || "";
                elements.clientSelect.appendChild(opt);
            });
        }

        async function loadCountries() {
            try {
                const docRef = doc(db, 'common', 'countries');
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    ALL_COUNTRIES = docSnap.data().list || [];
                    console.log(`${ALL_COUNTRIES.length} adet ülke yüklendi.`);
                }
            } catch (e) { console.error(e); }
        }

        // --- 2. YARDIMCI PARSER FONKSİYONLARI ---

        function formatDateForDataEntry(cellValue) {
            if (!cellValue) return null;
            let dateObj = null;
            
            if (cellValue instanceof Date) {
                dateObj = cellValue;
            } else {
                const d = new Date(cellValue);
                if (!isNaN(d.getTime())) dateObj = d;
            }

            if (dateObj) {
                const year = dateObj.getFullYear();
                const month = String(dateObj.getMonth() + 1).padStart(2, '0');
                const day = String(dateObj.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            }
            return null;
        }

        function mapStatus(statusText) {
            if (!statusText) return 'filed';
            const s = String(statusText).trim().toLowerCase();
            if (s.startsWith('valid')) return 'registered';
            if (s.startsWith('expired')) return 'expired';
            if (s.startsWith('invalid')) return 'invalidated'; 
            return 'filed'; 
        }

        function getCountryCode(countryName) {
            if (!countryName) return "TR"; 
            const search = String(countryName).trim().toLowerCase();
            if (search.includes('wipo')) return 'WO'; // WIPO için WO kodu döner
            if (search.includes('aripo')) return 'AP'; // ARIPO için AP
            
            const found = ALL_COUNTRIES.find(c => c.name.toLowerCase() === search);
            if (found) return found.code;
            return "TR";
        }

        function parseClassesAndServices(text) {
            if (!text) return { classes: [], cleanText: "" };
            const classRegex = /\[(\d+)\]:/g;
            const classes = [];
            let match;
            while ((match = classRegex.exec(text)) !== null) {
                if (!classes.includes(match[1])) classes.push(match[1]);
            }
            return { classes, cleanText: text.trim() };
        }

        // --- 3. LOGLAMA VE UI ---
        function log(msg, type = 'info') {
            if (!elements.statusLog) return;
            elements.statusLog.style.display = 'block';
            const div = document.createElement('div');
            div.className = `log-item log-${type}`;
            div.innerHTML = `<span style="opacity:0.6">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
            elements.statusLog.appendChild(div);
            elements.statusLog.scrollTop = elements.statusLog.scrollHeight;
        }

        function updateProgress(current, total) {
            if (!elements.progressFill) return;
            const percent = Math.round((current / total) * 100);
            elements.progressFill.style.width = `${percent}%`;
            elements.progressPercent.textContent = `${percent}%`;
            elements.progressText.textContent = `${current}/${total} İşlendi`;
        }

        // --- 4. EXCEL İŞLEME MANTIĞI ---
        async function handleFile(file) {
            const clientId = elements.clientSelect.value;
            if (!clientId) {
                alert("Lütfen önce listeden bir müşteri seçin!");
                elements.fileInput.value = ''; 
                return;
            }

            elements.dropZone.style.display = 'none';
            elements.progressContainer.style.display = 'block';
            
            const selectedOption = elements.clientSelect.options[elements.clientSelect.selectedIndex];
            const clientName = selectedOption.dataset.name;
            const clientEmail = selectedOption.dataset.email || "";

            log(`Dosya okunuyor: ${file.name}`, 'info');

            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(file);
            const sheet = workbook.getWorksheet(1);
            
            const rowsToProcess = [];
            sheet.eachRow((row, rowNumber) => {
                if (rowNumber === 1) return;
                if (!row.getCell(1).value) return;

                const rawData = {
                    rowNumber,
                    Name: row.getCell(1).text,
                    Registry: row.getCell(3).text,
                    Status: row.getCell(4).text,
                    "Goods and services": row.getCell(6).text,
                    "App. no.": row.getCell(7).text,
                    "Reg. no": row.getCell(8).text, // DİKKAT: Anahtar "Reg. no"
                    "App. date": row.getCell(9).value,
                    "Reg. date": row.getCell(10).value,
                    "Jurisdictions": row.getCell(13).text
                };
                rowsToProcess.push(rawData);
            });

            const totalRows = rowsToProcess.length;
            log(`${totalRows} adet kayıt bulundu. İşlem başlıyor...`, 'info');

            let processedCount = 0;
            let successCount = 0;
            let errorCount = 0;

            const processRow = async (rowData) => {
                try {
                    const parsedJS = parseClassesAndServices(rowData["Goods and services"]);
                    const rawJurisdictions = rowData.Jurisdictions || "";
                    const isWipo = rowData.Registry === "INT WIPO" && rawJurisdictions.includes(",");
                    
                    const mappedStatus = mapStatus(rowData.Status);
                    const appDateStr = formatDateForDataEntry(rowData["App. date"]);
                    const regDateStr = formatDateForDataEntry(rowData["Reg. date"]);
                    
                    // Marka adını tamamen küçük harfe çevir
                    const formattedBrandText = rowData.Name.replace(/\n/g, ' ').trim().toLowerCase();

                    const baseData = {
                        applicants: [{
                            id: clientId,
                            name: clientName,
                            email: clientEmail
                        }],
                        title: formattedBrandText, 
                        brandText: formattedBrandText,
                        brandCategory: "Ticaret/Hizmet Markası",
                        brandImageUrl: null, 
                        status: mappedStatus,
                        // DİKKAT: rowData["Reg. no"] kullanıyoruz (noktasız)
                        applicationNumber: rowData["App. no."] ? String(rowData["App. no."]) : "",
                        registrationNumber: rowData["Reg. no"] ? String(rowData["Reg. no"]) : "",
                        applicationDate: appDateStr,
                        registrationDate: regDateStr,
                        niceClasses: parsedJS.classes,
                        goodsAndServicesByClass: [{ classNo: parsedJS.classes[0] || '0', items: [parsedJS.cleanText] }],
                        source: "Excel Import",
                        type: "trademark",
                        createdAt: new Date().toISOString()
                    };

                    let createdRecords = [];

                    if (isWipo) {
                        // --- WIPO PARENT KAYDI ---
                        
                        // 1. Ülke kodları listesini hazırla
                        const countryCodes = rawJurisdictions.split(',')
                            .map(c => c.trim())
                            .map(cName => getCountryCode(cName));

                        // 2. Parent verisini oluştur
                        const wipoParentData = {
                            ...baseData,
                            country: "WO", // Standart WIPO kodu (String "WIPO" yerine)
                            countries: countryCodes, // [DE, FR, IT...]
                            transactionHierarchy: "parent",
                            origin: "WIPO",
                            // Parent için özel override: Tescil No -> Başvuru No
                            applicationNumber: baseData.registrationNumber, 
                            applicationDate: baseData.registrationDate      
                        };

                        const parentResult = await ipRecordsService.addRecord(wipoParentData);

                        if (!parentResult.success) throw new Error("Parent WIPO hatası: " + parentResult.error);
                        createdRecords.push({ id: parentResult.id || parentResult.data?.id, role: 'parent' });

                        // --- WIPO CHILD KAYITLARI ---
                        // Not: countryCodes listesini zaten oluşturduk ama döngü için isimlere ihtiyacımız olabilir
                        // veya direkt kodları kullanabiliriz.
                        const countryNames = rawJurisdictions.split(',').map(c => c.trim());
                        
                        for (const countryName of countryNames) {
                            const childCode = getCountryCode(countryName);
                            // Child kayıtlar orijinal baseData'yı kullanır
                            const childRes = await ipRecordsService.addRecord({
                                ...baseData,
                                country: childCode,
                                transactionHierarchy: "child",
                                parentId: parentResult.id || parentResult.data?.id,
                                origin: "WIPO"
                            });
                            if(childRes.success) {
                                createdRecords.push({ id: childRes.id || childRes.data?.id, role: 'child' });
                            }
                        }
                    } else {
                        // --- NORMAL TEKİL KAYIT ---
                        const singleCountry = rawJurisdictions.split(',')[0].trim();
                        const countryCode = getCountryCode(singleCountry);
                        
                        const res = await ipRecordsService.addRecord({
                            ...baseData,
                            country: countryCode,
                            transactionHierarchy: "parent",
                            origin: "Yurtdışı Ulusal"
                        });
                        
                        if(!res.success) throw new Error("Kayıt hatası: " + res.error);
                        createdRecords.push({ id: res.id || res.data?.id, role: 'parent' });
                    }

                    // --- TRANSACTION OLUŞTURMA ---
                    for (const rec of createdRecords) {
                        await ipRecordsService.addTransactionToRecord(rec.id, {
                            type: '2', 
                            designation: 'Başvuru',
                            description: 'Excel ile otomatik oluşturulan başvuru kaydı.',
                            timestamp: new Date().toISOString(),
                            transactionHierarchy: rec.role
                        });
                    }

                    successCount++;
                } catch (err) {
                    errorCount++;
                    log(`Satır ${rowData.rowNumber} Hatası: ${err.message}`, 'error');
                } finally {
                    processedCount++;
                    updateProgress(processedCount, totalRows);
                }
            };

            for (let i = 0; i < rowsToProcess.length; i += MAX_CONCURRENT_UPLOADS) {
                const chunk = rowsToProcess.slice(i, i + MAX_CONCURRENT_UPLOADS);
                await Promise.all(chunk.map(row => processRow(row)));
            }

            log(`İŞLEM TAMAMLANDI: ${successCount} Başarılı, ${errorCount} Hatalı.`, successCount === totalRows ? 'success' : 'info');
            elements.restartBtn.style.display = 'block';
        }
    </script>
</body>
</html>
