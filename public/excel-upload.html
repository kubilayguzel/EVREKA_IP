<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel ile Portföy Yükleme | Evreka IP</title>
    <link rel="stylesheet" href="css/shared-styles.css">
    <link rel="stylesheet" href="css/data-entry.css">
    <link rel="stylesheet" href="css/simple-loading.css">
    <script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
    <style>
        .upload-wrapper { padding: 30px; max-width: 1000px; margin: 40px auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .config-card { background: #fdfdfd; border: 1px solid #eef0f2; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
        .drop-zone { border: 2px dashed #3498db; padding: 50px; text-align: center; border-radius: 10px; cursor: pointer; transition: background 0.3s; }
        .drop-zone:hover { background: #f7faff; }
        .status-log { margin-top: 25px; max-height: 300px; overflow-y: auto; padding: 15px; background: #2c3e50; color: #ecf0f1; border-radius: 6px; font-family: monospace; font-size: 13px; }
        .log-success { color: #2ecc71; }
        .log-error { color: #e74c3c; }
        .client-select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; margin-top: 8px; font-size: 15px; }
    </style>
</head>
<body>
    <div id="layout-header"></div>

    <div class="upload-wrapper">
        <h2>Excel ile Portföy Kaydı Aktarımı</h2>
        <p>Excel dosyasındaki verileri otomatik olarak parçalar, WIPO hiyerarşisini kurar ve seçilen müşteriye atar.</p>

        <div class="config-card">
            <label><strong>1. Aktarılacak Müşteriyi Seçin</strong></label>
            <select id="clientSelect" class="client-select">
                <option value="">Müşteri listesi yükleniyor...</option>
            </select>
        </div>

        <div id="dropZone" class="drop-zone">
            <input type="file" id="fileInput" accept=".xlsx" style="display: none;">
            <p><strong>Dosyayı Buraya Sürükleyin</strong></p>
            <p>veya tıklayarak dosya seçin (.xlsx)</p>
        </div>

        <div id="statusLog" class="status-log" style="display: none;"></div>
    </div>

    <script type="module">
        import { db, storage } from './firebase-config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { ipRecordsService } from './js/portfolio/PortfolioDataManager.js';

        // --- ÜLKE MAPPER (ISO-2 KODLARI) ---
        const COUNTRY_MAP = {
            "Albania": "AL", "Australia": "AU", "Austria": "AT", "Azerbaijan": "AZ", "Brazil": "BR",
            "Bulgaria": "BG", "China": "CN", "Czech Republic": "CZ", "Denmark": "DK", "France": "FR",
            "Georgia": "GE", "Germany": "DE", "Greece": "GR", "Israel": "IL", "Italy": "IT",
            "Kazakhstan": "KZ", "Kyrgyzstan": "KG", "New Zealand": "NZ", "North Korea": "KP",
            "North Macedonia": "MK", "Romania": "RO", "Russia": "RU", "Singapore": "SG",
            "Spain": "ES", "Sweden": "SE", "Switzerland": "CH", "Ukraine": "UA", "United Kingdom": "GB",
            "Turkey": "TR", "Benelux (Belgium, Netherlands, Luxembourg)": "BX", "Bosnia and Herzegovina": "BA",
            "Colombia": "CO", "WIPO": "WIPO"
        };

        const statusLog = document.getElementById('statusLog');
        const clientSelect = document.getElementById('clientSelect');

        // 1. Müşterileri Yükle
        async function init() {
            try {
                const q = query(collection(db, "persons"), orderBy("name"));
                const snap = await getDocs(q);
                clientSelect.innerHTML = '<option value="">-- Müşteri Seçiniz --</option>';
                snap.forEach(doc => {
                    const opt = document.createElement('option');
                    opt.value = doc.id;
                    opt.textContent = doc.data().name;
                    opt.dataset.name = doc.data().name;
                    clientSelect.appendChild(opt);
                });
            } catch (e) { console.error("Müşteri yükleme hatası:", e); }
        }

        // 2. Sınıf ve Mal/Hizmet Ayrıştırıcı
        function parseClassesAndServices(text) {
            if (!text) return { classes: [], cleanText: "" };
            const classRegex = /\[(\d+)\]:/g;
            const classes = [];
            let match;
            while ((match = classRegex.exec(text)) !== null) {
                if (!classes.includes(match[1])) classes.push(match[1]);
            }
            return { classes, cleanText: text.trim() };
        }

        // 3. Log Yazdır
        function log(msg, type = '') {
            statusLog.style.display = 'block';
            const div = document.createElement('div');
            div.className = type === 'error' ? 'log-error' : (type === 'success' ? 'log-success' : '');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            statusLog.appendChild(div);
            statusLog.scrollTop = statusLog.scrollHeight;
        }

        // 4. Excel İşleme ve Kayıt
        async function handleFile(file) {
            const clientId = clientSelect.value;
            if (!clientId) return alert("Lütfen önce müşteri seçin!");

            log("Excel okunuyor...");
            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(file);
            const sheet = workbook.getWorksheet(1);
            
            const clientName = clientSelect.options[clientSelect.selectedIndex].dataset.name;

            // Satırları dön (Başlıktan sonra - 2. satır)
            for (let i = 2; i <= sheet.rowCount; i++) {
                const row = sheet.getRow(i);
                if (!row.getCell(1).value) continue; // Boş satır kontrolü

                const rawName = row.getCell(1).text;
                const registry = row.getCell(3).text;
                const rawJurisdictions = row.getCell(13).text;
                const parsedJS = parseClassesAndServices(row.getCell(6).text);

                const baseData = {
                    clientId,
                    clientName,
                    trademarkName: rawName.replace(/\n/g, ' ').trim(),
                    status: row.getCell(4).text || "Active",
                    applicationNumber: row.getCell(7).text || "",
                    registrationNumber: row.getCell(8).text || "",
                    applicationDate: row.getCell(9).value ? new Date(row.getCell(9).value) : null,
                    registrationDate: row.getCell(10).value ? new Date(row.getCell(10).value) : null,
                    niceClasses: parsedJS.classes,
                    goodsServices: parsedJS.cleanText,
                    source: "Excel Import"
                };

                try {
                    if (registry === "INT WIPO" && rawJurisdictions.includes(",")) {
                        // --- WIPO PARENT VE CHILD MANTIĞI ---
                        log(`${baseData.trademarkName} için WIPO yapısı kuruluyor...`);
                        
                        // Parent Kaydı
                        const parentId = await ipRecordsService.createRecord({
                            ...baseData,
                            countryCode: "WIPO",
                            isParent: true,
                            parentId: null
                        });

                        // Ülkeleri Ayır ve Child Olarak Ekle
                        const countries = rawJurisdictions.split(',').map(c => c.trim());
                        for (const country of countries) {
                            const cCode = COUNTRY_MAP[country] || country.substring(0, 2).toUpperCase();
                            await ipRecordsService.createRecord({
                                ...baseData,
                                countryCode: cCode,
                                isParent: false,
                                parentId: parentId
                            });
                        }
                        log(`${baseData.trademarkName} ve bağlı ${countries.length} ülke eklendi.`, 'success');
                    } else {
                        // --- NORMAL TEKİL KAYIT ---
                        const singleCountry = rawJurisdictions.split(',')[0].trim();
                        const cCode = COUNTRY_MAP[singleCountry] || singleCountry.substring(0, 2).toUpperCase();
                        
                        await ipRecordsService.createRecord({
                            ...baseData,
                            countryCode: cCode,
                            isParent: false,
                            parentId: null
                        });
                        log(`${baseData.trademarkName} (${cCode}) eklendi.`, 'success');
                    }
                } catch (err) {
                    log(`Hata (Satır ${i}): ${err.message}`, 'error');
                }
            }
            log("Tüm işlemler tamamlandı.", 'success');
        }

        // Event Listeners
        document.getElementById('dropZone').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = (e) => handleFile(e.target.files[0]);
        
        // Sürükle-Bırak
        document.getElementById('dropZone').ondragover = (e) => { e.preventDefault(); e.currentTarget.style.background = "#f0f7ff"; };
        document.getElementById('dropZone').ondragleave = (e) => { e.preventDefault(); e.currentTarget.style.background = "#fff"; };
        document.getElementById('dropZone').ondrop = (e) => {
            e.preventDefault();
            handleFile(e.dataTransfer.files[0]);
        };

        init();
    </script>
</body>
</html>
